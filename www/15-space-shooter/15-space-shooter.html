<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Nebula Assault</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #000;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    overflow: hidden;
    font-family: 'Courier New', monospace;
    touch-action: none;
    user-select: none;
  }
  canvas {
    display: block;
    image-rendering: pixelated;
  }

  /* ── OVERLAY UI ── */
  #ui-layer {
    position: fixed; inset: 0;
    display: flex; justify-content: center; align-items: center;
    pointer-events: none;
    z-index: 10;
  }
  .ui-panel {
    background: rgba(0,0,16,0.93);
    border: 1px solid #334;
    border-radius: 8px;
    padding: 20px 24px;
    color: #cce;
    font-family: 'Courier New', monospace;
    font-size: 13px;
    pointer-events: all;
    max-width: 320px;
    width: 90%;
    text-align: center;
  }
  .ui-panel h2 { color: #00e5ff; margin-bottom: 12px; font-size: 18px; letter-spacing: 2px; }
  .ui-panel h3 { color: #cc44ff; margin: 10px 0 6px; font-size: 14px; }
  .ui-panel input[type=text] {
    background: #001122; border: 1px solid #00e5ff44;
    color: #00e5ff; font-family: inherit; font-size: 14px;
    padding: 5px 8px; border-radius: 4px; width: 100%;
    box-sizing: border-box; margin: 6px 0;
    outline: none;
  }
  .ui-btn {
    display: inline-block; padding: 7px 18px;
    border: 1px solid #00e5ff88; border-radius: 4px;
    background: #001833; color: #00e5ff;
    font-family: inherit; font-size: 12px; cursor: pointer;
    margin: 4px; letter-spacing: 1px;
    transition: background 0.15s;
  }
  .ui-btn:hover { background: #003366; }
  .ui-btn.danger { border-color: #ff444488; color: #ff6666; }
  .ui-btn.danger:hover { background: #330000; }
  .ui-btn.primary { border-color: #cc44ff88; color: #cc44ff; }
  .ui-btn.primary:hover { background: #220033; }
  .stat-row { display: flex; justify-content: space-between; padding: 3px 0; border-bottom: 1px solid #223; font-size: 12px; }
  .stat-label { color: #778; }
  .stat-val { color: #aef; }
  .ach-item { display: flex; align-items: center; gap: 8px; padding: 4px 0; font-size: 11px; border-bottom: 1px solid #112; }
  .ach-item .ach-icon { font-size: 16px; }
  .ach-item .ach-name { color: #ffcc00; font-weight: bold; }
  .ach-item .ach-desc { color: #778; font-size: 10px; }
  .ach-item.locked { opacity: 0.35; }
  .score-row { display: flex; justify-content: space-between; padding: 2px 0; font-size: 12px; }
  .score-row:nth-child(1) .sr-rank { color: #ffcc00; }
  .score-row:nth-child(2) .sr-rank { color: #aaaaaa; }
  .score-row:nth-child(3) .sr-rank { color: #cc8844; }
  .slider-row { display: flex; align-items: center; gap: 8px; margin: 6px 0; }
  .slider-row label { color: #aaa; font-size: 11px; min-width: 70px; text-align: left; }
  input[type=range] { flex: 1; accent-color: #00e5ff; }
  /* Toast */
  #toast-container {
    position: fixed; top: 60px; left: 50%; transform: translateX(-50%);
    display: flex; flex-direction: column; align-items: center; gap: 6px;
    pointer-events: none; z-index: 20;
  }
  .toast-item {
    background: rgba(0,0,16,0.9); border: 1px solid #ffcc0088;
    color: #ffcc00; padding: 6px 14px; border-radius: 20px;
    font-family: 'Courier New', monospace; font-size: 12px;
    letter-spacing: 1px; white-space: nowrap;
    animation: toastIn 0.3s ease;
  }
  @keyframes toastIn { from { opacity:0; transform:translateY(-8px); } to { opacity:1; transform:translateY(0); } }
  /* Pause button */
  #pause-btn {
    position: fixed; top: 8px; right: 8px;
    width: 36px; height: 36px;
    background: rgba(0,0,16,0.7); border: 1px solid #334;
    border-radius: 6px; color: #aaa; font-size: 16px;
    cursor: pointer; z-index: 15;
    display: flex; align-items: center; justify-content: center;
    pointer-events: all;
  }
  #pause-btn:hover { background: rgba(0,0,40,0.9); color: #fff; }
</style>

<script>window.GS_CONFIG={"id":"15-space-shooter","title":"Space Shooter","difficulties":["easy","normal","hard"],"howToPlay":"\u003cp>\u003cstrong>Goal:\u003c/strong> survive and rack up a high score.\u003c/p>\u003cul>\u003cli>\u003cstrong>Controls:\u003c/strong> move (arrows/WASD/drag), fire (Space/tap).\u003c/li>\u003cli>Destroy enemies, dodge their fire.\u003c/li>\u003cli>Grab power-ups.\u003c/li>\u003c/ul>","hints":["Keep moving — a still ship is an easy target.","Prioritise enemies that shoot back.","Save power-ups for tough waves."]};</script>
<script>
/* ===========================================================================
 * GameShell v1 — universal drop-in options overlay for single-file web games.
 * Adds: Settings (Sound, Music, Difficulty, Theme, Leaderboard, How to Play,
 * Reset) + an in-play control bar (Hint, Sound, Settings) with a rate-limited
 * Hint (2 / 24h, refills on new game). Game-agnostic, namespaced, Shadow-DOM
 * isolated, persisted per game. Safe to inject into any HTML game once.
 * ======================================================================== */
(function () {
  "use strict";
  if (window.__gsInstalled) return;
  window.__gsInstalled = true;

  /* ---------- per-game config (injected just above this script) ---------- */
  var CFG = window.GS_CONFIG || {};
  var GID = CFG.id || (location.pathname.split("/").filter(Boolean).pop() || "game").replace(/\.html?$/i, "");
  var TITLE = CFG.title || document.title || "Game";
  var DIFFS = (CFG.difficulties && CFG.difficulties.length) ? CFG.difficulties : ["easy", "normal", "hard"];
  var HOWTO = CFG.howToPlay || "<p>Use the on-screen controls (or your keyboard) to play. Your progress is saved automatically on this device.</p>";
  var TIPS = (CFG.hints && CFG.hints.length) ? CFG.hints.slice() : [
    "Take your time — there's no rush.",
    "Plan one move ahead before you commit.",
    "Stuck? Try a new game from Settings to reset and get fresh hints."
  ];
  var HINT_MAX = CFG.hintMax || 2;
  var WINDOW_MS = 24 * 60 * 60 * 1000;

  /* ----------------------------- storage --------------------------------- */
  function k(name) { return "gs:" + GID + ":" + name; }
  function load(name, def) {
    try { var v = JSON.parse(localStorage.getItem(k(name))); return v == null ? def : v; }
    catch (e) { return def; }
  }
  function save(name, val) { try { localStorage.setItem(k(name), JSON.stringify(val)); } catch (e) {} }

  var SDEF = { v: 1, sound: true, music: true, difficulty: (DIFFS.indexOf("normal") >= 0 ? "normal" : DIFFS[0]), theme: "system" };
  var settings = Object.assign({}, SDEF, load("settings", {}));
  if (DIFFS.indexOf(settings.difficulty) < 0) settings.difficulty = SDEF.difficulty;
  function persist() { save("settings", settings); }

  /* ------------------------- tiny event emitter -------------------------- */
  var subs = {};
  function on(ev, fn) { (subs[ev] = subs[ev] || []).push(fn); return function () { subs[ev] = (subs[ev] || []).filter(function (f) { return f !== fn; }); }; }
  function emit(ev, data) {
    (subs[ev] || []).forEach(function (fn) { try { fn(data); } catch (e) {} });
    try { window.dispatchEvent(new CustomEvent("gs:" + ev, { detail: data })); } catch (e) {}
  }

  /* ============================== AUDIO ================================== */
  /* Sound = master (everything). Music = looping media + opt-in music gain. */
  var soundOn = settings.sound, musicOn = settings.music;
  var acRegistry = [];

  (function patchWebAudio() {
    var Orig = window.AudioContext || window.webkitAudioContext;
    if (!Orig || Orig.__gsPatched) return;
    function Patched() {
      var ctx = arguments.length ? new Orig(arguments[0]) : new Orig();
      try {
        var realDest = ctx.destination;
        var sfx = ctx.createGain(); sfx.connect(realDest);
        var music = ctx.createGain(); music.connect(realDest);
        sfx.gain.value = soundOn ? 1 : 0;
        music.gain.value = (soundOn && musicOn) ? 1 : 0;
        Object.defineProperty(ctx, "destination", { get: function () { return sfx; }, configurable: true });
        ctx.__gsSfx = sfx; ctx.__gsMusic = music; ctx.__gsRealDest = realDest;
        acRegistry.push(ctx);
      } catch (e) {}
      return ctx;
    }
    try { Patched.prototype = Orig.prototype; } catch (e) {}
    Patched.__gsPatched = true;
    try { window.AudioContext = Patched; } catch (e) {}
    try { window.webkitAudioContext = Patched; } catch (e) {}
  })();

  var mediaEls = [];
  (function patchMedia() {
    if (!window.HTMLMediaElement || HTMLMediaElement.__gsPatched) return;
    var proto = HTMLMediaElement.prototype;
    var d = Object.getOwnPropertyDescriptor(proto, "muted");
    if (d && d.get && d.set) {
      Object.defineProperty(proto, "muted", {
        configurable: true,
        get: function () { return (!soundOn) || (this.loop && !musicOn) || d.get.call(this); },
        set: function (v) { try { d.set.call(this, v); } catch (e) {} }
      });
    }
    var op = proto.play;
    proto.play = function () {
      if (mediaEls.indexOf(this) < 0) mediaEls.push(this);
      try { this.volume = this.volume; } catch (e) {}
      return op.apply(this, arguments);
    };
    HTMLMediaElement.__gsPatched = true;
  })();

  function applyAudio() {
    acRegistry.forEach(function (ctx) {
      try {
        if (ctx.__gsSfx) ctx.__gsSfx.gain.setValueAtTime(soundOn ? 1 : 0, ctx.currentTime);
        if (ctx.__gsMusic) ctx.__gsMusic.gain.setValueAtTime((soundOn && musicOn) ? 1 : 0, ctx.currentTime);
      } catch (e) {}
    });
    mediaEls.forEach(function (el) { try { el.muted = el.muted; } catch (e) {} });
  }

  /* ============================== THEME ================================== */
  function applyTheme() {
    var t = settings.theme;
    var root = document.documentElement;
    root.classList.remove("gs-theme-light", "gs-theme-dark", "gs-theme-system");
    root.classList.add("gs-theme-" + t);
    var eff = t;
    if (t === "system") {
      eff = (window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches) ? "dark" : "light";
    }
    try { root.style.colorScheme = (t === "system") ? "light dark" : t; } catch (e) {}
    var bd = document.getElementById("gs-backdrop");
    if (bd) bd.style.background = (eff === "dark") ? "#0e1014" : "#eef1f6";
    if (host) host.setAttribute("data-theme", eff);
    emit("theme", { theme: t, effective: eff });
  }
  if (window.matchMedia) {
    try { window.matchMedia("(prefers-color-scheme: dark)").addEventListener("change", function () { if (settings.theme === "system") applyTheme(); }); }
    catch (e) {}
  }

  /* ============================== HINTS ================================== */
  function hintState() {
    var s = load("hint", { v: 1, spentAt: [], puzzleId: "", lastSeen: Date.now() });
    var now = Date.now();
    // anti-tamper: clamp future stamps; ignore large backward clock jumps
    if (s.lastSeen && now < s.lastSeen - 60000) { s.spentAt = (s.spentAt || []).map(function () { return now; }); }
    s.spentAt = (s.spentAt || []).map(function (t) { return t > now ? now : t; }).filter(function (t) { return now - t < WINDOW_MS; });
    s.lastSeen = now;
    return s;
  }
  function hintsLeft() { var s = hintState(); save("hint", s); return Math.max(0, HINT_MAX - s.spentAt.length); }
  function nextHintMs() {
    var s = hintState();
    if (s.spentAt.length < HINT_MAX) return 0;
    var oldest = Math.min.apply(null, s.spentAt);
    return Math.max(0, WINDOW_MS - (Date.now() - oldest));
  }
  function spendHint() {
    var s = hintState();
    if (HINT_MAX - s.spentAt.length <= 0) return false;
    s.spentAt.push(Date.now()); save("hint", s); return true;
  }
  function refillHints(puzzleId) {
    var s = hintState();
    if (puzzleId != null && String(puzzleId) === String(s.puzzleId)) { save("hint", s); return; } // same board: no mint
    s.spentAt = []; s.puzzleId = (puzzleId == null ? "" : String(puzzleId)); save("hint", s);
    updateHintBadge();
  }
  var tipIdx = 0;
  function provideHintText() {
    if (typeof CFG.onHint === "function") { try { var r = CFG.onHint(); if (r) return String(r); } catch (e) {} }
    var t = TIPS[tipIdx % TIPS.length]; tipIdx++; return t;
  }

  /* ============================ LEADERBOARD ============================= */
  function getBoard(diff) { var b = load("scores", { v: 1, boards: {} }); return (b.boards && b.boards[diff]) || []; }
  function submitScore(score, opts) {
    score = Number(score); if (!isFinite(score)) return;
    opts = opts || {};
    var diff = opts.difficulty || settings.difficulty;
    var name = (opts.name || "You").toString().slice(0, 12);
    var b = load("scores", { v: 1, boards: {} }); b.boards = b.boards || {};
    var list = b.boards[diff] || [];
    list.push({ name: name, score: score, ts: Date.now() });
    list.sort(function (a, c) { return c.score - a.score; });
    b.boards[diff] = list.slice(0, 10);
    save("scores", b);
    emit("score", { score: score, difficulty: diff });
    return b.boards[diff];
  }

  /* ============================== UI SHELL ============================== */
  var host, root, $bar, $hintBtn, $soundBtn, $modal, $panelHost;
  var lastFocus = null;

  var CSS = ''
    + ':host{all:initial}'
    + '*{box-sizing:border-box;font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif}'
    + '.bar{position:fixed;top:0;right:0;display:flex;gap:6px;padding:8px;'
    + 'padding-top:max(8px,env(safe-area-inset-top));padding-right:max(8px,env(safe-area-inset-right));z-index:5}'
    + '.btn{all:unset;cursor:pointer;display:flex;align-items:center;justify-content:center;'
    + 'min-width:44px;min-height:44px;width:44px;height:44px;border-radius:12px;font-size:20px;line-height:1;'
    + 'background:var(--c-btn);color:var(--c-tx);box-shadow:0 2px 8px rgba(0,0,0,.25);'
    + 'touch-action:manipulation;-webkit-tap-highlight-color:transparent;position:relative;transition:transform .08s,background .15s}'
    + '.btn:hover{background:var(--c-btnH)}.btn:active{transform:scale(.92)}'
    + '.btn:focus-visible{outline:3px solid var(--c-acc);outline-offset:2px}'
    + '.badge{position:absolute;top:-4px;right:-4px;min-width:18px;height:18px;padding:0 4px;border-radius:9px;'
    + 'background:var(--c-acc);color:#fff;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center}'
    + '.btn.off{opacity:.45}'
    + '.scrim{position:fixed;inset:0;background:rgba(0,0,0,.55);display:none;align-items:center;justify-content:center;z-index:10;'
    + 'padding:16px;padding-top:max(16px,env(safe-area-inset-top));padding-bottom:max(16px,env(safe-area-inset-bottom))}'
    + '.scrim.open{display:flex}'
    + '.modal{width:min(420px,100%);max-height:88vh;overflow:auto;background:var(--c-bg);color:var(--c-tx);'
    + 'border-radius:18px;box-shadow:0 18px 60px rgba(0,0,0,.5);padding:18px;-webkit-overflow-scrolling:touch}'
    + '.mhead{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}'
    + '.mtitle{font-size:18px;font-weight:800;letter-spacing:.2px}'
    + '.x{all:unset;cursor:pointer;font-size:22px;width:40px;height:40px;display:flex;align-items:center;justify-content:center;border-radius:10px;color:var(--c-tx)}'
    + '.x:hover{background:var(--c-btn)}.x:focus-visible{outline:3px solid var(--c-acc)}'
    + '.sub{font-size:12px;color:var(--c-mut);margin:-2px 0 12px}'
    + '.row{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:11px 2px;border-top:1px solid var(--c-line)}'
    + '.row .lab{font-size:15px;font-weight:600}.row .desc{font-size:12px;color:var(--c-mut);margin-top:2px}'
    + '.seg{display:flex;gap:4px;background:var(--c-btn);padding:4px;border-radius:12px}'
    + '.seg button{all:unset;cursor:pointer;padding:8px 12px;min-height:36px;border-radius:9px;font-size:13px;font-weight:600;color:var(--c-mut);touch-action:manipulation}'
    + '.seg button[aria-pressed=true]{background:var(--c-acc);color:#fff}'
    + '.seg button:focus-visible{outline:2px solid var(--c-acc)}'
    + '.sw{all:unset;cursor:pointer;width:52px;height:30px;border-radius:16px;background:var(--c-line);position:relative;transition:background .15s;flex:0 0 auto}'
    + '.sw::after{content:"";position:absolute;top:3px;left:3px;width:24px;height:24px;border-radius:50%;background:#fff;transition:left .15s;box-shadow:0 1px 3px rgba(0,0,0,.4)}'
    + '.sw[aria-checked=true]{background:var(--c-acc)}.sw[aria-checked=true]::after{left:25px}'
    + '.sw:focus-visible{outline:3px solid var(--c-acc);outline-offset:2px}'
    + '.lbtn{all:unset;cursor:pointer;display:block;width:100%;text-align:left;padding:13px 12px;margin-top:8px;border-radius:12px;'
    + 'background:var(--c-btn);color:var(--c-tx);font-size:15px;font-weight:600;touch-action:manipulation}'
    + '.lbtn:hover{background:var(--c-btnH)}.lbtn:focus-visible{outline:3px solid var(--c-acc)}'
    + '.lbtn.danger{color:#ff6b6b}'
    + '.back{all:unset;cursor:pointer;font-size:14px;color:var(--c-acc);font-weight:700;margin-bottom:8px;display:inline-flex;gap:4px;align-items:center}'
    + '.howto{font-size:14px;line-height:1.6}.howto p{margin:8px 0}.howto strong{color:var(--c-acc)}'
    + '.howto ul{margin:8px 0;padding-left:20px}.howto li{margin:4px 0}'
    + '.lbtabs{display:flex;gap:6px;margin:6px 0 10px}'
    + '.lbtabs button{all:unset;cursor:pointer;flex:1;text-align:center;padding:8px;border-radius:10px;background:var(--c-btn);font-size:13px;font-weight:600;color:var(--c-mut)}'
    + '.lbtabs button[aria-pressed=true]{background:var(--c-acc);color:#fff}'
    + '.lblist{list-style:none;margin:0;padding:0}'
    + '.lblist li{display:flex;justify-content:space-between;padding:9px 6px;border-top:1px solid var(--c-line);font-size:14px}'
    + '.lblist li span:first-child{color:var(--c-mut)}'
    + '.empty{color:var(--c-mut);font-size:14px;text-align:center;padding:18px}'
    + '.toast{position:fixed;left:50%;bottom:max(18px,env(safe-area-inset-bottom));transform:translateX(-50%);'
    + 'background:var(--c-bg);color:var(--c-tx);border:1px solid var(--c-line);padding:12px 16px;border-radius:12px;'
    + 'max-width:86vw;font-size:14px;box-shadow:0 8px 30px rgba(0,0,0,.4);z-index:20;opacity:0;transition:opacity .2s,transform .2s;pointer-events:none}'
    + '.toast.show{opacity:1;transform:translateX(-50%) translateY(-4px)}'
    + ':host([data-theme=dark]){--c-bg:#171a21;--c-tx:#f2f4f8;--c-mut:#9aa3b2;--c-line:#2c313c;--c-btn:#222732;--c-btnH:#2c333f;--c-acc:#4f8cff}'
    + ':host([data-theme=light]){--c-bg:#ffffff;--c-tx:#15181f;--c-mut:#646b7a;--c-line:#e6e8ee;--c-btn:#eef1f6;--c-btnH:#e3e7ef;--c-acc:#2f6bff}'
    + '@media (prefers-reduced-motion: reduce){*{transition:none!important}}';

  function el(tag, attrs, html) {
    var n = document.createElement(tag);
    if (attrs) for (var a in attrs) n.setAttribute(a, attrs[a]);
    if (html != null) n.innerHTML = html;
    return n;
  }

  function buildUI() {
    // backdrop (light DOM, behind everything)
    var bd = el("div", { id: "gs-backdrop" });
    bd.style.cssText = "position:fixed;inset:0;z-index:-1;pointer-events:none";
    document.body.appendChild(bd);

    host = el("div", { id: "gs-host" });
    host.style.cssText = "position:fixed;top:0;left:0;width:0;height:0;z-index:2147483647;isolation:isolate";
    document.body.appendChild(host);
    root = host.attachShadow ? host.attachShadow({ mode: "open" }) : host;
    var style = el("style"); style.textContent = CSS; root.appendChild(style);

    // ---- in-play control bar: Hint · Sound · Settings ----
    $bar = el("div", { class: "bar" });
    $hintBtn = el("button", { class: "btn", "aria-label": "Hint", title: "Hint" }, "💡");
    $hintBtn.appendChild(el("span", { class: "badge" }, String(HINT_MAX)));
    $soundBtn = el("button", { class: "btn", "aria-label": "Toggle sound", title: "Sound" }, "🔊");
    var $setBtn = el("button", { class: "btn", "aria-label": "Settings", title: "Settings" }, "⚙️");
    $bar.appendChild($hintBtn); $bar.appendChild($soundBtn); $bar.appendChild($setBtn);
    root.appendChild($bar);

    // ---- modal scrim + container ----
    $modal = el("div", { class: "scrim", role: "dialog", "aria-modal": "true", "aria-label": "Settings" });
    $panelHost = el("div", { class: "modal" });
    $modal.appendChild($panelHost);
    root.appendChild($modal);

    $hintBtn.addEventListener("click", doHint);
    $soundBtn.addEventListener("click", function () { setSound(!soundOn); });
    $setBtn.addEventListener("click", openSettings);
    $modal.addEventListener("click", function (e) { if (e.target === $modal) closeModal(); });
    root.addEventListener("keydown", function (e) { if (e.key === "Escape" && $modal.classList.contains("open")) closeModal(); trapFocus(e); });

    updateSoundBtn(); updateHintBadge();
  }

  function updateSoundBtn() { if ($soundBtn) { $soundBtn.textContent = soundOn ? "🔊" : "🔇"; $soundBtn.classList.toggle("off", !soundOn); } }
  function updateHintBadge() {
    if (!$hintBtn) return;
    var left = hintsLeft();
    var b = $hintBtn.querySelector(".badge");
    if (b) b.textContent = String(left);
    $hintBtn.classList.toggle("off", left === 0);
  }

  /* ----------------------------- panels --------------------------------- */
  function openModal(render) {
    lastFocus = document.activeElement;
    render();
    $modal.classList.add("open");
    var f = $panelHost.querySelector("button,[tabindex],input"); if (f) f.focus();
  }
  function closeModal() {
    $modal.classList.remove("open");
    if (lastFocus && lastFocus.focus) { try { lastFocus.focus(); } catch (e) {} }
  }
  function trapFocus(e) {
    if (e.key !== "Tab" || !$modal.classList.contains("open")) return;
    var f = $panelHost.querySelectorAll('button,[href],input,[tabindex]:not([tabindex="-1"])');
    if (!f.length) return;
    var first = f[0], last = f[f.length - 1];

<body>
<canvas id="c"></canvas>
<div id="ui-layer"><!-- panels injected by JS --></div>

<script>
// ─────────────────────────────────────────────
//  NEBULA ASSAULT — Single-file Arcade Shooter
// ─────────────────────────────────────────────
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

// ── CANVAS SIZING ──
const BASE_W = 360, BASE_H = 640;
let scale = 1, offX = 0, offY = 0;

function resize() {
  const ww = window.innerWidth, wh = window.innerHeight;
  scale = Math.min(ww / BASE_W, wh / BASE_H);
  canvas.width  = Math.round(BASE_W * scale);
  canvas.height = Math.round(BASE_H * scale);
  canvas.style.width  = canvas.width  + 'px';
  canvas.style.height = canvas.height + 'px';
}
resize();
window.addEventListener('resize', resize);

// ── AUDIO ──
let audioCtx = null, muted = false;
function ensureAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
}
function playSound(type) {
  if (muted) return;
  try {
    ensureAudio();
    if (audioCtx.state === 'suspended') audioCtx.resume();
    const t = audioCtx.currentTime;
    const g = audioCtx.createGain();
    g.connect(audioCtx.destination);

    if (type === 'shoot') {
      const o = audioCtx.createOscillator();
      o.type = 'square'; o.frequency.setValueAtTime(800, t);
      o.frequency.exponentialRampToValueAtTime(300, t + 0.08);
      g.gain.setValueAtTime(0.15, t); g.gain.exponentialRampToValueAtTime(0.001, t + 0.08);
      o.connect(g); o.start(t); o.stop(t + 0.09);
    } else if (type === 'explode') {
      const buf = audioCtx.createBuffer(1, audioCtx.sampleRate * 0.25, audioCtx.sampleRate);
      const d = buf.getChannelData(0);
      for (let i = 0; i < d.length; i++) d[i] = (Math.random() * 2 - 1) * Math.exp(-i / (d.length * 0.3));
      const src = audioCtx.createBufferSource(); src.buffer = buf;
      const f = audioCtx.createBiquadFilter(); f.type = 'lowpass'; f.frequency.value = 600;
      src.connect(f); f.connect(g);
      g.gain.setValueAtTime(0.5, t); g.gain.exponentialRampToValueAtTime(0.001, t + 0.25);
      src.start(t);
    } else if (type === 'playerHit') {
      const o = audioCtx.createOscillator(); const buf2 = audioCtx.createBuffer(1, audioCtx.sampleRate * 0.3, audioCtx.sampleRate);
      const d2 = buf2.getChannelData(0);
      for (let i = 0; i < d2.length; i++) d2[i] = (Math.random() * 2 - 1) * Math.exp(-i / (d2.length * 0.2));
      const src2 = audioCtx.createBufferSource(); src2.buffer = buf2;
      o.type = 'sawtooth'; o.frequency.setValueAtTime(200, t); o.frequency.exponentialRampToValueAtTime(50, t + 0.3);
      const mg = audioCtx.createGain(); mg.gain.setValueAtTime(0.4, t); mg.gain.exponentialRampToValueAtTime(0.001, t + 0.3);
      o.connect(mg); src2.connect(mg); mg.connect(g);
      g.gain.setValueAtTime(1, t);
      o.start(t); o.stop(t + 0.3); src2.start(t);
    } else if (type === 'powerup') {
      [0, 0.08, 0.16].forEach((dt, i) => {
        const o = audioCtx.createOscillator(); const og = audioCtx.createGain();
        o.type = 'sine'; o.frequency.value = [600, 800, 1000][i];
        og.gain.setValueAtTime(0.2, t + dt); og.gain.exponentialRampToValueAtTime(0.001, t + dt + 0.12);
        o.connect(og); og.connect(g); g.gain.setValueAtTime(1, t);
        o.start(t + dt); o.stop(t + dt + 0.13);
      });
    } else if (type === 'gameOver') {
      [0, 0.15, 0.3, 0.5].forEach((dt, i) => {
        const o = audioCtx.createOscillator(); const og = audioCtx.createGain();
        o.type = 'square'; o.frequency.value = [400, 320, 240, 160][i];
        og.gain.setValueAtTime(0.25, t + dt); og.gain.exponentialRampToValueAtTime(0.001, t + dt + 0.2);
        o.connect(og); og.connect(g); g.gain.setValueAtTime(1, t);
        o.start(t + dt); o.stop(t + dt + 0.22);
      });
    } else if (type === 'waveClear') {
      [0, 0.1, 0.2].forEach((dt, i) => {
        const o = audioCtx.createOscillator(); const og = audioCtx.createGain();
        o.type = 'square'; o.frequency.value = [500, 700, 900][i];
        og.gain.setValueAtTime(0.2, t + dt); og.gain.exponentialRampToValueAtTime(0.001, t + dt + 0.15);
        o.connect(og); og.connect(g); g.gain.setValueAtTime(1, t);
        o.start(t + dt); o.stop(t + dt + 0.16);
      });
    } else if (type === 'tractorBeam') {
      const o = audioCtx.createOscillator(); const lfo = audioCtx.createOscillator(); const lfoG = audioCtx.createGain();
      o.type = 'sine'; o.frequency.value = 180;
      lfo.type = 'sine'; lfo.frequency.value = 8; lfoG.gain.value = 40;
      lfo.connect(lfoG); lfoG.connect(o.frequency);
      g.gain.setValueAtTime(0.3, t); g.gain.exponentialRampToValueAtTime(0.001, t + 0.6);
      o.connect(g); o.start(t); o.stop(t + 0.62); lfo.start(t); lfo.stop(t + 0.62);
    } else if (type === 'extraLife') {
      [0, 0.1, 0.2, 0.3].forEach((dt, i) => {
        const o = audioCtx.createOscillator(); const og = audioCtx.createGain();
        o.type = 'square'; o.frequency.value = [400, 600, 800, 1200][i];
        og.gain.setValueAtTime(0.2, t + dt); og.gain.exponentialRampToValueAtTime(0.001, t + dt + 0.15);
        o.connect(og); og.connect(g); g.gain.setValueAtTime(1, t);
        o.start(t + dt); o.stop(t + dt + 0.16);
      });
    }
  } catch(e) {}
}

// ── CONSTANTS ──
const PLAYER_SPEED    = 220;
const PLAYER_SHOOT_COOLDOWN = 0.2;
const BULLET_SPEED    = 480;
const ENEMY_BULLET_SPEED = 155;
const FORMATION_TOP   = 80;
const FORMATION_COLS  = 9;
const FORMATION_ROWS  = 5;
const CELL_W = 34, CELL_H = 30;
const FORM_LEFT = (BASE_W - FORMATION_COLS * CELL_W) / 2;
const LIFE_ICONS = 3;
// Vertical movement band for the player ship (lets you dodge up/down)
const PLAYER_Y_MIN = BASE_H * 0.16;
const PLAYER_Y_MAX = BASE_H - 26;

// ── GAME STATE ──
let state  = 'title';  // title | playing | paused | waveClear | challengingIntro | challengingTally | bossWarning | gameOver
let score  = 0, lives = 3, wave = 0, hiscore = 0;
let shootCooldown = 0, invulnTimer = 0, flashTimer = 0, stateTimer = 0;
let challengingHits = 0, challengingTotal = 0;
let extraLifeThreshold = 20000;
let extraLifeToast = { text: '', timer: 0 };
let lastTime = 0;
let paused = false;
let bossActive = false;
let tractorActive = false, tractorTimer = 0, tractorX = 0;
let dualShip = false, dualShipTimer = 0;

// ── GAMESHELL DIFFICULTY ──
// Read once at the start of each game (see startGame). 'normal' === original
// behaviour (all multipliers 1, no life change). Easy = slower/fewer enemies
// and +1 starting life; Hard = faster/more enemies and -1 starting life.
const GS_DIFF_PRESETS = {
  easy:   { enemySpeed: 0.85, fireRate: 0.70, livesBonus: 1 },
  normal: { enemySpeed: 1.00, fireRate: 1.00, livesBonus: 0 },
  hard:   { enemySpeed: 1.20, fireRate: 1.40, livesBonus: -1 }
};
let gsDiff = { enemySpeed: 1, fireRate: 1, livesBonus: 0 };
function applyGsDifficulty() {
  let d = 'normal';
  try { if (window.GameShell && window.GameShell.getDifficulty) d = window.GameShell.getDifficulty() || 'normal'; } catch (e) {}
  gsDiff = GS_DIFF_PRESETS[d] || GS_DIFF_PRESETS.normal;
}

// ── STARS ──
const stars = [];
for (let i = 0; i < 120; i++) stars.push({ x: Math.random() * BASE_W, y: Math.random() * BASE_H, r: Math.random() * 1.5 + 0.3, speed: Math.random() * 0.5 + 0.1, brightness: Math.random() });

// ── PLAYER ──
const player = { x: BASE_W / 2, y: BASE_H - 52, w: 18, h: 22, alive: true, shieldHits: 0 };

// ── OBJECT POOLS ──
let playerBullets = [];
let enemyBullets  = [];
let particles     = [];

let powerUps      = [];

const keys = {};

let touchPY = BASE_H - 52;        // finger target Y (game coords)

// Convert client (viewport) coords → game coords, accounting for canvas position
function toGame(clientX, clientY) {
  const r = canvas.getBoundingClientRect();
  return { x: (clientX - r.left) / scale, y: (clientY - r.top) / scale };
}

document.addEventListener('keydown', e => {
  keys[e.code] = true;
  if (['Space','ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].indexOf(e.code) !== -1) e.preventDefault();
  if (e.code === 'KeyP' || e.code === 'Escape') {
    if (state === 'playing') { paused = !paused; state = paused ? 'paused' : 'playing'; }
    else if (state === 'paused') { paused = false; state = 'playing'; }
  }
  if (e.code === 'KeyM') { muted = !muted; }
  if ((e.code === 'KeyR' || e.code === 'Space' || e.code === 'Enter') && state === 'gameOver') startGame();

});
document.addEventListener('keyup', e => { keys[e.code] = false; });

canvas.addEventListener('touchstart', e => {
  e.preventDefault();

    const t0 = e.touches[0];
    if (typeof checkTitleMenuHit === 'function' && checkTitleMenuHit(t0.clientX, t0.clientY)) return;
    startGame(); return;
  }
  if (state === 'gameOver') { startGame(); return; }

// Shared player control: keyboard (arrows / WASD) OR direct touch-follow on BOTH axes
function updatePlayerControl(dt) {
  if (!player.alive) return;
  if (touchActive) {
    // Ship glides to the finger; sits a bit above it so your thumb never hides it
    const tx = Math.max(18, Math.min(BASE_W - 18, touchPX));
    const ty = Math.max(PLAYER_Y_MIN, Math.min(PLAYER_Y_MAX, touchPY - 38));
    const k = Math.min(1, dt * 16);
    player.x += (tx - player.x) * k;
    player.y += (ty - player.y) * k;
  } else {
    let dx = 0, dy = 0;
    if (keys['ArrowLeft']  || keys['KeyA']) dx = -1;
    if (keys['ArrowRight'] || keys['KeyD']) dx = 1;
    if (keys['ArrowUp']    || keys['KeyW']) dy = -1;
    if (keys['ArrowDown']  || keys['KeyS']) dy = 1;
    player.x = Math.max(18, Math.min(BASE_W - 18, player.x + dx * PLAYER_SPEED * dt));
    player.y = Math.max(PLAYER_Y_MIN, Math.min(PLAYER_Y_MAX, player.y + dy * PLAYER_SPEED * dt));

// ─── ENEMY TYPE DEFINITIONS ───
// type: 0=Drone, 1=Fighter, 2=Commander, 3=Scout, 4=Boss
function enemyColor(type) {

}

}

// ── SPAWN WAVE ──
function buildFormation() {
  enemies = [];

  const cols = FORMATION_COLS, rows = Math.min(3 + Math.floor((wave - 1) / 3), FORMATION_ROWS);
  for (let row = 0; row < rows; row++) {
    for (let col = 0; col < cols; col++) {
      const type = row === 0 ? 2 : row === 1 ? 1 : row === 2 && wave >= 5 ? (Math.random() < 0.3 ? 3 : 0) : 0;
      const fx = FORM_LEFT + col * CELL_W + CELL_W / 2;
      const fy = FORMATION_TOP + row * CELL_H + CELL_H / 2;
      const enterFrom = Math.random() < 0.5 ? -30 : BASE_W + 30;
      const enterY = -30 - row * 15;
      enemies.push({
        type, hp: enemyHP(type),
        x: enterFrom, y: enterY,
        fx, fy,
        state: 'entering',  // entering | formation | diving | dead
        speed: speedMul,
        entryT: 0, entryDur: 1.2 + Math.random() * 0.4 + row * 0.12,
        entryFrom: enterFrom,
        entryMidX: BASE_W / 2 + (Math.random() - 0.5) * 120,
        entryMidY: BASE_H * 0.25 + Math.random() * 60,
        diveX: 0, diveY: 0, diveVX: 0, diveVY: 0,
        fireTimer: 1.5 + Math.random() * 2,

        id: Math.random(),
        divePhase: 0,
        captured: false

    }
  }
  // Stagger entry timers

}

function spawnMegaBoss() {
  const speedMul = 1.0 + (wave - 1) * 0.08;
  enemies.push({
    type: 4, hp: 10 + wave,
    x: BASE_W / 2, y: -80,
    fx: BASE_W / 2, fy: 60,
    state: 'entering',
    speed: speedMul * 0.7,
    entryT: 0, entryDur: 1.8,
    entryFrom: -80,
    entryMidX: BASE_W / 2, entryMidY: -30,
    diveX: 0, diveY: 0, diveVX: 0, diveVY: 0,
    fireTimer: 1.0,
    shotsFired: 0,
    id: Math.random(),
    divePhase: 0,
    captured: false,
    bossPhase: 0,
    sineT: 0,
    maxHP: 10 + wave
  });
  bossActive = true;
}

function buildChallengingStage() {
  challengingEnemies = [];
  challengingHits = 0;
  challengingTotal = 30;
  for (let i = 0; i < 30; i++) {
    challengingEnemies.push({
      type: Math.random() < 0.5 ? 0 : 1,
      x: -40, y: -40,
      pathT: 0,
      pathDur: 2.5 + Math.random() * 1.5,
      delay: i * 0.12,
      alive: true,
      pattern: i % 5,  // 5 patterns
      id: i
    });
  }
}

// ── RESET GAME ──
function startGame() {
  applyGsDifficulty();
  score = 0; lives = Math.max(1, 5 + gsDiff.livesBonus); wave = 0;
  shootCooldown = 0; invulnTimer = 0; flashTimer = 0;
  stateTimer = 0; extraLifeThreshold = 20000;
  dualShip = false; dualShipTimer = 0;
  powerUpTimer = 0; powerUpType = '';
  tractorActive = false; bossActive = false;
  playerBullets = []; enemyBullets = []; particles = [];
  powerUps = []; scorePopups = [];
  player.x = BASE_W / 2; player.y = BASE_H - 52; player.alive = true; player.shieldHits = 0;
  shieldTimer = 4; // start each game with a brief protective shield
  extraLifeToast = { text: '', timer: 0 };
  waveStartDelay = 0;
  nextWave();
  state = 'playing';
}

function nextWave() {
  wave++;
  enemyBullets = [];
  bossActive = false;
  tractorActive = false;
  waveStartDelay = 1.2;
  invulnTimer = Math.max(invulnTimer, 3.0); // spawn grace at each wave start
  formationOscTime = 0;
  allWavesCleared = false;

  // Challenging stage every 4 waves
  if (wave % 4 === 0) {
    buildChallengingStage();
    state = 'challengingIntro';
    stateTimer = 2.5;
    return;
  }
  // Mega Boss every 5 waves
  const isBossWave = (wave % 5 === 0 && wave >= 5);
  buildFormation();
  if (isBossWave) spawnMegaBoss();
}

// ── PARTICLE SYSTEM ──
function spawnExplosion(x, y, color, count) {
  for (let i = 0; i < count; i++) {
    const angle = Math.random() * Math.PI * 2;
    const spd = 40 + Math.random() * 120;
    particles.push({ x, y, vx: Math.cos(angle) * spd, vy: Math.sin(angle) * spd, life: 1, maxLife: 0.5 + Math.random() * 0.4, size: 2 + Math.random() * 3, color });
  }
}

// ── SCORE POPUPS ──
function addScorePopup(x, y, pts) {
  scorePopups.push({ x, y, pts, life: 1, maxLife: 0.8 });
}

// ── POWER-UP DROP ──
function maybeDrop(enemy) {
  if (enemy.type === 4) { // Boss: guaranteed shield + laser + bomb
    powerUps.push({ x: enemy.x - 24, y: enemy.y, vy: 48, type: 'shield', w: 22, h: 22, angle: 0 });
    powerUps.push({ x: enemy.x,      y: enemy.y, vy: 48, type: 'laser',  w: 22, h: 22, angle: 0 });
    powerUps.push({ x: enemy.x + 24, y: enemy.y, vy: 48, type: 'bomb',   w: 22, h: 22, angle: 0 });
    return;
  }
  if (Math.random() > 0.27) return; // ~27% of any kill drops something
  const roll = Math.random();
  let w;
  if (roll < 0.10)      w = 'bomb';       // special bomb
  else if (roll < 0.22) w = 'laser';      // special piercing beam
  else if (roll < 0.52) w = 'shield';     // shield (common, with timer)
  else if (roll < 0.76) w = 'rapidFire';
  else                  w = 'wideShot';
  powerUps.push({ x: enemy.x, y: enemy.y, vy: 42, type: w, w: 22, h: 22, angle: 0 });
}

// ── COLLISIONS ──
function rectsOverlap(ax, ay, aw, ah, bx, by, bw, bh) {
  return ax < bx + bw && ax + aw > bx && ay < by + bh && ay + ah > by;
}
function hitEnemy(enemy, pts, diving) {
  enemy.hp--;
  spawnExplosion(enemy.x, enemy.y, enemyColor(enemy.type), 8);
  if (enemy.hp <= 0) {
    addScorePopup(enemy.x, enemy.y, pts);
    score += pts;
    playSound('explode');
    maybeDrop(enemy);
    enemy.state = 'dead';
    if (enemy.type === 4) { bossActive = false; }
    checkExtraLife();
  } else {
    // Flash but alive
    playSound('explode');
    spawnExplosion(enemy.x, enemy.y, '#ffffff', 4);
  }
}

function checkExtraLife() {
  if (score >= extraLifeThreshold) {
    lives = Math.min(lives + 1, 9);
    extraLifeThreshold += 50000;
    extraLifeToast = { text: '+1 LIFE!', timer: 2.5 };
    playSound('extraLife');
  }
}

// ── PLAYER SHOOT ──
function playerShoot() {
  if (shootCooldown > 0) return;
  const cd = (powerUpType === 'rapidFire' || powerUpType === 'laser') ? 0.09 : PLAYER_SHOOT_COOLDOWN;
  shootCooldown = cd;
  playSound('shoot');
  if (powerUpType === 'laser') {
    // SPECIAL: fat piercing beams that tear straight through enemies
    playerBullets.push({ x: player.x, y: player.y - 16, vy: -BULLET_SPEED * 1.3, vx: 0, w: 10, h: 24, alive: true, pierce: true });
    if (dualShip) playerBullets.push({ x: player.x + 28, y: player.y - 16, vy: -BULLET_SPEED * 1.3, vx: 0, w: 10, h: 24, alive: true, pierce: true });
  } else if (powerUpType === 'wideShot') {
    playerBullets.push({ x: player.x - 14, y: player.y - 14, vy: -BULLET_SPEED, vx: -80, w: 4, h: 12, alive: true });
    playerBullets.push({ x: player.x,      y: player.y - 14, vy: -BULLET_SPEED, vx: 0,   w: 4, h: 12, alive: true });
    playerBullets.push({ x: player.x + 14, y: player.y - 14, vy: -BULLET_SPEED, vx: 80,  w: 4, h: 12, alive: true });
  } else {
    playerBullets.push({ x: player.x, y: player.y - 14, vy: -BULLET_SPEED, vx: 0, w: 4, h: 12, alive: true });
    if (dualShip) {
      playerBullets.push({ x: player.x + 28, y: player.y - 14, vy: -BULLET_SPEED, vx: 0, w: 4, h: 12, alive: true });
    }
  }
}

// ── UPDATE ──
function update(dt) {
  if (state === 'paused') return;

  // Stars
  stars.forEach(s => { s.y += s.speed * 60 * dt; if (s.y > BASE_H) { s.y = 0; s.x = Math.random() * BASE_W; } });

  if (state === 'title' || state === 'gameOver') return;

  // Timers
  if (flashTimer > 0) flashTimer -= dt;
  if (invulnTimer > 0) invulnTimer -= dt;
  if (shootCooldown > 0) shootCooldown -= dt;
  if (dualShipTimer > 0) { dualShipTimer -= dt; if (dualShipTimer <= 0) dualShip = false; }
  if (powerUpTimer > 0) { powerUpTimer -= dt; if (powerUpTimer <= 0) { powerUpType = ''; } }
  if (shieldTimer > 0) shieldTimer -= dt;
  if (extraLifeToast.timer > 0) extraLifeToast.timer -= dt;
  if (waveStartDelay > 0) { waveStartDelay -= dt; return; }

  // ── CHALLENGING STAGE ──
  if (state === 'challengingIntro') {
    stateTimer -= dt;
    if (stateTimer <= 0) { state = 'playing'; }
    return;
  }
  if (state === 'challengingTally') {
    stateTimer -= dt;
    if (stateTimer <= 0) { nextWave(); }
    return;
  }
  if (state === 'waveClear') {
    stateTimer -= dt;
    if (stateTimer <= 0) { nextWave(); }
    return;
  }

  if (state !== 'playing') return;

  // Check if it's challenging stage time
  const isChallengingWave = (wave % 4 === 0);

  // ── CHALLENGING STAGE GAMEPLAY ──
  if (isChallengingWave) {
    updateChallengingStage(dt);
    return;
  }

  formationOscTime += dt;

  // ── PLAYER MOVEMENT (left/right + up/down) ──
  updatePlayerControl(dt);

  // ── PLAYER BULLETS ──
  playerBullets.forEach(b => { b.x += (b.vx || 0) * dt; b.y += b.vy * dt; });
  playerBullets = playerBullets.filter(b => b.alive && b.y > -20);

  // ── ENEMY BULLETS ──
  enemyBullets.forEach(b => { b.x += b.vx * dt; b.y += b.vy * dt; });
  enemyBullets = enemyBullets.filter(b => b.y < BASE_H + 20 && b.x > -20 && b.x < BASE_W + 20);

  // ── ENEMIES ──
  const speedMul = 1.0 + (wave - 1) * 0.06;
  const diveSpeed = speedMul * 135 * gsDiff.enemySpeed;
  const fireRateBase = Math.min(0.004 + (wave - 1) * 0.001, 0.018) * gsDiff.fireRate;

  enemies.forEach(en => {
    if (en.state === 'dead') return;

    // Formation sine bob
    const sinOff = Math.sin(formationOscTime * 1.2) * 14;

    // ── ENTERING ──
    if (en.state === 'entering') {
      en.entryWait -= dt;
      if (en.entryWait > 0) return;
      en.entryT += dt;
      const prog = Math.min(en.entryT / en.entryDur, 1);
      const ease = prog < 0.5 ? 2*prog*prog : -1+(4-2*prog)*prog;
      // Quadratic bezier: from enterFrom/entryY → midX/midY → fx/fy
      const bx1 = en.entryFrom, by1 = en.y < 0 ? en.y : -30;
      const bx2 = en.entryMidX, by2 = en.entryMidY;
      const bx3 = en.fx, by3 = en.fy;
      if (en.entryT / en.entryDur < 0.05) { en.y = by1; en.x = bx1; }
      en.x = (1-ease)*(1-ease)*bx1 + 2*(1-ease)*ease*bx2 + ease*ease*bx3;
      en.y = (1-ease)*(1-ease)*by1 + 2*(1-ease)*ease*by2 + ease*ease*by3;
      if (prog >= 1) { en.state = 'formation'; en.x = en.fx; en.y = en.fy; }
      return;
    }

    // ── FORMATION ──
    if (en.state === 'formation') {
      en.x = en.fx + sinOff;
      en.y = en.fy;

      // Boss-type: gentle horizontal patrol
      if (en.type === 4) {
        en.sineT = (en.sineT || 0) + dt;
        en.x = en.fx + Math.sin(en.sineT * 0.8) * 80;
        en.y = en.fy + Math.sin(en.sineT * 0.5) * 15;

        // Boss fires downward periodically
        en.fireTimer -= dt;
        if (en.fireTimer <= 0) {
          en.fireTimer = 1.5;
          const bossPhase = en.hp < en.maxHP * 0.5 ? 2 : 1;
          for (let i = 0; i < bossPhase + 1; i++) {
            const angle = (Math.PI / 2) + (i - bossPhase / 2) * 0.35;
            enemyBullets.push({ x: en.x, y: en.y + 20, vx: Math.cos(angle) * 180, vy: Math.sin(angle) * 180, w: 5, h: 10 });
          }
          // Tractor beam check
          if (en.type === 2 && player.alive && Math.abs(en.x - player.x) < 25 && en.y < player.y && Math.random() < 0.003) {
            tractorActive = true; tractorTimer = 2.0; tractorX = en.x;
            playSound('tractorBeam');
          }
        }
        return;
      }

      // Random dive trigger (fewer simultaneous divers on early waves)
      const diveChance = fireRateBase * (en.type === 1 ? 1.3 : 1);
      const maxDivers = wave < 4 ? 1 : wave < 8 ? 2 : 3;
      if (Math.random() < diveChance && enemies.filter(e => e.state === 'diving').length < maxDivers) {
        en.state = 'diving';
        en.diveVX = (player.x - en.x) / 4 + (Math.random() - 0.5) * 80;
        en.diveVY = diveSpeed + en.speed * 20;
        en.divePhase = 0;
      }

      // Commander tractor beam
      if (en.type === 2 && player.alive && Math.abs(en.x - player.x) < 25 && invulnTimer <= 0) {
        if (Math.random() < 0.001 * speedMul) {
          tractorActive = true; tractorTimer = 2.2; tractorX = en.x;
          playSound('tractorBeam');
        }
      }

      // Enemy fire from formation
      en.fireTimer -= dt;
      if (en.fireTimer <= 0) {
        en.fireTimer = 6.5 + Math.random() * 4 - Math.min(wave * 0.08, 2.5);
        const bulletCount = wave >= 11 ? 2 : 1;
        for (let i = 0; i < bulletCount; i++) {
          const angle = Math.PI / 2 + (i - (bulletCount - 1) / 2) * 0.25;
          enemyBullets.push({ x: en.x + (Math.random()-0.5)*8, y: en.y + 12, vx: Math.cos(angle) * ENEMY_BULLET_SPEED * 0.6, vy: Math.sin(angle) * ENEMY_BULLET_SPEED * (0.8 + Math.random() * 0.4), w: 4, h: 9 });
        }
      }
      return;
    }

    // ── DIVING ──
    if (en.state === 'diving') {
      en.x += en.diveVX * dt;
      en.y += en.diveVY * dt;

      // Fire during dive
      en.fireTimer -= dt;
      if (en.fireTimer <= 0) {
        en.fireTimer = 1.5 + Math.random() * 1.2;
        enemyBullets.push({ x: en.x, y: en.y + 12, vx: (player.x - en.x) * 0.22, vy: ENEMY_BULLET_SPEED * 0.85, w: 4, h: 9 });
      }

      // Off screen — return to formation (from top)
      if (en.y > BASE_H + 40 || en.x < -60 || en.x > BASE_W + 60) {
        en.state = 'entering';
        en.x = Math.random() > 0.5 ? -30 : BASE_W + 30;
        en.y = -40;
        en.entryT = 0; en.entryWait = 0;
        en.entryMidX = BASE_W / 2 + (Math.random() - 0.5) * 100;
        en.entryMidY = BASE_H * 0.2 + Math.random() * 50;
      }

      // Scout erratic weave
      if (en.type === 3) {
        en.diveVX += Math.sin(en.y * 0.06) * 300 * dt;
        en.diveVX = Math.max(-350, Math.min(350, en.diveVX));
      }
      // Fighter weave
      if (en.type === 1) {
        en.diveVX += Math.sin(en.y * 0.04) * 150 * dt;
      }
    }
  });

  // Remove dead enemies
  enemies = enemies.filter(e => e.state !== 'dead');

  // ── TRACTOR BEAM ──
  if (tractorActive) {
    tractorTimer -= dt;
    if (tractorTimer <= 0) {
      tractorActive = false;
    } else if (player.alive && invulnTimer <= 0) {
      // Pull player toward beam
      const dx2 = tractorX - player.x;
      if (Math.abs(dx2) < 4 && tractorTimer < 1.5) {
        // Captured! (an active shield saves you from capture)
        tractorActive = false;
        if (shieldTimer > 0) { spawnExplosion(player.x, player.y, '#44ff88', 8); }
        else { playerHit(); }
        // Dual ship reward if they were hit by a commander that's still alive
        if (Math.random() < 0.6 && !dualShip) {
          dualShip = true; dualShipTimer = 30;
          powerUps.push({ x: player.x, y: player.y - 40, vy: 0, type: 'dualShip', w: 16, h: 16, angle: 0, instant: true });
        }
      } else {
        player.x += dx2 * 1.5 * dt * Math.min(tractorTimer, 1);
      }
    }
  }

  // ── POWER-UPS (gentle fall + magnet toward the ship) ──
  powerUps.forEach(pu => {
    if (pu.instant || pu.dead) return;
    pu.y += pu.vy * dt;
    pu.angle += dt * 2;
    if (player.alive) {
      const dxm = player.x - pu.x, dym = player.y - pu.y;
      const dist = Math.hypot(dxm, dym);
      if (dist > 1 && dist < 110) {           // vacuum it in when the ship is near
        const pull = Math.min((1 - dist / 110) * 320 * dt, dist); // never overshoot
        pu.x += (dxm / dist) * pull;
        pu.y += (dym / dist) * pull;
      }
    }
  });
  // Remove collected (dead) power-ups AND any that fell off the bottom
  powerUps = powerUps.filter(pu => !pu.dead && pu.y < BASE_H + 30);

  // ── BULLET ↔ ENEMY COLLISIONS ──
  playerBullets.forEach(b => {
    if (!b.alive) return;
    enemies.forEach(en => {
      if (en.state === 'dead') return;
      const ew = en.type === 4 ? 36 : 16;
      const eh = en.type === 4 ? 36 : 16;
      if (rectsOverlap(b.x - b.w/2, b.y - b.h/2, b.w, b.h, en.x - ew/2, en.y - eh/2, ew, eh)) {
        if (!b.pierce) b.alive = false;   // laser beams pass through and keep going
        hitEnemy(en, enemyPoints(en.type, en.state === 'diving'), en.state === 'diving');
      }
    });
  });

  // ── ENEMY BULLET ↔ PLAYER COLLISIONS ──
  if (player.alive && invulnTimer <= 0) {
    enemyBullets.forEach(b => {
      if (rectsOverlap(b.x - b.w/2, b.y - b.h/2, b.w, b.h, player.x - 7, player.y - 8, 14, 18)) {
        b.vy = 0; b.vx = 0; b.y = -100; // remove bullet
        if (shieldTimer > 0) {
          spawnExplosion(player.x, player.y, '#44ff88', 6); // shield absorbs the hit
        } else {
          playerHit();
        }
      }
    });
    // Enemy body ↔ player
    enemies.forEach(en => {
      if (en.state !== 'diving') return;
      const ew = 14;
      if (rectsOverlap(player.x - 7, player.y - 8, 14, 18, en.x - ew/2, en.y - ew/2, ew, ew)) {
        en.state = 'dead'; spawnExplosion(en.x, en.y, enemyColor(en.type), 10);
        score += enemyPoints(en.type, true); playSound('explode');
        if (shieldTimer <= 0) playerHit();
      }
    });
  }

  // ── POWER-UP ↔ PLAYER ──
  powerUps.forEach(pu => {
    if (pu.dead) return;
    if (pu.instant) { applyPowerUp(pu.type); pu.dead = true; pu.y = -100; return; }
    if (rectsOverlap(pu.x - pu.w/2, pu.y - pu.h/2, pu.w, pu.h, player.x - 20, player.y - 22, 40, 44)) {
      applyPowerUp(pu.type);
      const names = { rapidFire:'RAPID FIRE!', wideShot:'WIDE SHOT!', shield:'SHIELD UP!', dualShip:'DUAL SHIP!', bomb:'★ BOMB! ★', laser:'★ LASER! ★' };
      if (typeof showToast === 'function') showToast(names[pu.type] || 'POWER UP!');
      spawnExplosion(pu.x, pu.y, '#ffffff', 12);
      playSound('powerup');
      pu.dead = true; pu.y = -100;   // collected → mark for removal (no more lingering/recycling)
    }
  });

  // ── PARTICLES ──
  particles.forEach(p => { p.x += p.vx * dt; p.y += p.vy * dt; p.vy += 60 * dt; p.life -= dt / p.maxLife; });
  particles = particles.filter(p => p.life > 0);

  // ── SCORE POPUPS ──
  scorePopups.forEach(sp => { sp.y -= 40 * dt; sp.life -= dt / sp.maxLife; });
  scorePopups = scorePopups.filter(sp => sp.life > 0);

  // ── WAVE COMPLETE? ──
  if (enemies.length === 0 && !allWavesCleared && waveStartDelay <= 0 && wave % 4 !== 0) {
    allWavesCleared = true;
    score += 500 * wave;
    addScorePopup(BASE_W / 2, BASE_H / 2, 500 * wave);
    playSound('waveClear');
    state = 'waveClear';
    stateTimer = 2.5;
  }
}

function playerHit() {
  if (invulnTimer > 0) return;
  lives--;
  playSound('playerHit');
  spawnExplosion(player.x, player.y, '#00ffff', 14);
  flashTimer = 0.3;
  invulnTimer = 3.0;
  dualShip = false;
  if (lives <= 0) {
    hiscore = Math.max(hiscore, score);
    try { localStorage.setItem('nebula_assault_hiscore', hiscore); } catch(e) {}
    playSound('gameOver');
    state = 'gameOver';
  }
}

function applyPowerUp(type) {
  if (type === 'rapidFire') { powerUpType = 'rapidFire'; powerUpTimer = 15; }
  else if (type === 'wideShot') { powerUpType = 'wideShot'; powerUpTimer = 15; }
  else if (type === 'shield') { shieldTimer = 10; }             // timed protective shield
  else if (type === 'dualShip') { dualShip = true; dualShipTimer = 30; }
  else if (type === 'laser') { powerUpType = 'laser'; powerUpTimer = 15; }   // special piercing beam
  else if (type === 'bomb') { detonateBomb(); }                 // special screen-clearing bomb
}

// Special bomb: wipe enemy fire and destroy everything on screen (boss takes heavy damage)
function detonateBomb() {
  flashTimer = 0.5;
  enemyBullets = [];
  enemies.forEach(en => {
    if (en.state === 'dead') return;
    if (en.type === 4) {
      en.hp -= 6; spawnExplosion(en.x, en.y, enemyColor(4), 14);
      if (en.hp <= 0) { en.state = 'dead'; bossActive = false; score += enemyPoints(4, false); }
    } else {
      spawnExplosion(en.x, en.y, enemyColor(en.type), 12);
      score += enemyPoints(en.type, false);
      en.state = 'dead';
    }
  });
  enemies = enemies.filter(e => e.state !== 'dead');
  playSound('explode');
  if (typeof triggerShake === 'function') triggerShake(9, 0.4);
  checkExtraLife();
}

// ── CHALLENGING STAGE UPDATE ──
function updateChallengingStage(dt) {
  // Player moves (left/right + up/down)
  updatePlayerControl(dt);
  // note: shootCooldown is already decremented in the main update timer block above

  playerBullets.forEach(b => { b.x += (b.vx || 0) * dt; b.y += b.vy * dt; });
  playerBullets = playerBullets.filter(b => b.alive && b.y > -20);

  const t = Date.now() / 1000;
  let anyAlive = false;
  let allDone = true;

  challengingEnemies.forEach(ce => {
    if (!ce.alive) return;
    ce.delay -= dt;
    if (ce.delay > 0) { allDone = false; return; }
    ce.pathT += dt;
    anyAlive = true;
    allDone = false;

    // 5 path patterns
    const prog = ce.pathT / ce.pathDur;
    if (ce.pattern === 0) { ce.x = -40 + prog * (BASE_W + 80); ce.y = 120 + Math.sin(prog * Math.PI * 3) * 60; }
    else if (ce.pattern === 1) { ce.x = BASE_W + 40 - prog * (BASE_W + 80); ce.y = 100 + Math.sin(prog * Math.PI * 4) * 80; }
    else if (ce.pattern === 2) { const a = prog * Math.PI * 2 + ce.id * 10; ce.x = BASE_W/2 + Math.cos(a) * 120; ce.y = 140 + Math.sin(a) * 60; }
    else if (ce.pattern === 3) { ce.x = (ce.id % 2 === 0 ? -40 : BASE_W+40) + (ce.id % 2 === 0 ? 1 : -1) * prog * (BASE_W + 80); ce.y = 80 + prog * 180; }
    else { ce.x = -40 + prog * (BASE_W + 80); ce.y = 80 + Math.sin(prog * Math.PI * 5) * 100 + prog * 60; }

    if (ce.pathT >= ce.pathDur) { ce.alive = false; }

    // Bullet hit check
    playerBullets.forEach(b => {
      if (!b.alive) return;
      if (rectsOverlap(b.x - 2, b.y - 6, 4, 12, ce.x - 8, ce.y - 8, 16, 16)) {
        b.alive = false; ce.alive = false;
        challengingHits++;
        score += 100;
        spawnExplosion(ce.x, ce.y, enemyColor(ce.type), 6);
        playSound('explode');
      }
    });
  });

  particles.forEach(p => { p.x += p.vx * dt; p.y += p.vy * dt; p.vy += 60 * dt; p.life -= dt / p.maxLife; });
  particles = particles.filter(p => p.life > 0);

  scorePopups.forEach(sp => { sp.y -= 40 * dt; sp.life -= dt / sp.maxLife; });
  scorePopups = scorePopups.filter(sp => sp.life > 0);

  if (allDone || challengingEnemies.every(c => !c.alive && c.delay <= 0)) {
    if (challengingHits >= challengingTotal) score += 5000;
    checkExtraLife();
    state = 'challengingTally';
    stateTimer = 3.0;
  }
}

// ── DRAW ──
function draw() {
  ctx.save();
  ctx.scale(scale, scale);

  // BG
  ctx.fillStyle = '#000010';
  ctx.fillRect(0, 0, BASE_W, BASE_H);

  // Screen flash
  if (flashTimer > 0) {
    ctx.fillStyle = `rgba(255,255,255,${flashTimer * 0.6})`;
    ctx.fillRect(0, 0, BASE_W, BASE_H);
  }

  // Stars
  stars.forEach(s => {
    ctx.globalAlpha = 0.4 + s.brightness * 0.6;
    ctx.fillStyle = s.speed > 0.4 ? '#aaccff' : '#ffffff';
    ctx.fillRect(s.x, s.y, s.r, s.r);
  });
  ctx.globalAlpha = 1;

  if (state === 'title') { drawTitle(); ctx.restore(); return; }
  if (state === 'gameOver') { drawGameOver(); ctx.restore(); return; }

  // Particles
  particles.forEach(p => {
    ctx.globalAlpha = p.life;
    ctx.fillStyle = p.color;
    ctx.fillRect(p.x - p.size/2, p.y - p.size/2, p.size, p.size);
  });
  ctx.globalAlpha = 1;

  // Player bullets
  playerBullets.forEach(b => {
    ctx.shadowBlur = 8; ctx.shadowColor = '#00ffff';
    ctx.fillStyle = '#00ffff';
    ctx.fillRect(b.x - b.w/2, b.y - b.h/2, b.w, b.h);
  });

  // Enemy bullets
  enemyBullets.forEach(b => {
    ctx.shadowBlur = 6; ctx.shadowColor = '#ff4444';
    ctx.fillStyle = '#ff6666';
    ctx.fillRect(b.x - b.w/2, b.y - b.h/2, b.w, b.h);
  });
  ctx.shadowBlur = 0;

  // Tractor beam
  if (tractorActive) {
    const beamW = 18 + Math.sin(Date.now() / 60) * 4;
    const grad = ctx.createLinearGradient(tractorX - beamW/2, 0, tractorX + beamW/2, 0);
    grad.addColorStop(0, 'rgba(68,255,136,0)');
    grad.addColorStop(0.5, `rgba(68,255,136,${0.4 + Math.sin(Date.now()/80)*0.2})`);
    grad.addColorStop(1, 'rgba(68,255,136,0)');
    ctx.fillStyle = grad;
    ctx.fillRect(tractorX - beamW/2, 0, beamW, BASE_H);
  }

  // Enemies
  const isChallengingWave = (wave % 4 === 0);
  if (!isChallengingWave) {
    enemies.forEach(en => {
      if (en.state === 'dead') return;
      drawEnemy(en);
    });
  } else {
    // Challenging stage enemies
    challengingEnemies.forEach(ce => {
      if (!ce.alive || ce.delay > 0) return;
      drawEnemy({ type: ce.type, x: ce.x, y: ce.y, state: 'diving', hp: 1 });
    });
  }

  // Power-ups = green circle · special bomb = red circle
  powerUps.forEach(pu => {
    if (pu.y < 0) return;
    const isBomb = pu.type === 'bomb';
    const isLaser = pu.type === 'laser';
    const ring   = isBomb ? '#ff3344' : isLaser ? '#00e5ff' : '#44ff88';
    const fillC  = isBomb ? 'rgba(255,40,60,0.22)' : isLaser ? 'rgba(0,229,255,0.20)' : 'rgba(68,255,136,0.18)';
    const labels = { rapidFire: 'R', wideShot: 'W', shield: 'S', dualShip: '2X', bomb: 'B', laser: 'L' };
    ctx.save();
    ctx.translate(pu.x, pu.y);
    const pulse = 1 + Math.sin(Date.now() / 150 + pu.x) * 0.08;
    ctx.scale(pulse, pulse);
    ctx.shadowBlur = 12; ctx.shadowColor = ring;
    ctx.fillStyle = fillC;
    ctx.beginPath(); ctx.arc(0, 0, 11, 0, Math.PI * 2); ctx.fill();
    ctx.lineWidth = 2.2; ctx.strokeStyle = ring;
    ctx.beginPath(); ctx.arc(0, 0, 11, 0, Math.PI * 2); ctx.stroke();
    ctx.shadowBlur = 0;
    ctx.fillStyle = '#ffffff';
    ctx.font = 'bold 10px monospace';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(labels[pu.type] || '?', 0, 0.5);
    ctx.restore();
  });

  // Player
  if (player.alive && (invulnTimer <= 0 || Math.floor(invulnTimer * 10) % 2 === 0)) {
    drawPlayer();
  }

  // Score popups
  scorePopups.forEach(sp => {
    ctx.globalAlpha = sp.life;
    ctx.fillStyle = '#ffff44';
    ctx.font = 'bold 11px monospace';
    ctx.textAlign = 'center';
    ctx.fillText('+' + sp.pts, sp.x, sp.y);
  });
  ctx.globalAlpha = 1;

  // HUD
  drawHUD();

  // Overlays
  if (state === 'paused') drawPause();
  if (state === 'waveClear') drawWaveClear();
  if (state === 'challengingIntro') drawChallengingIntro();
  if (state === 'challengingTally') drawChallengingTally();

  ctx.restore();
}

function drawEnemy(en) {
  ctx.save();
  ctx.translate(en.x, en.y);
  const c = enemyColor(en.type);
  ctx.shadowBlur = 10; ctx.shadowColor = c;
  ctx.strokeStyle = c; ctx.fillStyle = c + '33';
  ctx.lineWidth = 1.5;

  if (en.type === 0) { // Drone - hexagon
    ctx.beginPath();
    for (let i = 0; i < 6; i++) { const a = i * Math.PI / 3 - Math.PI / 6; ctx.lineTo(Math.cos(a) * 9, Math.sin(a) * 9); }
    ctx.closePath(); ctx.fill(); ctx.stroke();
    ctx.fillStyle = c;
    ctx.beginPath(); ctx.arc(0, 0, 3, 0, Math.PI * 2); ctx.fill();
  } else if (en.type === 1) { // Fighter - diamond
    ctx.beginPath(); ctx.moveTo(0, -10); ctx.lineTo(9, 0); ctx.lineTo(0, 10); ctx.lineTo(-9, 0); ctx.closePath();
    ctx.fill(); ctx.stroke();
    // Wing spikes
    ctx.beginPath(); ctx.moveTo(5, -4); ctx.lineTo(14, -8); ctx.moveTo(-5, -4); ctx.lineTo(-14, -8); ctx.stroke();
  } else if (en.type === 2) { // Commander - double ring
    ctx.beginPath(); ctx.arc(0, 0, 9, 0, Math.PI * 2); ctx.stroke();
    ctx.beginPath(); ctx.arc(0, 0, 5, 0, Math.PI * 2); ctx.stroke();
    ctx.fillStyle = c; ctx.beginPath(); ctx.arc(0, 0, 2, 0, Math.PI * 2); ctx.fill();
    if (en.hp === 2) { // Crown indicator
      ctx.beginPath(); ctx.moveTo(-5, -9); ctx.lineTo(-5, -14); ctx.lineTo(-2, -11); ctx.lineTo(0, -15); ctx.lineTo(2, -11); ctx.lineTo(5, -14); ctx.lineTo(5, -9); ctx.stroke();
    }
  } else if (en.type === 3) { // Scout - small diamond fast
    ctx.beginPath(); ctx.moveTo(0, -7); ctx.lineTo(6, 0); ctx.lineTo(0, 7); ctx.lineTo(-6, 0); ctx.closePath(); ctx.fill(); ctx.stroke();
    ctx.fillStyle = '#ff8888'; ctx.beginPath(); ctx.arc(0, 0, 2, 0, Math.PI*2); ctx.fill();
  } else if (en.type === 4) { // Mega Boss - large polygon
    const sides = 8;
    const r = 24;
    ctx.lineWidth = 2.5;
    ctx.beginPath();
    for (let i = 0; i < sides; i++) { const a = i * Math.PI * 2 / sides; ctx.lineTo(Math.cos(a) * r, Math.sin(a) * r); }
    ctx.closePath(); ctx.fill(); ctx.stroke();
    // Inner detail
    ctx.beginPath();
    for (let i = 0; i < sides; i++) { const a = i * Math.PI * 2 / sides; ctx.lineTo(Math.cos(a) * 14, Math.sin(a) * 14); }
    ctx.closePath(); ctx.stroke();
    ctx.fillStyle = c; ctx.beginPath(); ctx.arc(0, 0, 5, 0, Math.PI * 2); ctx.fill();
    // HP bar
    ctx.shadowBlur = 0;
    ctx.fillStyle = '#333'; ctx.fillRect(-24, 28, 48, 5);
    ctx.fillStyle = c; ctx.fillRect(-24, 28, 48 * (en.hp / en.maxHP), 5);
    ctx.strokeStyle = '#ffffff66'; ctx.lineWidth = 0.5; ctx.strokeRect(-24, 28, 48, 5);
  }
  ctx.restore();
}

function drawPlayer() {
  ctx.save();
  // Shield aura (timed) — blinks when about to expire
  if (shieldTimer > 0) {
    const pulse = 0.55 + Math.sin(Date.now() / 110) * 0.35;
    ctx.globalAlpha = (shieldTimer < 2 && Math.floor(shieldTimer * 8) % 2 === 0) ? 0.2 : pulse;
    ctx.strokeStyle = '#44ff88'; ctx.lineWidth = 2.5;
    ctx.shadowBlur = 16; ctx.shadowColor = '#44ff88';
    ctx.beginPath(); ctx.arc(player.x, player.y, 22, 0, Math.PI * 2); ctx.stroke();
    ctx.globalAlpha = 1; ctx.shadowBlur = 0;
  }
  if (dualShip) {
    drawShipAt(player.x + 28, player.y, 0.8);
  }
  drawShipAt(player.x, player.y, 1);
  ctx.restore();
}

function drawShipAt(x, y, alpha) {
  ctx.globalAlpha = alpha;
  ctx.shadowBlur = 12; ctx.shadowColor = '#00ffff';
  ctx.fillStyle = '#00ffff';
  ctx.strokeStyle = '#ffffff';
  ctx.lineWidth = 1.2;
  ctx.beginPath();
  ctx.moveTo(x, y - 16);
  ctx.lineTo(x - 13, y + 12);
  ctx.lineTo(x - 5, y + 6);
  ctx.lineTo(x, y + 10);
  ctx.lineTo(x + 5, y + 6);
  ctx.lineTo(x + 13, y + 12);
  ctx.closePath();
  ctx.fillStyle = '#003355';
  ctx.fill();
  ctx.stroke();
  // Engine glow
  const thrust = 4 + Math.sin(Date.now() / 60) * 3;
  ctx.fillStyle = '#00ffff';
  ctx.beginPath(); ctx.moveTo(x - 4, y + 10); ctx.lineTo(x + 4, y + 10); ctx.lineTo(x, y + 14 + thrust); ctx.closePath(); ctx.fill();
  ctx.globalAlpha = 1;
}

function drawHUD() {

  ctx.fillText('SCORE: ' + score, 8, 18);

  ctx.fillText('BEST: ' + hiscore, BASE_W / 2, 18);

  ctx.fillStyle = '#aaddff';

  // Lives
  ctx.fillStyle = '#00ffff';
  ctx.font = '10px monospace';
  ctx.textAlign = 'left';
  ctx.fillText('LIVES', 8, BASE_H - 28);
  for (let i = 0; i < Math.max(0, lives); i++) {
    ctx.save(); ctx.translate(8 + 18 + i * 18, BASE_H - 14);
    ctx.strokeStyle = '#00ffff'; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(0, -7); ctx.lineTo(-5, 5); ctx.lineTo(0, 2); ctx.lineTo(5, 5); ctx.closePath(); ctx.stroke();
    ctx.restore();
  }

  // Shield timer bar
  if (shieldTimer > 0) {
    ctx.textAlign = 'right';
    ctx.fillStyle = '#44ff88';
    ctx.font = '10px monospace';
    ctx.fillText('SHIELD', BASE_W - 8, BASE_H - 52);

    ctx.fillRect(BASE_W - 64, BASE_H - 46, 56, 6);
    ctx.fillStyle = '#44ff88';

    const labels = { rapidFire: 'RAPID', wideShot: 'WIDE', laser: 'LASER' };

    ctx.font = '10px monospace';

    ctx.fillStyle = '#333';
    ctx.fillRect(BASE_W - 64, BASE_H - 20, 56, 7);
    ctx.fillStyle = colors[powerUpType];
    ctx.fillRect(BASE_W - 64, BASE_H - 20, 56 * (powerUpTimer / 15), 7);
    ctx.strokeStyle = colors[powerUpType] + '88';
    ctx.lineWidth = 0.5;
    ctx.strokeRect(BASE_W - 64, BASE_H - 20, 56, 7);
  }

  // Mute indicator
  ctx.font = '12px monospace';
  ctx.textAlign = 'right';
  ctx.fillStyle = muted ? '#666' : '#aaa';
  ctx.fillText(muted ? '🔇' : '🔊', BASE_W - 8, BASE_H - 40);

  // Extra life toast
  if (extraLifeToast.timer > 0) {
    ctx.globalAlpha = Math.min(extraLifeToast.timer, 1);
    ctx.fillStyle = '#ffff44';
    ctx.font = 'bold 18px monospace';
    ctx.textAlign = 'center';
    ctx.fillText(extraLifeToast.text, BASE_W / 2, BASE_H * 0.4);
    ctx.globalAlpha = 1;
  }
}

// ── SAVE / LOAD ──
const SAVE_KEY   = '15_nebula_assault_save';
const SAVE_VER   = 2;

function defaultSave() {
  return {
    version: SAVE_VER,
    hiscore: 0,
    muted: false,
    sfxVol: 0.5,
    musicVol: 0.3,
    topScores: [],       // [{score, wave, date}]
    profile: null,       // filled below
    achievements: {},    // {id: true}
    firstPlay: true
  };
}

function loadSave() {
  try {
    const raw = localStorage.getItem(SAVE_KEY);
    if (!raw) return defaultSave();
    const d = JSON.parse(raw);
    // Migration from v1 (single hiscore key)
    if (!d.version || d.version < 2) {
      const old = parseInt(localStorage.getItem('nebula_assault_hiscore')) || 0;
      const s = defaultSave();
      s.hiscore = Math.max(old, d.hiscore || 0);
      s.muted = !!d.muted;
      return s;
    }
    return Object.assign(defaultSave(), d);
  } catch(e) { return defaultSave(); }
}

function persistSave() {
  try {
    saveData.hiscore = hiscore;
    localStorage.setItem(SAVE_KEY, JSON.stringify(saveData));
  } catch(e) {}
}

// Auto-save on visibility/unload
document.addEventListener('visibilitychange', () => { if (document.hidden) persistSave(); });
window.addEventListener('beforeunload', persistSave);

      bestScore: 0,
      highestWave: 0,
      totalKills: 0,
      bossesDefeated: 0
    };

  }
}

  { id:'shield_up',     icon:'🛡️', name:'Shield Bearer',  desc:'Collect a Shield power-up' },
  { id:'ace_pilot',     icon:'🏆', name:'Ace Pilot',      desc:'Score 10,000 points' },
  { id:'score_50k',     icon:'🚀', name:'Star Admiral',   desc:'Score 50,000 points' },
  { id:'dual_ship',     icon:'🛸', name:'Twin Strike',    desc:'Activate Dual Ship' },

  { id:'wave10',        icon:'💫', name:'Deep Space',     desc:'Survive to Wave 10' }
];

function unlockAch(id) {
  if (saveData.achievements[id]) return;
  saveData.achievements[id] = true;
  persistSave();
  const def = ACH_DEF.find(a => a.id === id);
  if (def) showToast(def.icon + ' ' + def.name + ' unlocked!');
}

function checkAchievements() {
  if (sessionKills >= 1) unlockAch('first_kill');
  if (wave >= 5) unlockAch('wave5');
  if (wave >= 10) unlockAch('wave10');
  if (score >= 10000) unlockAch('ace_pilot');
  if (score >= 50000) unlockAch('score_50k');
}

// ── TOAST SYSTEM ──
const toastContainer = document.getElementById('toast-container');
const activeToasts = [];
function showToast(msg, duration) {
  duration = duration || 2800;
  const el = document.createElement('div');
  el.className = 'toast-item';
  el.textContent = msg;
  toastContainer.appendChild(el);
  const entry = { el, timer: duration };
  activeToasts.push(entry);
  setTimeout(() => {
    el.style.transition = 'opacity 0.4s';
    el.style.opacity = '0';
    setTimeout(() => { try { toastContainer.removeChild(el); } catch(e){} }, 400);
    const idx = activeToasts.indexOf(entry);
    if (idx !== -1) activeToasts.splice(idx, 1);
  }, duration);
}

// ── TOP-10 LEADERBOARD ──
function addTopScore(s, w) {
  const list = saveData.topScores || [];
  list.push({ score: s, wave: w, date: new Date().toLocaleDateString() });
  list.sort((a, b) => b.score - a.score);
  saveData.topScores = list.slice(0, 10);
  persistSave();
}

// ── SCREEN SHAKE ──
let shakeTimer = 0, shakeAmt = 0;
function triggerShake(amt, dur) {
  if (prefersReducedMotion) return;
  shakeAmt = amt; shakeTimer = dur;
}

// ── MUSIC (simple looping tone) ──
let musicGain = null, musicPlaying = false;
function startMusic() {
  if (musicPlaying || muted) return;
  try {
    ensureAudio();
    if (!musicGain) {
      musicGain = audioCtx.createGain();
      musicGain.gain.value = musicVol * 0.12;
      musicGain.connect(audioCtx.destination);
    }
    // Very minimal ambient drone — two oscillators
    const o1 = audioCtx.createOscillator();
    const o2 = audioCtx.createOscillator();
    o1.type = 'sine'; o1.frequency.value = 55;
    o2.type = 'sine'; o2.frequency.value = 82.5;
    const mg = audioCtx.createGain(); mg.gain.value = 1;
    o1.connect(mg); o2.connect(mg); mg.connect(musicGain);
    o1.start(); o2.start();
    // Pulse slowly
    const lfo = audioCtx.createOscillator();
    const lfoG = audioCtx.createGain(); lfoG.gain.value = 0.3;
    lfo.type = 'sine'; lfo.frequency.value = 0.2;
    lfo.connect(lfoG); lfoG.connect(mg.gain);
    lfo.start();
    musicPlaying = true;
  } catch(e) {}
}
function stopMusic() {
  if (musicGain) { try { musicGain.gain.setTargetAtTime(0, audioCtx.currentTime, 0.3); } catch(e){} }
  musicPlaying = false;
}

// ── PANEL SYSTEM ──
const uiLayer = document.getElementById('ui-layer');
let activePanel = null;

function showPanel(html, onClose) {
  if (activePanel) closePanel();
  const div = document.createElement('div');
  div.className = 'ui-panel';
  div.innerHTML = html;
  uiLayer.appendChild(div);
  activePanel = { el: div, onClose };
  // auto-pause
  if (state === 'playing') { paused = true; state = 'paused'; }
  return div;
}
function closePanel() {
  if (!activePanel) return;
  uiLayer.removeChild(activePanel.el);
  const cb = activePanel.onClose;
  activePanel = null;
  if (cb) cb();
}

// ── ESCAPE HTML helper ──
function escHtml(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

// ── PATCH startGame to handle tutorial & profile stats ──
const _origStartGame = startGame;
startGame = function() {
  if (activePanel) closePanel();
  ensureProfile();
  // Notify the GameShell overlay of a fresh game (refills hints, etc.) — optional, safe.
  try { if (window.GameShell && typeof window.GameShell.newGame === 'function') window.GameShell.newGame(); } catch (e) {}
  sessionKills = 0; sessionBosses = 0;
  if (saveData.firstPlay) {
    saveData.firstPlay = false; persistSave();
    openTutorialPanel(() => { _origStartGame(); updatePauseBtn(); startMusic(); });
    return;
  }
  _origStartGame();
  updatePauseBtn();
  startMusic();
};

// ── PATCH playerHit for shake + stats ──
const _origPlayerHit = playerHit;
playerHit = function() {
  triggerShake(4, 0.35);
  _origPlayerHit.apply(this, arguments);
  // If game just ended, record stats
  if (state === 'gameOver') {
    saveData.profile.gamesPlayed++;
    if (score > saveData.profile.bestScore) saveData.profile.bestScore = score;
    if (wave > saveData.profile.highestWave) saveData.profile.highestWave = wave;
    saveData.profile.totalKills += sessionKills;
    saveData.profile.bossesDefeated += sessionBosses;
    sessionKills = 0; sessionBosses = 0;
    addTopScore(score, wave);
    persistSave();
    updatePauseBtn();
    stopMusic();
    // Report final score to the GameShell overlay leaderboard (optional, safe).
    try { if (window.GameShell && typeof window.GameShell.submitScore === 'function') window.GameShell.submitScore(Math.round(score), { difficulty: (window.GameShell.getDifficulty && window.GameShell.getDifficulty()) || 'normal' }); } catch (e) {}
    // (Auto-share removed — it was popping the OS "Share" dialog after every game.)
  }
};

// ── PATCH hitEnemy for kill tracking + achievements ──
const _origHitEnemy = hitEnemy;
hitEnemy = function(enemy, pts, diving) {
  const wasAlive = enemy.hp > 0;
  _origHitEnemy.apply(this, arguments);
  if (wasAlive && enemy.hp <= 0) {
    sessionKills++;
    if (enemy.type === 4) { sessionBosses++; unlockAch('boss_slayer'); }
    checkAchievements();
    triggerShake(enemy.type === 4 ? 6 : 2, 0.15);
  }
};

// ── PATCH applyPowerUp for achievements ──
const _origApplyPowerUp = applyPowerUp;
applyPowerUp = function(type) {
  _origApplyPowerUp.apply(this, arguments);
  if (type === 'shield') unlockAch('shield_up');
  if (type === 'rapidFire') unlockAch('rapid_fire');
  if (type === 'dualShip') unlockAch('dual_ship');
};

// ── PATCH challenging tally for perfect achievement ──
// We check in updateChallengingStage's completion
const _origUpdateChallenging = updateChallengingStage;
updateChallengingStage = function(dt) {
  _origUpdateChallenging.apply(this, arguments);
  if (state === 'challengingTally' && challengingHits >= challengingTotal) unlockAch('perfect_stage');
};

// ── PAUSE BUTTON ──
const pauseBtn = document.getElementById('pause-btn');
pauseBtn.addEventListener('click', () => {
  if (state === 'playing') { paused = true; state = 'paused'; }
  else if (state === 'paused') { paused = false; state = 'playing'; }
});
function updatePauseBtn() {
  pauseBtn.style.display = (state === 'playing' || state === 'paused') ? 'flex' : 'none';
}

// Auto-pause on tab blur
document.addEventListener('visibilitychange', () => {
  if (document.hidden && state === 'playing') { paused = true; state = 'paused'; }
});

// ── CANVAS TITLE SCREEN EXTRA BUTTONS ──
// Returns true if a menu button was hit at title screen
function checkTitleMenuHit(clientX, clientY) {
  if (state !== 'title') return false;
  const cx = clientX / scale;
  const cy = clientY / scale;
  if (cx > BASE_W/2 - 80 && cx < BASE_W/2 + 80) {
    if (cy > 503 && cy < 523) { openProfilePanel(); return true; }
    if (cy > 528 && cy < 548) { openSettingsPanel(); return true; }
  }
  return false;
}

// ── MOUSE / POINTER INPUT (desktop parity with touch) ──
canvas.addEventListener('mousedown', e => {
  ensureAudio();
  if (state === 'title') {
    if (typeof checkTitleMenuHit === 'function' && checkTitleMenuHit(e.clientX, e.clientY)) return;
    startGame(); return;
  }
  if (state === 'gameOver') { startGame(); return; }
  if (state === 'paused') { paused = false; state = 'playing'; return; }
  const p = toGame(e.clientX, e.clientY);
  touchActive = true; touchPX = p.x; touchPY = p.y;
});
canvas.addEventListener('mousemove', e => {
  if (!touchActive) return;
  const p = toGame(e.clientX, e.clientY);
  touchPX = p.x; touchPY = p.y;
});
canvas.addEventListener('mouseup', () => { touchActive = false; });
canvas.addEventListener('mouseleave', () => { touchActive = false; });

// ── SCREEN SHAKE OFFSET (applied per-frame to the canvas element) ──
function applyShake() {
  if (shakeTimer > 0) {
    const ox = (Math.random() - 0.5) * shakeAmt * 2;
    const oy = (Math.random() - 0.5) * shakeAmt * 2;
    canvas.style.transform = 'translate(' + ox.toFixed(1) + 'px,' + oy.toFixed(1) + 'px)';
  } else if (canvas.style.transform) {
    canvas.style.transform = '';
  }
}

// ── MAIN LOOP ──
function frame(now) {
  if (!lastTime) lastTime = now;
  let dt = (now - lastTime) / 1000;
  lastTime = now;
  // Clamp dt so a backgrounded tab can't fast-forward the simulation
  if (dt > 0.05) dt = 0.05;

  if (shakeTimer > 0) shakeTimer -= dt;

  update(dt);
  draw();
  applyShake();
  updatePauseBtn();

  requestAnimationFrame(frame);
}

// ── BOOT ──
updatePauseBtn();
requestAnimationFrame(frame);

</script>
