<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>SwiftStride</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%; height: 100%;
    background: #111;
    display: flex; align-items: center; justify-content: center;
    overflow: hidden;
    font-family: 'Courier New', monospace;
    touch-action: none;
  }
  #c {
    display: block;
    cursor: pointer;
    image-rendering: pixelated;
    image-rendering: crisp-edges;
  }
  /* Overlay panels */
  #profilePanel, #settingsPanel, #leaderboardPanel {
    display: none;
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.85);
    z-index: 10;
    align-items: center; justify-content: center;
    flex-direction: column;
    color: #E8E0D0;
    font-family: 'Courier New', monospace;
  }
  #profilePanel.open, #settingsPanel.open, #leaderboardPanel.open {
    display: flex;
  }
  .panel-box {
    background: #1a1a2e;
    border: 2px solid #4CC9F0;
    border-radius: 8px;
    padding: 24px 32px;
    min-width: 320px;
    max-width: 90vw;
    max-height: 80vh;
    overflow-y: auto;
  }
  .panel-box h2 {
    color: #4CC9F0;
    margin-bottom: 16px;
    font-size: 20px;
    text-align: center;
    letter-spacing: 2px;
  }
  .panel-box label { display: block; margin: 8px 0 4px; font-size: 13px; color: #aaa; }
  .panel-box input[type="text"] {
    background: #111; border: 1px solid #4CC9F0; color: #E8E0D0;
    font-family: 'Courier New', monospace; font-size: 14px;
    padding: 6px 10px; width: 100%; border-radius: 4px;
  }
  .panel-stat { display: flex; justify-content: space-between; padding: 5px 0; font-size: 13px; border-bottom: 1px solid #333; }
  .panel-stat span:last-child { color: #4CC9F0; }
  .panel-btn {
    margin-top: 12px; padding: 8px 20px;
    background: transparent; border: 2px solid #4CC9F0; color: #4CC9F0;
    font-family: 'Courier New', monospace; font-size: 13px;
    border-radius: 4px; cursor: pointer; width: 100%; letter-spacing: 1px;
  }
  .panel-btn:hover { background: #4CC9F0; color: #111; }
  .panel-btn.danger { border-color: #E85D3B; color: #E85D3B; }
  .panel-btn.danger:hover { background: #E85D3B; color: #fff; }
  .settings-row {
    display: flex; align-items: center; justify-content: space-between;
    padding: 8px 0; border-bottom: 1px solid #333;
  }
  .settings-row label { font-size: 13px; color: #aaa; margin: 0; }
  .settings-row input[type="range"] { width: 120px; accent-color: #4CC9F0; }
  .toggle-btn {
    padding: 4px 14px; border-radius: 12px; cursor: pointer;
    font-family: 'Courier New', monospace; font-size: 12px; border: none;
  }
  .toggle-btn.on  { background: #4CC9F0; color: #111; }
  .toggle-btn.off { background: #333; color: #E8E0D0; }
  .lb-row { display: flex; justify-content: space-between; padding: 5px 0; font-size: 13px; border-bottom: 1px solid #333; }
  .lb-row .rank { color: #4CC9F0; width: 28px; }
  .lb-row .lbname { flex: 1; color: #E8E0D0; }
  .lb-row .lbscore { color: #E85D3B; }
  .lb-row .lbdate { font-size: 11px; color: #666; width: 80px; text-align: right; }
  .achievement-list { margin-top: 8px; }
  .ach-item { display: flex; align-items: center; gap: 10px; padding: 5px 0; font-size: 12px; border-bottom: 1px solid #222; }
  .ach-icon { font-size: 16px; }
  .ach-name { color: #E8E0D0; flex: 1; }
  .ach-locked { color: #555; }
  .ach-unlocked { color: #4CC9F0; }
  /* Toast */
  #toastContainer {
    position: fixed; bottom: 20px; right: 20px;
    z-index: 20; display: flex; flex-direction: column; gap: 8px;
    pointer-events: none;
  }
  .toast {
    background: #1a1a2e; border: 2px solid #4CC9F0; color: #E8E0D0;
    padding: 10px 16px; border-radius: 8px; font-family: 'Courier New', monospace;
    font-size: 13px; opacity: 0; transform: translateX(40px);
    transition: opacity 0.3s, transform 0.3s;
    max-width: 280px;
  }
  .toast.show { opacity: 1; transform: translateX(0); }
  /* Pause button */
  #pauseBtn {
    position: fixed; top: 8px; right: 8px; z-index: 5;
    background: transparent; border: none; font-size: 22px;
    cursor: pointer; display: none; color: #E8E0D0;
    padding: 4px 8px;
  }
  @media (prefers-reduced-motion: reduce) {
    .toast { transition: none; }
  }
</style>

<script>window.GS_CONFIG={"id":"18-endless-runner","title":"Endless Runner","difficulties":["easy","normal","hard"],"howToPlay":"\u003cp>\u003cstrong>Goal:\u003c/strong> run as far as you can.\u003c/p>\u003cul>\u003cli>\u003cstrong>Controls:\u003c/strong> jump (Space/tap), slide (down).\u003c/li>\u003cli>Dodge obstacles, collect coins.\u003c/li>\u003cli>Speed increases over time.\u003c/li>\u003c/ul>","hints":["Jump a touch early — late jumps clip obstacles.","Learn obstacle patterns; they repeat.","Don't grab a coin if it means a crash."]};</script>
<script>
/* ===========================================================================
 * GameShell v1 — universal drop-in options overlay for single-file web games.
 * Adds: Settings (Sound, Music, Difficulty, Theme, Leaderboard, How to Play,
 * Reset) + an in-play control bar (Hint, Sound, Settings) with a rate-limited
 * Hint (2 / 24h, refills on new game). Game-agnostic, namespaced, Shadow-DOM
 * isolated, persisted per game. Safe to inject into any HTML game once.
 * ======================================================================== */
(function () {
  "use strict";
  if (window.__gsInstalled) return;
  window.__gsInstalled = true;

  /* ---------- per-game config (injected just above this script) ---------- */
  var CFG = window.GS_CONFIG || {};
  var GID = CFG.id || (location.pathname.split("/").filter(Boolean).pop() || "game").replace(/\.html?$/i, "");
  var TITLE = CFG.title || document.title || "Game";
  var DIFFS = (CFG.difficulties && CFG.difficulties.length) ? CFG.difficulties : ["easy", "normal", "hard"];
  var HOWTO = CFG.howToPlay || "<p>Use the on-screen controls (or your keyboard) to play. Your progress is saved automatically on this device.</p>";
  var TIPS = (CFG.hints && CFG.hints.length) ? CFG.hints.slice() : [
    "Take your time — there's no rush.",
    "Plan one move ahead before you commit.",
    "Stuck? Try a new game from Settings to reset and get fresh hints."
  ];
  var HINT_MAX = CFG.hintMax || 2;
  var WINDOW_MS = 24 * 60 * 60 * 1000;

  /* ----------------------------- storage --------------------------------- */
  function k(name) { return "gs:" + GID + ":" + name; }
  function load(name, def) {
    try { var v = JSON.parse(localStorage.getItem(k(name))); return v == null ? def : v; }
    catch (e) { return def; }
  }
  function save(name, val) { try { localStorage.setItem(k(name), JSON.stringify(val)); } catch (e) {} }

  var SDEF = { v: 1, sound: true, music: true, difficulty: (DIFFS.indexOf("normal") >= 0 ? "normal" : DIFFS[0]), theme: "system" };
  var settings = Object.assign({}, SDEF, load("settings", {}));
  if (DIFFS.indexOf(settings.difficulty) < 0) settings.difficulty = SDEF.difficulty;
  function persist() { save("settings", settings); }

  /* ------------------------- tiny event emitter -------------------------- */
  var subs = {};
  function on(ev, fn) { (subs[ev] = subs[ev] || []).push(fn); return function () { subs[ev] = (subs[ev] || []).filter(function (f) { return f !== fn; }); }; }
  function emit(ev, data) {
    (subs[ev] || []).forEach(function (fn) { try { fn(data); } catch (e) {} });
    try { window.dispatchEvent(new CustomEvent("gs:" + ev, { detail: data })); } catch (e) {}
  }

  /* ============================== AUDIO ================================== */
  /* Sound = master (everything). Music = looping media + opt-in music gain. */
  var soundOn = settings.sound, musicOn = settings.music;
  var acRegistry = [];

  (function patchWebAudio() {
    var Orig = window.AudioContext || window.webkitAudioContext;
    if (!Orig || Orig.__gsPatched) return;
    function Patched() {
      var ctx = arguments.length ? new Orig(arguments[0]) : new Orig();
      try {
        var realDest = ctx.destination;
        var sfx = ctx.createGain(); sfx.connect(realDest);
        var music = ctx.createGain(); music.connect(realDest);
        sfx.gain.value = soundOn ? 1 : 0;
        music.gain.value = (soundOn && musicOn) ? 1 : 0;
        Object.defineProperty(ctx, "destination", { get: function () { return sfx; }, configurable: true });
        ctx.__gsSfx = sfx; ctx.__gsMusic = music; ctx.__gsRealDest = realDest;
        acRegistry.push(ctx);
      } catch (e) {}
      return ctx;
    }
    try { Patched.prototype = Orig.prototype; } catch (e) {}
    Patched.__gsPatched = true;
    try { window.AudioContext = Patched; } catch (e) {}
    try { window.webkitAudioContext = Patched; } catch (e) {}
  })();

  var mediaEls = [];
  (function patchMedia() {
    if (!window.HTMLMediaElement || HTMLMediaElement.__gsPatched) return;
    var proto = HTMLMediaElement.prototype;
    var d = Object.getOwnPropertyDescriptor(proto, "muted");
    if (d && d.get && d.set) {
      Object.defineProperty(proto, "muted", {
        configurable: true,
        get: function () { return (!soundOn) || (this.loop && !musicOn) || d.get.call(this); },
        set: function (v) { try { d.set.call(this, v); } catch (e) {} }
      });
    }
    var op = proto.play;
    proto.play = function () {
      if (mediaEls.indexOf(this) < 0) mediaEls.push(this);
      try { this.volume = this.volume; } catch (e) {}
      return op.apply(this, arguments);
    };
    HTMLMediaElement.__gsPatched = true;
  })();

  function applyAudio() {
    acRegistry.forEach(function (ctx) {
      try {
        if (ctx.__gsSfx) ctx.__gsSfx.gain.setValueAtTime(soundOn ? 1 : 0, ctx.currentTime);
        if (ctx.__gsMusic) ctx.__gsMusic.gain.setValueAtTime((soundOn && musicOn) ? 1 : 0, ctx.currentTime);
      } catch (e) {}
    });
    mediaEls.forEach(function (el) { try { el.muted = el.muted; } catch (e) {} });
  }

  /* ============================== THEME ================================== */
  function applyTheme() {
    var t = settings.theme;
    var root = document.documentElement;
    root.classList.remove("gs-theme-light", "gs-theme-dark", "gs-theme-system");
    root.classList.add("gs-theme-" + t);
    var eff = t;
    if (t === "system") {
      eff = (window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches) ? "dark" : "light";
    }
    try { root.style.colorScheme = (t === "system") ? "light dark" : t; } catch (e) {}
    var bd = document.getElementById("gs-backdrop");
    if (bd) bd.style.background = (eff === "dark") ? "#0e1014" : "#eef1f6";
    if (host) host.setAttribute("data-theme", eff);
    emit("theme", { theme: t, effective: eff });
  }
  if (window.matchMedia) {
    try { window.matchMedia("(prefers-color-scheme: dark)").addEventListener("change", function () { if (settings.theme === "system") applyTheme(); }); }
    catch (e) {}
  }

  /* ============================== HINTS ================================== */
  function hintState() {
    var s = load("hint", { v: 1, spentAt: [], puzzleId: "", lastSeen: Date.now() });
    var now = Date.now();
    // anti-tamper: clamp future stamps; ignore large backward clock jumps
    if (s.lastSeen && now < s.lastSeen - 60000) { s.spentAt = (s.spentAt || []).map(function () { return now; }); }
    s.spentAt = (s.spentAt || []).map(function (t) { return t > now ? now : t; }).filter(function (t) { return now - t < WINDOW_MS; });
    s.lastSeen = now;
    return s;
  }
  function hintsLeft() { var s = hintState(); save("hint", s); return Math.max(0, HINT_MAX - s.spentAt.length); }
  function nextHintMs() {
    var s = hintState();
    if (s.spentAt.length < HINT_MAX) return 0;
    var oldest = Math.min.apply(null, s.spentAt);
    return Math.max(0, WINDOW_MS - (Date.now() - oldest));
  }
  function spendHint() {
    var s = hintState();
    if (HINT_MAX - s.spentAt.length <= 0) return false;
    s.spentAt.push(Date.now()); save("hint", s); return true;
  }
  function refillHints(puzzleId) {
    var s = hintState();
    if (puzzleId != null && String(puzzleId) === String(s.puzzleId)) { save("hint", s); return; } // same board: no mint
    s.spentAt = []; s.puzzleId = (puzzleId == null ? "" : String(puzzleId)); save("hint", s);
    updateHintBadge();
  }
  var tipIdx = 0;
  function provideHintText() {
    if (typeof CFG.onHint === "function") { try { var r = CFG.onHint(); if (r) return String(r); } catch (e) {} }
    var t = TIPS[tipIdx % TIPS.length]; tipIdx++; return t;
  }

  /* ============================ LEADERBOARD ============================= */
  function getBoard(diff) { var b = load("scores", { v: 1, boards: {} }); return (b.boards && b.boards[diff]) || []; }
  function submitScore(score, opts) {
    score = Number(score); if (!isFinite(score)) return;
    opts = opts || {};
    var diff = opts.difficulty || settings.difficulty;
    var name = (opts.name || "You").toString().slice(0, 12);
    var b = load("scores", { v: 1, boards: {} }); b.boards = b.boards || {};
    var list = b.boards[diff] || [];
    list.push({ name: name, score: score, ts: Date.now() });
    list.sort(function (a, c) { return c.score - a.score; });
    b.boards[diff] = list.slice(0, 10);
    save("scores", b);
    emit("score", { score: score, difficulty: diff });
    return b.boards[diff];
  }

  /* ============================== UI SHELL ============================== */
  var host, root, $bar, $hintBtn, $soundBtn, $modal, $panelHost;
  var lastFocus = null;

  var CSS = ''
    + ':host{all:initial}'
    + '*{box-sizing:border-box;font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif}'
    + '.bar{position:fixed;top:0;right:0;display:flex;gap:6px;padding:8px;'
    + 'padding-top:max(8px,env(safe-area-inset-top));padding-right:max(8px,env(safe-area-inset-right));z-index:5}'
    + '.btn{all:unset;cursor:pointer;display:flex;align-items:center;justify-content:center;'
    + 'min-width:44px;min-height:44px;width:44px;height:44px;border-radius:12px;font-size:20px;line-height:1;'
    + 'background:var(--c-btn);color:var(--c-tx);box-shadow:0 2px 8px rgba(0,0,0,.25);'
    + 'touch-action:manipulation;-webkit-tap-highlight-color:transparent;position:relative;transition:transform .08s,background .15s}'
    + '.btn:hover{background:var(--c-btnH)}.btn:active{transform:scale(.92)}'
    + '.btn:focus-visible{outline:3px solid var(--c-acc);outline-offset:2px}'
    + '.badge{position:absolute;top:-4px;right:-4px;min-width:18px;height:18px;padding:0 4px;border-radius:9px;'
    + 'background:var(--c-acc);color:#fff;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center}'
    + '.btn.off{opacity:.45}'
    + '.scrim{position:fixed;inset:0;background:rgba(0,0,0,.55);display:none;align-items:center;justify-content:center;z-index:10;'
    + 'padding:16px;padding-top:max(16px,env(safe-area-inset-top));padding-bottom:max(16px,env(safe-area-inset-bottom))}'
    + '.scrim.open{display:flex}'
    + '.modal{width:min(420px,100%);max-height:88vh;overflow:auto;background:var(--c-bg);color:var(--c-tx);'
    + 'border-radius:18px;box-shadow:0 18px 60px rgba(0,0,0,.5);padding:18px;-webkit-overflow-scrolling:touch}'
    + '.mhead{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}'
    + '.mtitle{font-size:18px;font-weight:800;letter-spacing:.2px}'
    + '.x{all:unset;cursor:pointer;font-size:22px;width:40px;height:40px;display:flex;align-items:center;justify-content:center;border-radius:10px;color:var(--c-tx)}'
    + '.x:hover{background:var(--c-btn)}.x:focus-visible{outline:3px solid var(--c-acc)}'
    + '.sub{font-size:12px;color:var(--c-mut);margin:-2px 0 12px}'
    + '.row{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:11px 2px;border-top:1px solid var(--c-line)}'
    + '.row .lab{font-size:15px;font-weight:600}.row .desc{font-size:12px;color:var(--c-mut);margin-top:2px}'
    + '.seg{display:flex;gap:4px;background:var(--c-btn);padding:4px;border-radius:12px}'
    + '.seg button{all:unset;cursor:pointer;padding:8px 12px;min-height:36px;border-radius:9px;font-size:13px;font-weight:600;color:var(--c-mut);touch-action:manipulation}'
    + '.seg button[aria-pressed=true]{background:var(--c-acc);color:#fff}'
    + '.seg button:focus-visible{outline:2px solid var(--c-acc)}'
    + '.sw{all:unset;cursor:pointer;width:52px;height:30px;border-radius:16px;background:var(--c-line);position:relative;transition:background .15s;flex:0 0 auto}'
    + '.sw::after{content:"";position:absolute;top:3px;left:3px;width:24px;height:24px;border-radius:50%;background:#fff;transition:left .15s;box-shadow:0 1px 3px rgba(0,0,0,.4)}'
    + '.sw[aria-checked=true]{background:var(--c-acc)}.sw[aria-checked=true]::after{left:25px}'
    + '.sw:focus-visible{outline:3px solid var(--c-acc);outline-offset:2px}'
    + '.lbtn{all:unset;cursor:pointer;display:block;width:100%;text-align:left;padding:13px 12px;margin-top:8px;border-radius:12px;'
    + 'background:var(--c-btn);color:var(--c-tx);font-size:15px;font-weight:600;touch-action:manipulation}'
    + '.lbtn:hover{background:var(--c-btnH)}.lbtn:focus-visible{outline:3px solid var(--c-acc)}'
    + '.lbtn.danger{color:#ff6b6b}'
    + '.back{all:unset;cursor:pointer;font-size:14px;color:var(--c-acc);font-weight:700;margin-bottom:8px;display:inline-flex;gap:4px;align-items:center}'
    + '.howto{font-size:14px;line-height:1.6}.howto p{margin:8px 0}.howto strong{color:var(--c-acc)}'
    + '.howto ul{margin:8px 0;padding-left:20px}.howto li{margin:4px 0}'
    + '.lbtabs{display:flex;gap:6px;margin:6px 0 10px}'
    + '.lbtabs button{all:unset;cursor:pointer;flex:1;text-align:center;padding:8px;border-radius:10px;background:var(--c-btn);font-size:13px;font-weight:600;color:var(--c-mut)}'
    + '.lbtabs button[aria-pressed=true]{background:var(--c-acc);color:#fff}'
    + '.lblist{list-style:none;margin:0;padding:0}'
    + '.lblist li{display:flex;justify-content:space-between;padding:9px 6px;border-top:1px solid var(--c-line);font-size:14px}'
    + '.lblist li span:first-child{color:var(--c-mut)}'
    + '.empty{color:var(--c-mut);font-size:14px;text-align:center;padding:18px}'
    + '.toast{position:fixed;left:50%;bottom:max(18px,env(safe-area-inset-bottom));transform:translateX(-50%);'
    + 'background:var(--c-bg);color:var(--c-tx);border:1px solid var(--c-line);padding:12px 16px;border-radius:12px;'
    + 'max-width:86vw;font-size:14px;box-shadow:0 8px 30px rgba(0,0,0,.4);z-index:20;opacity:0;transition:opacity .2s,transform .2s;pointer-events:none}'
    + '.toast.show{opacity:1;transform:translateX(-50%) translateY(-4px)}'
    + ':host([data-theme=dark]){--c-bg:#171a21;--c-tx:#f2f4f8;--c-mut:#9aa3b2;--c-line:#2c313c;--c-btn:#222732;--c-btnH:#2c333f;--c-acc:#4f8cff}'
    + ':host([data-theme=light]){--c-bg:#ffffff;--c-tx:#15181f;--c-mut:#646b7a;--c-line:#e6e8ee;--c-btn:#eef1f6;--c-btnH:#e3e7ef;--c-acc:#2f6bff}'
    + '@media (prefers-reduced-motion: reduce){*{transition:none!important}}';

  function el(tag, attrs, html) {
    var n = document.createElement(tag);
    if (attrs) for (var a in attrs) n.setAttribute(a, attrs[a]);
    if (html != null) n.innerHTML = html;
    return n;
  }

  function buildUI() {
    // backdrop (light DOM, behind everything)
    var bd = el("div", { id: "gs-backdrop" });
    bd.style.cssText = "position:fixed;inset:0;z-index:-1;pointer-events:none";
    document.body.appendChild(bd);

    host = el("div", { id: "gs-host" });
    host.style.cssText = "position:fixed;top:0;left:0;width:0;height:0;z-index:2147483647;isolation:isolate";
    document.body.appendChild(host);
    root = host.attachShadow ? host.attachShadow({ mode: "open" }) : host;
    var style = el("style"); style.textContent = CSS; root.appendChild(style);

    // ---- in-play control bar: Hint · Sound · Settings ----
    $bar = el("div", { class: "bar" });
    $hintBtn = el("button", { class: "btn", "aria-label": "Hint", title: "Hint" }, "💡");
    $hintBtn.appendChild(el("span", { class: "badge" }, String(HINT_MAX)));
    $soundBtn = el("button", { class: "btn", "aria-label": "Toggle sound", title: "Sound" }, "🔊");
    var $setBtn = el("button", { class: "btn", "aria-label": "Settings", title: "Settings" }, "⚙️");
    $bar.appendChild($hintBtn); $bar.appendChild($soundBtn); $bar.appendChild($setBtn);
    root.appendChild($bar);

    // ---- modal scrim + container ----
    $modal = el("div", { class: "scrim", role: "dialog", "aria-modal": "true", "aria-label": "Settings" });
    $panelHost = el("div", { class: "modal" });
    $modal.appendChild($panelHost);
    root.appendChild($modal);

    $hintBtn.addEventListener("click", doHint);
    $soundBtn.addEventListener("click", function () { setSound(!soundOn); });
    $setBtn.addEventListener("click", openSettings);
    $modal.addEventListener("click", function (e) { if (e.target === $modal) closeModal(); });
    root.addEventListener("keydown", function (e) { if (e.key === "Escape" && $modal.classList.contains("open")) closeModal(); trapFocus(e); });

    updateSoundBtn(); updateHintBadge();
  }

  function updateSoundBtn() { if ($soundBtn) { $soundBtn.textContent = soundOn ? "🔊" : "🔇"; $soundBtn.classList.toggle("off", !soundOn); } }
  function updateHintBadge() {
    if (!$hintBtn) return;
    var left = hintsLeft();
    var b = $hintBtn.querySelector(".badge");
    if (b) b.textContent = String(left);
    $hintBtn.classList.toggle("off", left === 0);
  }

  /* ----------------------------- panels --------------------------------- */
  function openModal(render) {
    lastFocus = document.activeElement;
    render();
    $modal.classList.add("open");
    var f = $panelHost.querySelector("button,[tabindex],input"); if (f) f.focus();
  }
  function closeModal() {
    $modal.classList.remove("open");
    if (lastFocus && lastFocus.focus) { try { lastFocus.focus(); } catch (e) {} }
  }
  function trapFocus(e) {
    if (e.key !== "Tab" || !$modal.classList.contains("open")) return;
    var f = $panelHost.querySelectorAll('button,[href],input,[tabindex]:not([tabindex="-1"])');
    if (!f.length) return;
    var first = f[0], last = f[f.length - 1];
    if (e.shiftKey && root.activeElement === first) { e.preventDefault(); last.focus(); }
    else if (!e.shiftKey && root.activeElement === last) { e.preventDefault(); first.focus(); }
  }

  function header(title, withBack) {
    var h = el("div", { class: "mhead" });
    var left = el("div");
    if (withBack) { var b = el("button", { class: "back", "aria-label": "Back to settings" }, "‹ Back"); b.addEventListener("click", openSettings); left.appendChild(b); }
    left.appendChild(el("div", { class: "mtitle" }, title));
    var x = el("button", { class: "x", "aria-label": "Close" }, "✕"); x.addEventListener("click", closeModal);
    h.appendChild(left); h.appendChild(x); return h;
  }

  function renderSettings() {
    $panelHost.innerHTML = "";
    $panelHost.setAttribute("aria-label", "Settings");
    $panelHost.appendChild(header("Settings"));
    $panelHost.appendChild(el("div", { class: "sub" }, TITLE));

    // Sound
    $panelHost.appendChild(toggleRow("Sound", "All game audio", soundOn, function (v) { setSound(v); }));
    // Music
    $panelHost.appendChild(toggleRow("Music", "Background music only", musicOn, function (v) { setMusic(v); }));

    // Difficulty
    var dr = el("div", { class: "row" });
    var dl = el("div"); dl.appendChild(el("div", { class: "lab" }, "Difficulty"));
    dl.appendChild(el("div", { class: "desc" }, "Applies on your next new game"));
    dr.appendChild(dl);
    dr.appendChild(segment(DIFFS.map(cap), DIFFS.indexOf(settings.difficulty), function (i) {
      settings.difficulty = DIFFS[i]; persist(); emit("difficulty", { difficulty: settings.difficulty });
    }));
    $panelHost.appendChild(dr);

    // Theme
    var tr = el("div", { class: "row" });
    var tl = el("div"); tl.appendChild(el("div", { class: "lab" }, "Theme"));
    tl.appendChild(el("div", { class: "desc" }, "System · Light · Dark"));
    tr.appendChild(tl);
    var TH = ["system", "light", "dark"];
    tr.appendChild(segment(["System", "Light", "Dark"], TH.indexOf(settings.theme), function (i) {
      settings.theme = TH[i]; persist(); applyTheme();
    }));
    $panelHost.appendChild(tr);

    // Leaderboard / How to Play / Reset
    var lb = el("button", { class: "lbtn" }, "🏆  Leaderboard"); lb.addEventListener("click", function () { openModal(renderLeaderboard); });
    var ht = el("button", { class: "lbtn" }, "❓  How to Play"); ht.addEventListener("click", function () { openModal(renderHowTo); });
    var rs = el("button", { class: "lbtn danger" }, "↺  Reset progress"); rs.addEventListener("click", resetProgress);
    $panelHost.appendChild(lb); $panelHost.appendChild(ht); $panelHost.appendChild(rs);
  }

  function renderHowTo() {
    $panelHost.innerHTML = "";
    $panelHost.appendChild(header("How to Play", true));
    $panelHost.appendChild(el("div", { class: "howto" }, HOWTO));
  }

  var lbActive = null;
  function renderLeaderboard() {
    $panelHost.innerHTML = "";
    $panelHost.appendChild(header("Leaderboard", true));
    if (lbActive == null) lbActive = settings.difficulty;
    var tabs = el("div", { class: "lbtabs" });
    DIFFS.forEach(function (d) {
      var b = el("button", { "aria-pressed": String(d === lbActive) }, cap(d));
      b.addEventListener("click", function () { lbActive = d; renderLeaderboard(); });
      tabs.appendChild(b);
    });
    $panelHost.appendChild(tabs);
    var list = getBoard(lbActive);
    if (!list.length) { $panelHost.appendChild(el("div", { class: "empty" }, "No scores yet.\nPlay a game to set a record!")); return; }
    var ul = el("ul", { class: "lblist" });
    list.forEach(function (r, i) {
      var li = el("li");
      li.appendChild(el("span", null, (i + 1) + ". " + r.name));
      li.appendChild(el("span", null, String(r.score)));
      ul.appendChild(li);
    });
    $panelHost.appendChild(ul);
  }

  function toggleRow(lab, desc, val, onChange) {
    var r = el("div", { class: "row" });
    var l = el("div"); l.appendChild(el("div", { class: "lab" }, lab)); l.appendChild(el("div", { class: "desc" }, desc));
    var sw = el("button", { class: "sw", role: "switch", "aria-checked": String(!!val), "aria-label": lab });
    sw.addEventListener("click", function () { var nv = sw.getAttribute("aria-checked") !== "true"; sw.setAttribute("aria-checked", String(nv)); onChange(nv); });
    r.appendChild(l); r.appendChild(sw); return r;
  }
  function segment(labels, active, onPick) {
    var s = el("div", { class: "seg", role: "group" });
    labels.forEach(function (lab, i) {
      var b = el("button", { "aria-pressed": String(i === active) }, lab);
      b.addEventListener("click", function () {
        Array.prototype.forEach.call(s.children, function (c, j) { c.setAttribute("aria-pressed", String(j === i)); });
        onPick(i);
      });
      s.appendChild(b);
    });
    return s;
  }

  /* --------------------------- behaviours -------------------------------- */
  function setSound(v) { soundOn = settings.sound = !!v; persist(); applyAudio(); updateSoundBtn(); emit("sound", { on: soundOn }); }
  function setMusic(v) { musicOn = settings.music = !!v; persist(); applyAudio(); emit("music", { on: musicOn }); }

  function doHint() {
    var left = hintsLeft();
    if (left <= 0) {
      var ms = nextHintMs(); var h = Math.floor(ms / 3600000), m = Math.ceil((ms % 3600000) / 60000);
      toast("No hints left. Next in " + h + "h " + m + "m — or start a new game.");
      return;
    }
    if (!spendHint()) return;
    updateHintBadge();
    toast("💡 " + provideHintText());
    emit("hint", { left: hintsLeft() });
  }

  function resetProgress() {
    if (!confirm("Reset ALL saved progress and high scores for " + TITLE + "? This cannot be undone.")) return;
    try {
      var rm = [];
      for (var i = 0; i < localStorage.length; i++) { var key = localStorage.key(i); if (key && key.indexOf("gs:" + GID + ":") === 0) rm.push(key); }
      rm.forEach(function (key) { localStorage.removeItem(key); });
    } catch (e) {}
    emit("reset", {});
    toast("Progress reset. Reloading…");
    setTimeout(function () { location.reload(); }, 700);
  }

  var toastT;
  function toast(msg) {
    var t = root.querySelector(".toast");
    if (!t) { t = el("div", { class: "toast" }); root.appendChild(t); }
    t.textContent = msg; t.classList.add("show");
    clearTimeout(toastT); toastT = setTimeout(function () { t.classList.remove("show"); }, 3200);
  }

  function openSettings() { openModal(renderSettings); }

  /* ----------------------------- public API ------------------------------ */
  window.GameShell = {
    version: 1,
    config: function (o) { Object.assign(CFG, o || {}); if (o) { if (o.howToPlay) HOWTO = o.howToPlay; if (o.hints) TIPS = o.hints.slice(); } return this; },
    getDifficulty: function () { return settings.difficulty; },
    onDifficulty: function (fn) { return on("difficulty", function (d) { fn(d.difficulty); }); },
    setDifficulty: function (d) { if (DIFFS.indexOf(d) >= 0) { settings.difficulty = d; persist(); emit("difficulty", { difficulty: d }); } },
    isSoundOn: function () { return soundOn; },
    isMusicOn: function () { return musicOn; },
    isMuted: function () { return !soundOn; },
    submitScore: submitScore,
    getScores: getBoard,
    newGame: function (puzzleId) { refillHints(puzzleId); emit("newgame", { puzzleId: puzzleId }); },
    useHint: doHint,
    hintsLeft: hintsLeft,
    onHint: function (fn) { CFG.onHint = fn; return this; },
    openSettings: openSettings,
    openHowToPlay: function () { openModal(renderHowTo); },
    openLeaderboard: function () { openModal(renderLeaderboard); },
    on: on,
    routeMusic: function (node, ctx) { try { if (ctx && ctx.__gsMusic && node && node.connect) { node.connect(ctx.__gsMusic); return true; } } catch (e) {} return false; }
  };

  /* ------------------------------ boot ----------------------------------- */
  function boot() {
    // ensure a viewport meta exists for mobile
    if (!document.querySelector('meta[name="viewport"]')) {
      var m = el("meta", { name: "viewport", content: "width=device-width, initial-scale=1, viewport-fit=cover" });
      document.head.appendChild(m);
    }
    buildUI();
    applyTheme();
    applyAudio();
    emit("ready", { id: GID });
  }
  function cap(s) { return s ? s.charAt(0).toUpperCase() + s.slice(1) : s; }

  if (document.readyState === "loading") document.addEventListener("DOMContentLoaded", boot);
  else boot();
})();

</script>
<!--/GAMESHELL_V1-->

<script>
// ─────────────────────────────────────────────
//  SwiftStride — Endless Runner  (Enhanced)
//  Fully self-contained, no external resources
// ─────────────────────────────────────────────

const SAVE_KEY_PREFIX = '18-endless-runner_';
const PROFILE_KEY     = '18-endless-runner_profile';
const SETTINGS_KEY    = '18-endless-runner_settings';
const LEADERBOARD_KEY = '18-endless-runner_leaderboard';
const BEST_KEY        = '18-endless-runner_best';   // legacy + current best score
const SAVE_VERSION    = 2;

// ── Reduced-motion preference ───────────────
const prefersReducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

// ── Safe localStorage helpers ────────────────
function lsGet(key, def) {
  try { const v = localStorage.getItem(key); return v === null ? def : v; }
  catch(e) { return def; }
}
function lsSet(key, val) {
  try { localStorage.setItem(key, val); } catch(e) {}
}
function lsGetJSON(key, def) {
  try { const v = localStorage.getItem(key); return v ? JSON.parse(v) : def; }
  catch(e) { return def; }
}
function lsSetJSON(key, obj) {
  try { localStorage.setItem(key, JSON.stringify(obj)); } catch(e) {}
}

// ── Player Profile ───────────────────────────
const PROFILE_DEFAULT = {
  version: SAVE_VERSION,
  id: null,
  name: '',
  gamesPlayed: 0,
  bestScore: 0,
  totalDistance: 0,
  totalJumps: 0,
  totalDucks: 0,
  nightReaches: 0,
  achievements: {},
  firstPlay: true,
};

let profile = lsGetJSON(PROFILE_KEY, null);
if (!profile || profile.version !== SAVE_VERSION) {
  // Migration: try to salvage bestScore from legacy key
  const legacyBest = parseInt(lsGet('swiftstride_best', '0'), 10) ||
                     parseInt(lsGet(BEST_KEY, '0'), 10);
  profile = Object.assign({}, PROFILE_DEFAULT);
  profile.id = (typeof crypto !== 'undefined' && crypto.randomUUID)
               ? crypto.randomUUID()
               : 'player_' + Math.random().toString(36).slice(2, 10);
  const adj = ['Swift','Bold','Quick','Brave','Sharp'];
  const suf = Math.random().toString(36).slice(2,5).toUpperCase();
  profile.name = adj[Math.floor(Math.random()*adj.length)] + '_' + suf;
  profile.bestScore = legacyBest;
  lsSetJSON(PROFILE_KEY, profile);
}

function saveProfile() { lsSetJSON(PROFILE_KEY, profile); }

// ── Settings ─────────────────────────────────
const SETTINGS_DEFAULT = {
  version: SAVE_VERSION,
  muted: false,
  volume: 0.5,
  musicOn: true,
  sfxOn: true,
};
let settings = lsGetJSON(SETTINGS_KEY, null);
if (!settings || settings.version !== SAVE_VERSION) {
  settings = Object.assign({}, SETTINGS_DEFAULT);
  // Migrate legacy mute
  const legacyMute = lsGet('swiftstride_muted', null);
  if (legacyMute === '1') settings.muted = true;
  lsSetJSON(SETTINGS_KEY, settings);
}
function saveSettings() { lsSetJSON(SETTINGS_KEY, settings); }

let muted = settings.muted;
let masterVol = settings.volume;
let musicOn = settings.musicOn;
let sfxOn = settings.sfxOn;

// ── Leaderboard ──────────────────────────────
function getLeaderboard() { return lsGetJSON(LEADERBOARD_KEY, []); }
function addLeaderboardEntry(sc) {
  let lb = getLeaderboard();
  lb.push({ score: sc, name: profile.name, date: new Date().toLocaleDateString() });
  lb.sort((a,b) => b.score - a.score);
  lb = lb.slice(0, 10);
  lsSetJSON(LEADERBOARD_KEY, lb);
}

// ── Achievements definition ──────────────────
const ACHIEVEMENTS = [
  { id:'first_run',    icon:'🏃', name:'First Run',      desc:'Complete your first run' },
  { id:'centurion',    icon:'💯', name:'Centurion',       desc:'Reach score 100' },
  { id:'night_owl',    icon:'🦉', name:'Night Owl',       desc:'Survive into night mode' },
  { id:'duck_master',  icon:'🦆', name:'Duck Master',     desc:'Duck 10 birds' },
  { id:'speed_demon',  icon:'⚡', name:'Speed Demon',     desc:'Reach maximum speed' },
  { id:'marathon',     icon:'🏅', name:'Marathon',        desc:'Reach score 1000' },
  { id:'undying',      icon:'💀', name:'Undying',         desc:'Score 500 in one run' },
  { id:'nightx3',      icon:'🌙', name:'Dark Veteran',    desc:'Reach night mode 3 times' },
];

function unlockAchievement(id) {
  if (profile.achievements[id]) return;
  profile.achievements[id] = Date.now();
  saveProfile();
  const ach = ACHIEVEMENTS.find(a => a.id === id);
  if (ach) showToast(ach.icon + ' Achievement: ' + ach.name);
}

// per-run duck-bird counter
let runDuckBirds = 0;
let runMaxSpeedHit = false;
let runNightHit = false;
let nightFlipCount = 0;

// ── Canvas / Resize ──────────────────────────
const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');
const LW = 800, LH = 300;
let scale = 1;

function resize() {
  const ww = window.innerWidth, wh = window.innerHeight;
  scale = Math.min(ww / LW, wh / LH);
  canvas.width  = Math.round(LW * scale);
  canvas.height = Math.round(LH * scale);
  canvas.style.width  = canvas.width  + 'px';
  canvas.style.height = canvas.height + 'px';
  ctx.setTransform(scale, 0, 0, scale, 0, 0);
}
window.addEventListener('resize', resize);
resize();

// ── WebAudio ─────────────────────────────────
let audioCtx = null;
let musicNodes = null;
let masterGain = null;

function getAudioCtx() {
  if (!audioCtx) {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    masterGain = audioCtx.createGain();
    masterGain.gain.value = muted ? 0 : masterVol;
    masterGain.connect(audioCtx.destination);
  }
  return audioCtx;
}

function setMasterVolume(v) {
  masterVol = v;
  if (masterGain) masterGain.gain.value = muted ? 0 : v;
}

function playTone(type, freq, duration, vol, freqEnd) {
  if (muted || !sfxOn) return;
  try {
    const ac  = getAudioCtx();
    const osc = ac.createOscillator();
    const g   = ac.createGain();
    osc.connect(g); g.connect(masterGain);
    osc.type = type;
    osc.frequency.setValueAtTime(freq, ac.currentTime);
    if (freqEnd !== undefined) osc.frequency.exponentialRampToValueAtTime(freqEnd, ac.currentTime + duration);
    g.gain.setValueAtTime(vol, ac.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + duration);
    osc.start(ac.currentTime);
    osc.stop(ac.currentTime + duration);
  } catch(e) {}
}

// Procedural looping music (simple arpeggiated ostinato)
let musicRunning = false;
let musicTimeout = null;

const MUSIC_NOTES_DAY   = [261, 329, 392, 523, 440, 392, 329, 261];
const MUSIC_NOTES_NIGHT = [220, 277, 330, 415, 370, 330, 277, 220];
let musicNoteIdx = 0;

function stopMusic() {
  musicRunning = false;
  if (musicTimeout) { clearTimeout(musicTimeout); musicTimeout = null; }
}

function playMusicNote() {
  if (!musicRunning || muted || !musicOn) return;
  try {
    const ac = getAudioCtx();
    const notes = (palMode === 'night') ? MUSIC_NOTES_NIGHT : MUSIC_NOTES_DAY;
    const freq = notes[musicNoteIdx % notes.length];
    musicNoteIdx++;
    const osc = ac.createOscillator();
    const g   = ac.createGain();
    osc.connect(g); g.connect(masterGain);
    osc.type = 'triangle';
    osc.frequency.value = freq;
    g.gain.setValueAtTime(0.07, ac.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + 0.18);
    osc.start(ac.currentTime);
    osc.stop(ac.currentTime + 0.2);
  } catch(e) {}
  musicTimeout = setTimeout(playMusicNote, 160);
}

function startMusic() {
  if (musicRunning || muted || !musicOn) return;
  musicRunning = true;
  musicNoteIdx = 0;
  playMusicNote();
}

function sfxJump()      { playTone('sine', 280, 0.08, 0.3, 420); }
function sfxLand()      { playTone('sine', 120, 0.06, 0.25, 80); }
function sfxDuck()      { playTone('sawtooth', 200, 0.10, 0.15, 140); }
function sfxDie()       {
  if (muted || !sfxOn) return;
  playTone('sawtooth', 320, 0.12, 0.35, 60);
  setTimeout(() => playTone('square', 80, 0.18, 0.3, 40), 100);
}
function sfxMilestone() { playTone('sine', 660, 0.12, 0.5, 880); }
function sfxNight()     { playTone('sine', 440, 0.15, 0.4, 660); }
function sfxAchievement(){ playTone('sine', 880, 0.06, 0.4, 1320); }
function sfxPause()     { playTone('sine', 330, 0.06, 0.2); }

// ── Palette ──────────────────────────────────
const PALETTES = {
  day: {
    sky:        '#F5F0E8',
    ground:     '#2C2C2C',
    groundLine: '#2C2C2C',
    player:     '#2C2C2C',
    obstacle:   '#2C2C2C',
    bird:       '#E85D3B',
    cloud:      '#D4CCBB',
    text:       '#2C2C2C',
    hud:        '#2C2C2C',
    milestone:  '#E85D3B',
    dust:       '#C8C0AC',
  },
  night: {
    sky:        '#1A1A2E',
    ground:     '#E8E0D0',
    groundLine: '#E8E0D0',
    player:     '#E8E0D0',
    obstacle:   '#E8E0D0',
    bird:       '#4CC9F0',
    cloud:      '#2A2A4E',
    text:       '#E8E0D0',
    hud:        '#E8E0D0',
    milestone:  '#4CC9F0',
    dust:       '#3A3A5E',
  }
};

let palMode  = 'day';
let palBlend = 0;
let palTarget = 'day';
let pal = Object.assign({}, PALETTES.day);

// Stars for night mode
let stars = [];
function initStars() {
  stars = [];
  for (let i = 0; i < 40; i++) {
    stars.push({
      x: Math.random() * LW,
      y: Math.random() * (GROUND_Y - 30) * 0.7,
      r: 0.5 + Math.random() * 1.5,
      twinkle: Math.random() * Math.PI * 2,
      twinkleSpeed: 1 + Math.random() * 2,
    });
  }
}
// NOTE: initStars() is NOT called here — it reads GROUND_Y, which is a `const`
// declared further down. Calling it now hits the temporal dead zone and throws,
// crashing the whole script (blank screen). It is called after GROUND_Y exists.

function lerpColor(a, b, t) {
  const ah = parseInt(a.slice(1), 16), bh = parseInt(b.slice(1), 16);
  const ar = (ah >> 16) & 0xff, ag = (ah >> 8) & 0xff, ab = ah & 0xff;
  const br = (bh >> 16) & 0xff, bg = (bh >> 8) & 0xff, bb = bh & 0xff;
  const rr = Math.round(ar + (br - ar) * t);
  const rg = Math.round(ag + (bg - ag) * t);
  const rb = Math.round(ab + (bb - ab) * t);
  return '#' + ((1 << 24) | (rr << 16) | (rg << 8) | rb).toString(16).slice(1);
}

function updatePalette(dt) {
  if (palMode !== palTarget) {
    palBlend = Math.min(1, palBlend + dt * 2.5);
    const src = PALETTES[palMode];
    const dst = PALETTES[palTarget];
    for (const k in src) pal[k] = lerpColor(src[k], dst[k], palBlend);
    if (palBlend >= 1) { palMode = palTarget; palBlend = 0; pal = Object.assign({}, PALETTES[palMode]); }
  } else {
    pal = Object.assign({}, PALETTES[palMode]);
  }
}

// How far night blend is (for star alpha)
function nightBlendAmount() {
  if (palMode === 'night' && palTarget === 'night') return 1;
  if (palMode === 'day'   && palTarget === 'day')   return 0;
  if (palTarget === 'night') return palBlend;
  return 1 - palBlend;
}

function triggerPaletteFlip() {
  palTarget = (palMode === 'day') ? 'night' : 'day';
  palBlend  = 0;
  sfxNight();
  if (palTarget === 'night') {
    runNightHit = true;
    nightFlipCount++;
    profile.nightReaches++;
    unlockAchievement('night_owl');
    if (nightFlipCount >= 3) unlockAchievement('nightx3');
  }
}

// ── Physics constants ─────────────────────────
const GROUND_Y    = LH - 50;
const GRAVITY     = 0.55;
const JUMP_VY     = -11.5;
const BASE_SPEED  = 4.4;
const MAX_SPEED   = 9.5;
const ACCEL_RATE  = 0.32;

// ── GameShell difficulty ──────────────────────
// 'normal' MUST equal the original behaviour (all multipliers = 1.0).
// easy  = slower scroll + larger gaps + fewer birds (more forgiving)
// hard  = faster scroll + tighter gaps + more birds (denser)
const GS_DIFF_PRESETS = {
  easy:   { speedMul: 0.82, gapMul: 1.2, flyMul: 0.6 },
  normal: { speedMul: 1.0,  gapMul: 1.0, flyMul: 1.0 },
  hard:   { speedMul: 1.18, gapMul: 0.82, flyMul: 1.4 },
};
// Active params for the current run; defaults to normal (= original) so play is
// never regressed when the shell is unavailable.
let gsDiff = Object.assign({}, GS_DIFF_PRESETS.normal);
function applyGsDifficulty() {
  let d = 'normal';
  if (window.GameShell && window.GameShell.getDifficulty) {
    d = window.GameShell.getDifficulty() || 'normal';
  }
  gsDiff = Object.assign({}, GS_DIFF_PRESETS[d] || GS_DIFF_PRESETS.normal);
}
// Pre-seed from the saved difficulty for the first start; re-read every new game.
applyGsDifficulty();
if (window.GameShell && window.GameShell.onDifficulty) {
  // Latch the choice for the NEXT new game (does not alter the current run).
  window.GameShell.onDifficulty(function () { /* picked up by startGame() */ });
}

// Now that GROUND_Y is defined, it's safe to build the starfield.
initStars();

// ── Player ────────────────────────────────────
const PLAYER_X = 100;
let player = {};

function resetPlayer() {
  player = {
    x:        PLAYER_X,
    y:        GROUND_Y,
    vy:       0,
    w:        28,
    h:        48,
    ducking:  false,
    duckH:    26,
    onGround: true,
    frame:    0,
    frameTick:0,
    dead:     false,
    deadTimer:0,
    justLanded: false,
  };
}

function playerHitbox() {
  const insetX = 4, insetY = 6;
  const ph = player.ducking ? player.duckH : player.h;
  return {
    x: player.x + insetX,
    y: player.y - ph + insetY,
    w: player.w - insetX * 2,
    h: ph - insetY * 2,
  };
}

// ── Obstacles ─────────────────────────────────
let obstacles = [];
let nextObstacleX = LW + 300;

const CACTUS_DEFS = [
  { id:'c1', segments:[{x:0,y:0,w:16,h:38},{x:0,y:-20,w:16,h:8},{x:-12,y:-12,w:12,h:5}] },
  { id:'c2', segments:[{x:0,y:0,w:14,h:42},{x:0,y:-24,w:14,h:8},{x:16,y:0,w:14,h:34},{x:16,y:-16,w:14,h:8},{x:30,y:0,w:6,h:20}] },
  { id:'c3', segments:[{x:0,y:0,w:20,h:46},{x:-10,y:-18,w:10,h:6},{x:20,y:0,w:20,h:38},{x:20,y:-10,w:10,h:5}] },
];

const BIRD_HEIGHTS = [
  GROUND_Y - 80,
  GROUND_Y - 140,
];

function getSpeed(sc) {
  // GameShell difficulty scales the whole scroll-speed curve incl. its ceiling
  // (normal => *1.0 = original).
  return Math.min(MAX_SPEED * gsDiff.speedMul, (BASE_SPEED + ACCEL_RATE * (sc / 100)) * gsDiff.speedMul);
}

function getMinGap(speed) {
  // GameShell difficulty scales spacing between obstacles (normal => *1.0).
  return Math.max(260, 620 - speed * 22) * gsDiff.gapMul;
}

// Tutorial: first run gets an easy warm-up zone
let tutorialMode = false;
let tutorialZoneEnd = 0;

function spawnObstacle(x, sc, speed) {
  const gap = getMinGap(speed) + Math.random() * 260;
  nextObstacleX = LW + gap;
  if (tutorialMode && sc < 60) return; // warm-up gap
  // GameShell difficulty scales bird (flying-obstacle) frequency (normal => *1.0).
  const flyChance = sc < 300 ? 0 : Math.min(0.38, (0.1 + (sc - 300) / 4000) * gsDiff.flyMul);
  if (Math.random() < flyChance) {
    const heightIdx = Math.random() < 0.5 ? 0 : 1;
    const by = BIRD_HEIGHTS[heightIdx];
    obstacles.push({
      type: 'bird', x, y: by,
      w: 34, h: 22,
      heightIdx,
      wingUp: false, wingTick: 0,
    });
  } else {
    const def = CACTUS_DEFS[Math.floor(Math.random() * CACTUS_DEFS.length)];
    obstacles.push({ type:'cactus', x, y: GROUND_Y, def });
  }
}

function obstacleHitbox(ob) {
  if (ob.type === 'cactus') {
    let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
    for (const s of ob.def.segments) {
      minX = Math.min(minX, ob.x + s.x);
      maxX = Math.max(maxX, ob.x + s.x + s.w);
      minY = Math.min(minY, ob.y + s.y - s.h);
      maxY = Math.max(maxY, ob.y + s.y);
    }
    const inset = 4;
    return { x: minX + inset, y: minY + inset, w: maxX - minX - inset*2, h: maxY - minY - inset*2 };
  } else {
    return { x: ob.x + 4, y: ob.y + 4, w: ob.w - 8, h: ob.h - 8 };
  }
}

function aabb(a, b) {
  return a.x < b.x + b.w && a.x + a.w > b.x &&
         a.y < b.y + b.h && a.y + a.h > b.y;
}

function spawnDust(x, y) {

function spawnHitSparks(x, y) {
  if (prefersReducedMotion) return;

    const spd = 1.5 + Math.random() * 3.5;
    particles.push({ x, y, vx: Math.cos(ang)*spd, vy: Math.sin(ang)*spd - 2.5, life: 1, type: 'spark' });
  }
}

  sfxPause();
  document.getElementById('pauseBtn').textContent = '⏸';

// ── Input ─────────────────────────────────────
let touchStartY    = null;
let touchStartTime = null;

// Track run stats
let runJumps = 0;
let runDucks = 0;

function doJump() {
  // Ensure audio ctx is created after user gesture
  getAudioCtx();
  if (state === 1.5) { resumeGame(); return; }
  if (state === 0 || state === 2) { startGame(); return; }
  if (player.onGround && !player.ducking && !player.dead) {
    player.vy = JUMP_VY;
    player.onGround = false;
    sfxJump();
    runJumps++;
  }
}

function doDuck(on) {
  if (state !== 1) return;
  if (on && !player.ducking) { sfxDuck(); runDucks++; }
  player.ducking = on;
}

document.addEventListener('keydown', e => {
  if (e.repeat) return;
  if (e.code === 'Space' || e.code === 'ArrowUp' || e.code === 'KeyW') { doJump(); e.preventDefault(); }
  if (e.code === 'ArrowDown' || e.code === 'KeyS') { doDuck(true); e.preventDefault(); }
  if (e.code === 'KeyM') { toggleMute(); e.preventDefault(); }
  if (e.code === 'KeyP' || e.code === 'Escape') { togglePause(); e.preventDefault(); }
});

document.addEventListener('keyup', e => {
  if (e.code === 'ArrowDown' || e.code === 'KeyS') doDuck(false);
});

canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  getAudioCtx();
  const t = e.changedTouches[0];
  touchStartY    = t.clientY;
  touchStartTime = Date.now();
}, { passive: false });

canvas.addEventListener('touchend', e => {
  e.preventDefault();
  if (touchStartY === null) return;
  const t = e.changedTouches[0];
  const dy = t.clientY - touchStartY;
  const dt = Date.now() - touchStartTime;
  if (dy > 40 && dt < 400) {
    doDuck(true);
    setTimeout(() => doDuck(false), 350);
  } else {
    doJump();
  }
  touchStartY = null;
}, { passive: false });

canvas.addEventListener('mousedown', e => {
  e.preventDefault();
  getAudioCtx();
  doJump();
});

// ── Game logic ────────────────────────────────
function startGame() {
  // GameShell: lock in the chosen difficulty for this run + refill hints.
  applyGsDifficulty();
  if (window.GameShell && window.GameShell.newGame) window.GameShell.newGame();
  score         = 0;
  lastMilestone = 0;
  lastFlip      = 0;
  obstacles     = [];
  particles     = [];
  nextObstacleX = LW + 200 + Math.random() * 200;
  groundOffset  = 0;
  palMode       = 'day';
  palTarget     = 'day';
  palBlend      = 0;
  pal           = Object.assign({}, PALETTES.day);
  milestoneText = '';
  milestoneTimer= 0;
  shakeTimer    = 0;
  shakeMag      = 0;
  hiFlashTimer  = 0;
  scoreAnimTimer= 0;
  goCountupActive = false;
  runJumps      = 0;
  runDucks      = 0;
  runDuckBirds  = 0;
  runMaxSpeedHit= false;
  runNightHit   = false;
  nightFlipCount= 0;
  musicNoteIdx  = 0;
  pausedByBlur  = false;

  // Tutorial for first play
  tutorialMode  = profile.firstPlay;
  tutorialZoneEnd = LW + 500; // no obstacles in first ~500px

  initClouds();
  resetPlayer();
  state = 1;
  document.getElementById('pauseBtn').style.display = 'block';
  document.getElementById('pauseBtn').textContent = '⏸';

  profile.gamesPlayed++;
  if (profile.firstPlay) profile.firstPlay = false;
  saveProfile();
  unlockAchievement('first_run');

  if (musicOn && !muted) { stopMusic(); startMusic(); }
}

function triggerGameOver() {
  if (player.dead) return;
  player.dead = true;
  player.deadTimer = 0;
  sfxDie();
  if (!prefersReducedMotion) { shakeMag = 5; shakeTimer = 0.4; }
  const cx = player.x + player.w / 2;
  const cy = player.y - player.h / 2;
  spawnHitSparks(cx, cy);

  // Update profile stats
  profile.totalJumps    += runJumps;
  profile.totalDucks    += runDucks;
  profile.totalDistance += score;
  if (score > profile.bestScore) {
    profile.bestScore = score;
  }

  if (score > bestScore) {
    bestScore = score;
    lsSet(BEST_KEY, String(bestScore));
    lsSet('swiftstride_best', String(bestScore));
    hiFlashTimer = 3;
  }
  saveProfile();

  // Check achievements
  if (score >= 100)  unlockAchievement('centurion');
  if (score >= 500)  unlockAchievement('undying');
  if (score >= 1000) unlockAchievement('marathon');
  if (runMaxSpeedHit) unlockAchievement('speed_demon');
  if (runDuckBirds >= 10) unlockAchievement('duck_master');

  addLeaderboardEntry(score);
  // GameShell: record final distance on the per-difficulty leaderboard.
  if (window.GameShell) window.GameShell.submitScore(Math.round(score), { difficulty: (window.GameShell.getDifficulty && window.GameShell.getDifficulty()) || 'normal' });

  // Start game-over count-up
  goCountupScore  = 0;
  goCountupTarget = score;
  goCountupActive = true;
  goCountupTimer  = 0;

  stopMusic();

  setTimeout(() => {
    state = 2;
    document.getElementById('pauseBtn').style.display = 'none';
  }, 600);
}

let lastTime = 0;
let starTime = 0;

function update(dt) {
  if (state !== 1) return;

  updatePalette(dt);
  starTime += dt;

  const speed = getSpeed(score);

  // Check max speed achievement
  if (speed >= MAX_SPEED - 0.1 && !runMaxSpeedHit) {
    runMaxSpeedHit = true;
    showToast('⚡ Max speed reached!');
  }

  // ── Score
  score = Math.floor(score + speed * dt * 60 * 0.07);

  // Profile distance (real-time)
  profile.totalDistance += speed * dt * 60 * 0.07 * 0.001; // small per-tick update

  // ── Milestones
  const m100 = Math.floor(score / 100);
  if (m100 > lastMilestone) {
    lastMilestone = m100;
    milestoneText  = '' + (m100 * 100);
    milestoneTimer = 1.2;
    milestoneScale = 1.5;
    sfxMilestone();
    scoreAnimTimer = 0.15;
    if (!prefersReducedMotion) spawnScoreParticles(LW / 2, 70, '+' + (m100 * 100));
  }

  // ── Day/night flip
  if (score - lastFlip >= FLIP_INTERVAL) {
    lastFlip = score;
    triggerPaletteFlip();
  }

  // ── Ground scroll
  groundOffset = (groundOffset + speed) % 40;

  // ── Cloud scroll
  for (const c of clouds) {
    c.x -= speed * 0.25;
    if (c.x + c.w < 0) {
      c.x = LW + 20;
      c.y = 30 + Math.random() * 80;
      c.w = 60 + Math.random() * 80;
    }
  }

  // ── Player physics
  if (!player.dead) {
    player.vy += GRAVITY;
    player.y  += player.vy;
    if (player.y >= GROUND_Y) {
      if (!player.onGround) {
        player.justLanded = true;
        spawnDust(player.x + player.w / 2, GROUND_Y);
        sfxLand();
      }
      player.y  = GROUND_Y;
      player.vy = 0;
      player.onGround = true;
    } else {
      player.onGround = false;
      player.justLanded = false;
    }
    if (player.onGround && !player.ducking) {
      player.frameTick += dt * 10 * (speed / BASE_SPEED);
      if (player.frameTick > 1) { player.frame = (player.frame + 1) % 2; player.frameTick = 0; }
    }
  } else {
    player.deadTimer += dt;
  }

  // ── Spawn obstacles
  nextObstacleX -= speed;
  if (nextObstacleX <= LW) {
    spawnObstacle(LW + 60, score, speed);
  }

  // ── Move obstacles, collide
  for (let i = obstacles.length - 1; i >= 0; i--) {
    const ob = obstacles[i];
    ob.x -= speed;

    if (ob.type === 'bird') {
      ob.wingTick += dt * 8;
      if (ob.wingTick > 1) { ob.wingUp = !ob.wingUp; ob.wingTick = 0; }
    }

    if (ob.x + (ob.type === 'bird' ? ob.w : 80) < 0) {
      // If ducked a bird
      if (ob.type === 'bird' && player.ducking && !player.dead) {
        runDuckBirds++;
      }
      obstacles.splice(i, 1);
      continue;
    }

    if (!player.dead) {
      if (aabb(playerHitbox(), obstacleHitbox(ob))) {
        triggerGameOver();
      }
    }
  }

  // ── Particles
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx;
    p.y += p.vy;
    p.vy += 0.12;
    p.life -= dt * (p.type === 'scoretext' ? 1.2 : 2.5);
    if (p.life <= 0) particles.splice(i, 1);
  }

  // ── Shake
  if (shakeTimer > 0) shakeTimer = Math.max(0, shakeTimer - dt);
  if (milestoneTimer > 0) {
    milestoneTimer  -= dt;
    milestoneScale   = 1 + (milestoneTimer / 1.2) * 0.5;
  }
  if (scoreAnimTimer  > 0) scoreAnimTimer  -= dt;
  if (hiFlashTimer    > 0) hiFlashTimer    -= dt;

  // ── Game-over count-up (runs during brief dead-but-not-gameover period)
  if (goCountupActive) {
    goCountupTimer += dt;
    const t = Math.min(1, goCountupTimer / 1.0);
    goCountupScore = Math.floor(goCountupTarget * t);
    if (t >= 1) { goCountupScore = goCountupTarget; goCountupActive = false; }
  }
}

// ── Draw helpers ──────────────────────────────
function drawPlayer() {
  const ph = player.ducking ? player.duckH : player.h;
  const pw = player.ducking ? player.w + 8 : player.w;
  const px = player.x;
  const py = player.y - ph;
  ctx.fillStyle = pal.player;

  if (player.dead) {
    ctx.save();
    ctx.translate(px + pw / 2, py + ph / 2);
    ctx.rotate(0.5);
    ctx.fillRect(-pw / 2, -ph / 2, pw, ph);
    ctx.beginPath();
    ctx.arc(pw / 2 - 4, -ph / 2 - 8, 9, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
    return;
  }

  if (player.ducking) {
    ctx.fillRect(px, py, pw, ph);
    ctx.beginPath();
    ctx.arc(px + pw - 10, py + 8, 10, 0, Math.PI * 2);
    ctx.fill();
    return;
  }

  ctx.fillRect(px + 4, py + 16, pw - 8, ph - 16);
  ctx.beginPath();
  ctx.arc(px + pw / 2, py + 10, 10, 0, Math.PI * 2);
  ctx.fill();
  if (player.onGround) {
    if (player.frame === 0) {
      ctx.fillRect(px + 8,         player.y - 14, 8, 14);
      ctx.fillRect(px + pw - 16,   player.y - 18, 8, 18);
    } else {
      ctx.fillRect(px + 8,         player.y - 18, 8, 18);
      ctx.fillRect(px + pw - 16,   player.y - 14, 8, 14);
    }
  } else {
    ctx.fillRect(px + 6,           player.y - 16, 8, 16);
    ctx.fillRect(px + pw - 14,     player.y - 16, 8, 16);
  }
  ctx.fillRect(px + pw - 6, py + 18, 6, 10);
}

function drawCactus(ob) {
  ctx.fillStyle = pal.obstacle;
  for (const s of ob.def.segments) ctx.fillRect(ob.x + s.x, ob.y + s.y - s.h, s.w, s.h);
}

function drawBird(ob) {
  ctx.fillStyle = pal.bird;
  ctx.fillRect(ob.x + 8, ob.y + 6, 18, 10);
  ctx.fillRect(ob.x + 26, ob.y + 9, 8, 4);
  if (ob.wingUp) {
    ctx.fillRect(ob.x,      ob.y,      12, 6);
    ctx.fillRect(ob.x + 16, ob.y,      12, 6);
  } else {
    ctx.fillRect(ob.x,      ob.y + 10, 12, 6);
    ctx.fillRect(ob.x + 16, ob.y + 10, 12, 6);
  }
  ctx.fillStyle = pal.sky;
  ctx.fillRect(ob.x + 21, ob.y + 7, 3, 3);
}

function drawGround() {
  ctx.fillStyle = pal.ground;
  ctx.fillRect(0, GROUND_Y + 1, LW, LH - GROUND_Y - 1);
  ctx.strokeStyle = pal.groundLine;
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(0, GROUND_Y + 1);
  ctx.lineTo(LW, GROUND_Y + 1);
  ctx.stroke();
  ctx.strokeStyle = pal.sky;
  ctx.lineWidth = 2;
  ctx.setLineDash([20, 20]);
  ctx.beginPath();
  const gx0 = -(groundOffset % 40);
  for (let x = gx0; x < LW; x += 40) {
    ctx.moveTo(x, GROUND_Y + 12);
    ctx.lineTo(x + 18, GROUND_Y + 12);
  }
  ctx.stroke();
  ctx.setLineDash([]);
}

function drawClouds() {
  ctx.fillStyle = pal.cloud;
  for (const c of clouds) {
    ctx.beginPath();
    ctx.ellipse(c.x + c.w / 2, c.y, c.w / 2, c.h / 2, 0, 0, Math.PI * 2);
    ctx.fill();
  }
}

function drawStarsAndMoon() {
  const nightAmt = nightBlendAmount();
  if (nightAmt <= 0) return;
  // Stars
  ctx.save();
  for (const s of stars) {
    const twinkle = 0.5 + 0.5 * Math.sin(starTime * s.twinkleSpeed + s.twinkle);
    ctx.globalAlpha = nightAmt * 0.8 * twinkle;
    ctx.fillStyle = '#ffffff';
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
    ctx.fill();
  }
  // Moon
  ctx.globalAlpha = nightAmt * 0.9;
  ctx.fillStyle = '#fffbe0';
  ctx.beginPath();
  ctx.arc(LW - 80, 45, 18, 0, Math.PI * 2);
  ctx.fill();
  // Crescent cut
  ctx.globalAlpha = nightAmt;
  ctx.fillStyle = PALETTES.night.sky;
  ctx.beginPath();
  ctx.arc(LW - 73, 42, 16, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();
}

function drawParticles() {
  for (const p of particles) {
    if (p.type === 'scoretext') {
      ctx.save();
      ctx.globalAlpha = Math.max(0, p.life) * 0.9;
      ctx.fillStyle = pal.milestone;
      ctx.font = 'bold 14px Courier New';
      ctx.textAlign = 'center';
      ctx.fillText(p.text, p.x, p.y);
      ctx.restore();
      continue;
    }
    const a = Math.max(0, p.life);
    ctx.globalAlpha = a;
    if (p.type === 'dust') {
      ctx.fillStyle = pal.dust;
      ctx.fillRect(p.x - 3, p.y - 3, 6, 6);
    } else {
      ctx.fillStyle = pal.bird;
      ctx.fillRect(p.x - 2, p.y - 2, 4, 4);
    }
  }
  ctx.globalAlpha = 1;
}

function drawHUD() {
  ctx.fillStyle = pal.hud;
  ctx.font = 'bold 18px Courier New';
  ctx.textAlign = 'left';

  const scoreStr = String(score).padStart(5, '0');
  if (scoreAnimTimer > 0 && !prefersReducedMotion) {
    ctx.save();
    ctx.translate(18, 28);
    const scl = 1 + scoreAnimTimer * 0.8;
    ctx.scale(scl, scl);
    ctx.fillStyle = pal.milestone;
    ctx.fillText(scoreStr, 0, 0);
    ctx.restore();
  } else {
    ctx.fillText(scoreStr, 18, 28);
  }

  ctx.textAlign = 'right';
  if (hiFlashTimer > 0 && Math.floor(hiFlashTimer * 6) % 2 === 0) {
    ctx.fillStyle = pal.milestone;
  } else {
    ctx.fillStyle = pal.hud;
  }
  ctx.font = '13px Courier New';
  ctx.fillText('BEST ' + String(bestScore).padStart(5, '0'), LW - 50, 28);

  // Mute icon
  ctx.textAlign = 'center';
  ctx.font = '18px sans-serif';
  ctx.fillText(muted ? '🔇' : '🔊', LW - 22, 28);

  // Milestone popup
  if (milestoneTimer > 0 && milestoneText) {
    ctx.save();
    ctx.globalAlpha = Math.min(1, milestoneTimer);
    ctx.fillStyle   = pal.milestone;
    const sz = prefersReducedMotion ? 20 : Math.floor(20 * milestoneScale);
    ctx.font        = `bold ${sz}px Courier New`;
    ctx.textAlign   = 'center';
    ctx.fillText('+' + milestoneText + '!', LW / 2, 50);
    ctx.restore();
  }
}

function drawPauseOverlay() {
  ctx.fillStyle = 'rgba(0,0,0,0.5)';
  ctx.fillRect(0, 0, LW, LH);
  ctx.textAlign = 'center';
  ctx.fillStyle = '#4CC9F0';
  ctx.font = 'bold 40px Courier New';
  ctx.fillText('PAUSED', LW / 2, LH / 2 - 20);
  ctx.font = '16px Courier New';
  ctx.fillStyle = '#E8E0D0';
  ctx.fillText('P / Esc / Tap to Resume', LW / 2, LH / 2 + 16);
}

function drawTutorialOverlay() {
  // Only show for first second of first run
  if (!tutorialMode || score > 20) return;
  ctx.save();
  ctx.globalAlpha = Math.max(0, 1 - score / 20);
  ctx.fillStyle = 'rgba(0,0,0,0.55)';
  ctx.fillRect(0, LH / 2 - 50, LW, 80);
  ctx.fillStyle = '#ffffff';
  ctx.font = '14px Courier New';
  ctx.textAlign = 'center';
  ctx.fillText('SPACE / TAP = Jump', LW / 2, LH / 2 - 18);
  ctx.fillText('↓ / Swipe Down = Duck', LW / 2, LH / 2 + 6);
  ctx.fillText('P = Pause', LW / 2, LH / 2 + 24);
  ctx.restore();
}

function drawStartScreen() {
  updatePalette(0.016);
  ctx.fillStyle = pal.sky;
  ctx.fillRect(0, 0, LW, LH);
  drawStarsAndMoon();
  drawClouds();
  drawGround();

  ctx.fillStyle = pal.text;
  ctx.font = 'bold 52px Courier New';
  ctx.textAlign = 'center';
  ctx.fillText('SWIFTSTRIDE', LW / 2, 110);

  ctx.font = '16px Courier New';
  ctx.fillText('Run. Jump. Duck. Survive.', LW / 2, 140);

  ctx.font = '13px Courier New';
  ctx.fillStyle = pal.hud;
  ctx.fillText('SPACE / TAP = Jump     ↓ / Swipe = Duck     P = Pause', LW / 2, 178);

  // Buttons row
  const btnY = 210;
  ctx.font = '13px Courier New';
  ctx.fillStyle = pal.hud;
  ctx.fillText('[PROFILE]', LW / 2 - 160, btnY);
  ctx.fillText('[SETTINGS]', LW / 2, btnY);
  ctx.fillText('[TOP RUNS]', LW / 2 + 160, btnY);

  if (Math.floor(Date.now() / 500) % 2 === 0) {
    ctx.font = 'bold 18px Courier New';
    ctx.fillStyle = pal.milestone;
    ctx.fillText('— PRESS SPACE OR TAP TO START —', LW / 2, 245);
  }

  if (bestScore > 0) {
    ctx.font = '14px Courier New';
    ctx.fillStyle = pal.hud;
    ctx.fillText('BEST: ' + bestScore, LW / 2, 275);
  }

  // Player name display
  ctx.font = '12px Courier New';
  ctx.fillStyle = '#4CC9F0';
  ctx.textAlign = 'right';
  ctx.fillText(profile.name, LW - 10, LH - 10);
}

// Track last click for start-screen panel buttons
canvas.addEventListener('click', e => {
  if (state !== 0) return;
  const rect = canvas.getBoundingClientRect();
  const cx = (e.clientX - rect.left) / (rect.width / LW);
  const cy = (e.clientY - rect.top)  / (rect.height / LH);
  // Profile button area ~LW/2-210 to LW/2-110, y ~200-220
  if (cy > 200 && cy < 225) {
    if (cx > LW/2 - 210 && cx < LW/2 - 110) { openProfile(); return; }
    if (cx > LW/2 - 60  && cx < LW/2 + 60)  { openSettings(); return; }
    if (cx > LW/2 + 110 && cx < LW/2 + 210) { openLeaderboard(); return; }
  }
});

function drawGameOverScreen() {
  ctx.fillStyle = 'rgba(0,0,0,0.3)';
  ctx.fillRect(0, 0, LW, LH);

  ctx.textAlign = 'center';
  ctx.fillStyle = pal.text;
  ctx.font = 'bold 40px Courier New';
  ctx.fillText('GAME OVER', LW / 2, LH / 2 - 40);

  // Animated count-up score
  const displayScore = goCountupActive ? goCountupScore : score;
  ctx.font = '20px Courier New';
  ctx.fillStyle = pal.text;
  ctx.fillText('SCORE  ' + String(displayScore).padStart(5, '0'), LW / 2, LH / 2);

  if (hiFlashTimer > 0 || score === bestScore && score > 0) {
    ctx.fillStyle = pal.milestone;
    ctx.font = 'bold 20px Courier New';
    ctx.fillText('NEW BEST!  ' + bestScore, LW / 2, LH / 2 + 26);
  } else {
    ctx.font = '16px Courier New';
    ctx.fillStyle = pal.hud;
    ctx.fillText('BEST  ' + String(bestScore).padStart(5, '0'), LW / 2, LH / 2 + 26);
  }

  // Share button text
  if (navigator.share) {
    ctx.font = '13px Courier New';
    ctx.fillStyle = '#4CC9F0';
    ctx.fillText('[SHARE SCORE]', LW / 2 + 140, LH / 2 + 56);
  }

  if (Math.floor(Date.now() / 500) % 2 === 0) {
    ctx.font = '16px Courier New';
    ctx.fillStyle = pal.hud;
    ctx.fillText('SPACE / TAP TO RESTART', LW / 2, LH / 2 + 68);
  }
}

// Share score
canvas.addEventListener('click', e => {
  if (state !== 2 || !navigator.share) return;
  const rect = canvas.getBoundingClientRect();
  const cx = (e.clientX - rect.left) / (rect.width / LW);
  const cy = (e.clientY - rect.top)  / (rect.height / LH);
  const btnCenterX = LW / 2 + 140, btnY = LH / 2 + 56;
  if (Math.abs(cx - btnCenterX) < 80 && Math.abs(cy - btnY) < 16) {
    navigator.share({
      title: 'SwiftStride',
      text: `I ran ${score} in SwiftStride! Can you beat me? 🏃`
    }).catch(() => {});
  }
});

// ── Main loop ─────────────────────────────────
function loop(ts) {
  requestAnimationFrame(loop);
  const dt = Math.min((ts - lastTime) / 1000, 0.05);
  lastTime = ts;

  if (state === 1) update(dt);
  if (state === 1.5) updatePalette(dt); // keep palette transitioning while paused

  // Shake offset
  let sx = 0, sy = 0;
  if (shakeTimer > 0 && !prefersReducedMotion) {
    sx = (Math.random() - 0.5) * shakeMag * 2;
    sy = (Math.random() - 0.5) * shakeMag * 2;
    shakeMag *= 0.88;
  }

  ctx.save();
  ctx.translate(sx, sy);

  if (state === 0) {
    drawStartScreen();
  } else {
    // Sky
    ctx.fillStyle = pal.sky;
    ctx.fillRect(-10, -10, LW + 20, LH + 20);
    drawStarsAndMoon();
    drawClouds();
    drawGround();

    for (const ob of obstacles) {
      if (ob.type === 'cactus') drawCactus(ob);
      else drawBird(ob);
    }

    drawParticles();
    drawPlayer();
    drawHUD();

    if (state === 1)   drawTutorialOverlay();
    if (state === 1.5) drawPauseOverlay();
    if (state === 2)   drawGameOverScreen();
  }

  ctx.restore();
}

requestAnimationFrame(ts => { lastTime = ts; requestAnimationFrame(loop); });
</script>
</body>
