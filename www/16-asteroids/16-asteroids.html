<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    width: 100%; height: 100%;
    background: #000;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Courier New', Courier, monospace;
    touch-action: none;
  }
  #wrapper {
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  canvas {
    display: block;
    image-rendering: crisp-edges;
  }
  /* Mobile control buttons */
  #controls {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    display: none;
    pointer-events: none;
    padding: 6px;
  }
  .ctrl-row {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
  }
  .ctrl-group {
    display: flex;
    gap: 6px;
    pointer-events: all;
  }
  .btn {
    width: 54px;
    height: 54px;
    border-radius: 10px;
    border: 2px solid rgba(0,255,255,0.5);
    background: rgba(0,255,255,0.1);
    color: #0ff;
    font-size: 18px;
    font-family: 'Courier New', Courier, monospace;
    font-weight: bold;
    display: flex;
    align-items: center;
    justify-content: center;
    user-select: none;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }
  .btn:active, .btn.active {
    background: rgba(0,255,255,0.35);
    border-color: #0ff;
  }
  .btn.fire {
    background: rgba(255,200,0,0.15);
    border-color: rgba(255,200,0,0.6);
    color: #ffc800;
    width: 60px;
    height: 60px;
    font-size: 20px;
  }
  .btn.fire:active, .btn.fire.active {
    background: rgba(255,200,0,0.35);
  }
  .btn.hyp {
    background: rgba(200,0,255,0.15);
    border-color: rgba(200,0,255,0.5);
    color: #c800ff;
    font-size: 11px;
  }
  .btn.hyp:active, .btn.hyp.active {
    background: rgba(200,0,255,0.3);
  }
  .btn.thrust {
    background: rgba(255,100,0,0.15);
    border-color: rgba(255,100,0,0.5);
    color: #ff6400;
  }
  .btn.thrust:active, .btn.thrust.active {
    background: rgba(255,100,0,0.3);
  }
  /* Achievement toast */
  #ach-toast {
    position: fixed;
    top: 20px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(0,20,30,0.92);
    border: 1.5px solid #ffd700;
    border-radius: 8px;
    color: #ffd700;
    font-family: 'Courier New', Courier, monospace;
    font-size: 13px;
    padding: 8px 18px;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.3s;
    z-index: 9999;
    white-space: nowrap;
    text-align: center;
  }
  #ach-toast.show { opacity: 1; }
</style>

<script>window.GS_CONFIG={"id":"16-asteroids","title":"Asteroids","difficulties":["easy","normal","hard"],"howToPlay":"\u003cp>\u003cstrong>Goal:\u003c/strong> blast asteroids without being hit.\u003c/p>\u003cul>\u003cli>\u003cstrong>Controls:\u003c/strong> rotate (left/right), thrust (up), fire (Space).\u003c/li>\u003cli>Big rocks split into smaller ones.\u003c/li>\u003cli>Avoid collisions.\u003c/li>\u003c/ul>","hints":["Use short thrust taps — momentum carries you.","Clear small fragments before they swarm you.","Edge-wrap: fly off one side to appear on the other."]};</script>
<script>
/* ===========================================================================
 * GameShell v1 — universal drop-in options overlay for single-file web games.
 * Adds: Settings (Sound, Music, Difficulty, Theme, Leaderboard, How to Play,
 * Reset) + an in-play control bar (Hint, Sound, Settings) with a rate-limited
 * Hint (2 / 24h, refills on new game). Game-agnostic, namespaced, Shadow-DOM
 * isolated, persisted per game. Safe to inject into any HTML game once.
 * ======================================================================== */
(function () {
  "use strict";
  if (window.__gsInstalled) return;
  window.__gsInstalled = true;

  /* ---------- per-game config (injected just above this script) ---------- */
  var CFG = window.GS_CONFIG || {};
  var GID = CFG.id || (location.pathname.split("/").filter(Boolean).pop() || "game").replace(/\.html?$/i, "");
  var TITLE = CFG.title || document.title || "Game";
  var DIFFS = (CFG.difficulties && CFG.difficulties.length) ? CFG.difficulties : ["easy", "normal", "hard"];
  var HOWTO = CFG.howToPlay || "<p>Use the on-screen controls (or your keyboard) to play. Your progress is saved automatically on this device.</p>";
  var TIPS = (CFG.hints && CFG.hints.length) ? CFG.hints.slice() : [
    "Take your time — there's no rush.",
    "Plan one move ahead before you commit.",
    "Stuck? Try a new game from Settings to reset and get fresh hints."
  ];
  var HINT_MAX = CFG.hintMax || 2;
  var WINDOW_MS = 24 * 60 * 60 * 1000;

  /* ----------------------------- storage --------------------------------- */
  function k(name) { return "gs:" + GID + ":" + name; }
  function load(name, def) {
    try { var v = JSON.parse(localStorage.getItem(k(name))); return v == null ? def : v; }
    catch (e) { return def; }
  }
  function save(name, val) { try { localStorage.setItem(k(name), JSON.stringify(val)); } catch (e) {} }

  var SDEF = { v: 1, sound: true, music: true, difficulty: (DIFFS.indexOf("normal") >= 0 ? "normal" : DIFFS[0]), theme: "system" };
  var settings = Object.assign({}, SDEF, load("settings", {}));
  if (DIFFS.indexOf(settings.difficulty) < 0) settings.difficulty = SDEF.difficulty;
  function persist() { save("settings", settings); }

  /* ------------------------- tiny event emitter -------------------------- */
  var subs = {};
  function on(ev, fn) { (subs[ev] = subs[ev] || []).push(fn); return function () { subs[ev] = (subs[ev] || []).filter(function (f) { return f !== fn; }); }; }
  function emit(ev, data) {
    (subs[ev] || []).forEach(function (fn) { try { fn(data); } catch (e) {} });
    try { window.dispatchEvent(new CustomEvent("gs:" + ev, { detail: data })); } catch (e) {}
  }

  /* ============================== AUDIO ================================== */
  /* Sound = master (everything). Music = looping media + opt-in music gain. */
  var soundOn = settings.sound, musicOn = settings.music;
  var acRegistry = [];

  (function patchWebAudio() {
    var Orig = window.AudioContext || window.webkitAudioContext;
    if (!Orig || Orig.__gsPatched) return;
    function Patched() {
      var ctx = arguments.length ? new Orig(arguments[0]) : new Orig();
      try {
        var realDest = ctx.destination;
        var sfx = ctx.createGain(); sfx.connect(realDest);
        var music = ctx.createGain(); music.connect(realDest);
        sfx.gain.value = soundOn ? 1 : 0;
        music.gain.value = (soundOn && musicOn) ? 1 : 0;
        Object.defineProperty(ctx, "destination", { get: function () { return sfx; }, configurable: true });
        ctx.__gsSfx = sfx; ctx.__gsMusic = music; ctx.__gsRealDest = realDest;
        acRegistry.push(ctx);
      } catch (e) {}
      return ctx;
    }
    try { Patched.prototype = Orig.prototype; } catch (e) {}
    Patched.__gsPatched = true;
    try { window.AudioContext = Patched; } catch (e) {}
    try { window.webkitAudioContext = Patched; } catch (e) {}
  })();

  var mediaEls = [];
  (function patchMedia() {
    if (!window.HTMLMediaElement || HTMLMediaElement.__gsPatched) return;
    var proto = HTMLMediaElement.prototype;
    var d = Object.getOwnPropertyDescriptor(proto, "muted");
    if (d && d.get && d.set) {
      Object.defineProperty(proto, "muted", {
        configurable: true,
        get: function () { return (!soundOn) || (this.loop && !musicOn) || d.get.call(this); },
        set: function (v) { try { d.set.call(this, v); } catch (e) {} }
      });
    }
    var op = proto.play;
    proto.play = function () {
      if (mediaEls.indexOf(this) < 0) mediaEls.push(this);
      try { this.volume = this.volume; } catch (e) {}
      return op.apply(this, arguments);
    };
    HTMLMediaElement.__gsPatched = true;
  })();

  function applyAudio() {
    acRegistry.forEach(function (ctx) {
      try {
        if (ctx.__gsSfx) ctx.__gsSfx.gain.setValueAtTime(soundOn ? 1 : 0, ctx.currentTime);
        if (ctx.__gsMusic) ctx.__gsMusic.gain.setValueAtTime((soundOn && musicOn) ? 1 : 0, ctx.currentTime);
      } catch (e) {}
    });
    mediaEls.forEach(function (el) { try { el.muted = el.muted; } catch (e) {} });
  }

  /* ============================== THEME ================================== */
  function applyTheme() {
    var t = settings.theme;
    var root = document.documentElement;
    root.classList.remove("gs-theme-light", "gs-theme-dark", "gs-theme-system");
    root.classList.add("gs-theme-" + t);
    var eff = t;
    if (t === "system") {
      eff = (window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches) ? "dark" : "light";
    }
    try { root.style.colorScheme = (t === "system") ? "light dark" : t; } catch (e) {}
    var bd = document.getElementById("gs-backdrop");
    if (bd) bd.style.background = (eff === "dark") ? "#0e1014" : "#eef1f6";
    if (host) host.setAttribute("data-theme", eff);
    emit("theme", { theme: t, effective: eff });
  }
  if (window.matchMedia) {
    try { window.matchMedia("(prefers-color-scheme: dark)").addEventListener("change", function () { if (settings.theme === "system") applyTheme(); }); }
    catch (e) {}
  }

  /* ============================== HINTS ================================== */
  function hintState() {
    var s = load("hint", { v: 1, spentAt: [], puzzleId: "", lastSeen: Date.now() });
    var now = Date.now();
    // anti-tamper: clamp future stamps; ignore large backward clock jumps
    if (s.lastSeen && now < s.lastSeen - 60000) { s.spentAt = (s.spentAt || []).map(function () { return now; }); }
    s.spentAt = (s.spentAt || []).map(function (t) { return t > now ? now : t; }).filter(function (t) { return now - t < WINDOW_MS; });
    s.lastSeen = now;
    return s;
  }
  function hintsLeft() { var s = hintState(); save("hint", s); return Math.max(0, HINT_MAX - s.spentAt.length); }
  function nextHintMs() {
    var s = hintState();
    if (s.spentAt.length < HINT_MAX) return 0;
    var oldest = Math.min.apply(null, s.spentAt);
    return Math.max(0, WINDOW_MS - (Date.now() - oldest));
  }
  function spendHint() {
    var s = hintState();
    if (HINT_MAX - s.spentAt.length <= 0) return false;
    s.spentAt.push(Date.now()); save("hint", s); return true;
  }
  function refillHints(puzzleId) {
    var s = hintState();
    if (puzzleId != null && String(puzzleId) === String(s.puzzleId)) { save("hint", s); return; } // same board: no mint
    s.spentAt = []; s.puzzleId = (puzzleId == null ? "" : String(puzzleId)); save("hint", s);
    updateHintBadge();
  }
  var tipIdx = 0;
  function provideHintText() {
    if (typeof CFG.onHint === "function") { try { var r = CFG.onHint(); if (r) return String(r); } catch (e) {} }
    var t = TIPS[tipIdx % TIPS.length]; tipIdx++; return t;
  }

  /* ============================ LEADERBOARD ============================= */
  function getBoard(diff) { var b = load("scores", { v: 1, boards: {} }); return (b.boards && b.boards[diff]) || []; }
  function submitScore(score, opts) {
    score = Number(score); if (!isFinite(score)) return;
    opts = opts || {};
    var diff = opts.difficulty || settings.difficulty;
    var name = (opts.name || "You").toString().slice(0, 12);
    var b = load("scores", { v: 1, boards: {} }); b.boards = b.boards || {};
    var list = b.boards[diff] || [];
    list.push({ name: name, score: score, ts: Date.now() });
    list.sort(function (a, c) { return c.score - a.score; });
    b.boards[diff] = list.slice(0, 10);
    save("scores", b);
    emit("score", { score: score, difficulty: diff });
    return b.boards[diff];
  }

  /* ============================== UI SHELL ============================== */
  var host, root, $bar, $hintBtn, $soundBtn, $modal, $panelHost;
  var lastFocus = null;

  var CSS = ''
    + ':host{all:initial}'
    + '*{box-sizing:border-box;font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif}'
    + '.bar{position:fixed;top:0;right:0;display:flex;gap:6px;padding:8px;'
    + 'padding-top:max(8px,env(safe-area-inset-top));padding-right:max(8px,env(safe-area-inset-right));z-index:5}'
    + '.btn{all:unset;cursor:pointer;display:flex;align-items:center;justify-content:center;'
    + 'min-width:44px;min-height:44px;width:44px;height:44px;border-radius:12px;font-size:20px;line-height:1;'
    + 'background:var(--c-btn);color:var(--c-tx);box-shadow:0 2px 8px rgba(0,0,0,.25);'
    + 'touch-action:manipulation;-webkit-tap-highlight-color:transparent;position:relative;transition:transform .08s,background .15s}'
    + '.btn:hover{background:var(--c-btnH)}.btn:active{transform:scale(.92)}'
    + '.btn:focus-visible{outline:3px solid var(--c-acc);outline-offset:2px}'
    + '.badge{position:absolute;top:-4px;right:-4px;min-width:18px;height:18px;padding:0 4px;border-radius:9px;'
    + 'background:var(--c-acc);color:#fff;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center}'
    + '.btn.off{opacity:.45}'
    + '.scrim{position:fixed;inset:0;background:rgba(0,0,0,.55);display:none;align-items:center;justify-content:center;z-index:10;'
    + 'padding:16px;padding-top:max(16px,env(safe-area-inset-top));padding-bottom:max(16px,env(safe-area-inset-bottom))}'
    + '.scrim.open{display:flex}'
    + '.modal{width:min(420px,100%);max-height:88vh;overflow:auto;background:var(--c-bg);color:var(--c-tx);'
    + 'border-radius:18px;box-shadow:0 18px 60px rgba(0,0,0,.5);padding:18px;-webkit-overflow-scrolling:touch}'
    + '.mhead{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}'
    + '.mtitle{font-size:18px;font-weight:800;letter-spacing:.2px}'
    + '.x{all:unset;cursor:pointer;font-size:22px;width:40px;height:40px;display:flex;align-items:center;justify-content:center;border-radius:10px;color:var(--c-tx)}'
    + '.x:hover{background:var(--c-btn)}.x:focus-visible{outline:3px solid var(--c-acc)}'
    + '.sub{font-size:12px;color:var(--c-mut);margin:-2px 0 12px}'
    + '.row{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:11px 2px;border-top:1px solid var(--c-line)}'
    + '.row .lab{font-size:15px;font-weight:600}.row .desc{font-size:12px;color:var(--c-mut);margin-top:2px}'
    + '.seg{display:flex;gap:4px;background:var(--c-btn);padding:4px;border-radius:12px}'
    + '.seg button{all:unset;cursor:pointer;padding:8px 12px;min-height:36px;border-radius:9px;font-size:13px;font-weight:600;color:var(--c-mut);touch-action:manipulation}'
    + '.seg button[aria-pressed=true]{background:var(--c-acc);color:#fff}'
    + '.seg button:focus-visible{outline:2px solid var(--c-acc)}'
    + '.sw{all:unset;cursor:pointer;width:52px;height:30px;border-radius:16px;background:var(--c-line);position:relative;transition:background .15s;flex:0 0 auto}'
    + '.sw::after{content:"";position:absolute;top:3px;left:3px;width:24px;height:24px;border-radius:50%;background:#fff;transition:left .15s;box-shadow:0 1px 3px rgba(0,0,0,.4)}'
    + '.sw[aria-checked=true]{background:var(--c-acc)}.sw[aria-checked=true]::after{left:25px}'
    + '.sw:focus-visible{outline:3px solid var(--c-acc);outline-offset:2px}'
    + '.lbtn{all:unset;cursor:pointer;display:block;width:100%;text-align:left;padding:13px 12px;margin-top:8px;border-radius:12px;'
    + 'background:var(--c-btn);color:var(--c-tx);font-size:15px;font-weight:600;touch-action:manipulation}'
    + '.lbtn:hover{background:var(--c-btnH)}.lbtn:focus-visible{outline:3px solid var(--c-acc)}'
    + '.lbtn.danger{color:#ff6b6b}'
    + '.back{all:unset;cursor:pointer;font-size:14px;color:var(--c-acc);font-weight:700;margin-bottom:8px;display:inline-flex;gap:4px;align-items:center}'
    + '.howto{font-size:14px;line-height:1.6}.howto p{margin:8px 0}.howto strong{color:var(--c-acc)}'
    + '.howto ul{margin:8px 0;padding-left:20px}.howto li{margin:4px 0}'
    + '.lbtabs{display:flex;gap:6px;margin:6px 0 10px}'
    + '.lbtabs button{all:unset;cursor:pointer;flex:1;text-align:center;padding:8px;border-radius:10px;background:var(--c-btn);font-size:13px;font-weight:600;color:var(--c-mut)}'
    + '.lbtabs button[aria-pressed=true]{background:var(--c-acc);color:#fff}'
    + '.lblist{list-style:none;margin:0;padding:0}'
    + '.lblist li{display:flex;justify-content:space-between;padding:9px 6px;border-top:1px solid var(--c-line);font-size:14px}'
    + '.lblist li span:first-child{color:var(--c-mut)}'
    + '.empty{color:var(--c-mut);font-size:14px;text-align:center;padding:18px}'
    + '.toast{position:fixed;left:50%;bottom:max(18px,env(safe-area-inset-bottom));transform:translateX(-50%);'
    + 'background:var(--c-bg);color:var(--c-tx);border:1px solid var(--c-line);padding:12px 16px;border-radius:12px;'
    + 'max-width:86vw;font-size:14px;box-shadow:0 8px 30px rgba(0,0,0,.4);z-index:20;opacity:0;transition:opacity .2s,transform .2s;pointer-events:none}'
    + '.toast.show{opacity:1;transform:translateX(-50%) translateY(-4px)}'
    + ':host([data-theme=dark]){--c-bg:#171a21;--c-tx:#f2f4f8;--c-mut:#9aa3b2;--c-line:#2c313c;--c-btn:#222732;--c-btnH:#2c333f;--c-acc:#4f8cff}'
    + ':host([data-theme=light]){--c-bg:#ffffff;--c-tx:#15181f;--c-mut:#646b7a;--c-line:#e6e8ee;--c-btn:#eef1f6;--c-btnH:#e3e7ef;--c-acc:#2f6bff}'
    + '@media (prefers-reduced-motion: reduce){*{transition:none!important}}';

  function el(tag, attrs, html) {
    var n = document.createElement(tag);
    if (attrs) for (var a in attrs) n.setAttribute(a, attrs[a]);
    if (html != null) n.innerHTML = html;
    return n;
  }

  function buildUI() {
    // backdrop (light DOM, behind everything)
    var bd = el("div", { id: "gs-backdrop" });
    bd.style.cssText = "position:fixed;inset:0;z-index:-1;pointer-events:none";
    document.body.appendChild(bd);

    host = el("div", { id: "gs-host" });
    host.style.cssText = "position:fixed;top:0;left:0;width:0;height:0;z-index:2147483647;isolation:isolate";
    document.body.appendChild(host);
    root = host.attachShadow ? host.attachShadow({ mode: "open" }) : host;
    var style = el("style"); style.textContent = CSS; root.appendChild(style);

    // ---- in-play control bar: Hint · Sound · Settings ----
    $bar = el("div", { class: "bar" });
    $hintBtn = el("button", { class: "btn", "aria-label": "Hint", title: "Hint" }, "💡");
    $hintBtn.appendChild(el("span", { class: "badge" }, String(HINT_MAX)));
    $soundBtn = el("button", { class: "btn", "aria-label": "Toggle sound", title: "Sound" }, "🔊");
    var $setBtn = el("button", { class: "btn", "aria-label": "Settings", title: "Settings" }, "⚙️");
    $bar.appendChild($hintBtn); $bar.appendChild($soundBtn); $bar.appendChild($setBtn);
    root.appendChild($bar);

    // ---- modal scrim + container ----
    $modal = el("div", { class: "scrim", role: "dialog", "aria-modal": "true", "aria-label": "Settings" });
    $panelHost = el("div", { class: "modal" });
    $modal.appendChild($panelHost);
    root.appendChild($modal);

    $hintBtn.addEventListener("click", doHint);
    $soundBtn.addEventListener("click", function () { setSound(!soundOn); });
    $setBtn.addEventListener("click", openSettings);
    $modal.addEventListener("click", function (e) { if (e.target === $modal) closeModal(); });
    root.addEventListener("keydown", function (e) { if (e.key === "Escape" && $modal.classList.contains("open")) closeModal(); trapFocus(e); });

    updateSoundBtn(); updateHintBadge();
  }

  function updateSoundBtn() { if ($soundBtn) { $soundBtn.textContent = soundOn ? "🔊" : "🔇"; $soundBtn.classList.toggle("off", !soundOn); } }
  function updateHintBadge() {
    if (!$hintBtn) return;
    var left = hintsLeft();
    var b = $hintBtn.querySelector(".badge");
    if (b) b.textContent = String(left);
    $hintBtn.classList.toggle("off", left === 0);
  }

  /* ----------------------------- panels --------------------------------- */
  function openModal(render) {
    lastFocus = document.activeElement;
    render();
    $modal.classList.add("open");
    var f = $panelHost.querySelector("button,[tabindex],input"); if (f) f.focus();
  }
  function closeModal() {
    $modal.classList.remove("open");
    if (lastFocus && lastFocus.focus) { try { lastFocus.focus(); } catch (e) {} }
  }
  function trapFocus(e) {
    if (e.key !== "Tab" || !$modal.classList.contains("open")) return;
    var f = $panelHost.querySelectorAll('button,[href],input,[tabindex]:not([tabindex="-1"])');
    if (!f.length) return;
    var first = f[0], last = f[f.length - 1];
    if (e.shiftKey && root.activeElement === first) { e.preventDefault(); last.focus(); }
    else if (!e.shiftKey && root.activeElement === last) { e.preventDefault(); first.focus(); }
  }

  function header(title, withBack) {
    var h = el("div", { class: "mhead" });
    var left = el("div");
    if (withBack) { var b = el("button", { class: "back", "aria-label": "Back to settings" }, "‹ Back"); b.addEventListener("click", openSettings); left.appendChild(b); }
    left.appendChild(el("div", { class: "mtitle" }, title));
    var x = el("button", { class: "x", "aria-label": "Close" }, "✕"); x.addEventListener("click", closeModal);
    h.appendChild(left); h.appendChild(x); return h;
  }

  function renderSettings() {
    $panelHost.innerHTML = "";
    $panelHost.setAttribute("aria-label", "Settings");
    $panelHost.appendChild(header("Settings"));
    $panelHost.appendChild(el("div", { class: "sub" }, TITLE));

    // Sound
    $panelHost.appendChild(toggleRow("Sound", "All game audio", soundOn, function (v) { setSound(v); }));
    // Music
    $panelHost.appendChild(toggleRow("Music", "Background music only", musicOn, function (v) { setMusic(v); }));

    // Difficulty
    var dr = el("div", { class: "row" });
    var dl = el("div"); dl.appendChild(el("div", { class: "lab" }, "Difficulty"));
    dl.appendChild(el("div", { class: "desc" }, "Applies on your next new game"));
    dr.appendChild(dl);
    dr.appendChild(segment(DIFFS.map(cap), DIFFS.indexOf(settings.difficulty), function (i) {
      settings.difficulty = DIFFS[i]; persist(); emit("difficulty", { difficulty: settings.difficulty });
    }));
    $panelHost.appendChild(dr);

    // Theme
    var tr = el("div", { class: "row" });
    var tl = el("div"); tl.appendChild(el("div", { class: "lab" }, "Theme"));
    tl.appendChild(el("div", { class: "desc" }, "System · Light · Dark"));
    tr.appendChild(tl);
    var TH = ["system", "light", "dark"];
    tr.appendChild(segment(["System", "Light", "Dark"], TH.indexOf(settings.theme), function (i) {
      settings.theme = TH[i]; persist(); applyTheme();
    }));
    $panelHost.appendChild(tr);

    // Leaderboard / How to Play / Reset
    var lb = el("button", { class: "lbtn" }, "🏆  Leaderboard"); lb.addEventListener("click", function () { openModal(renderLeaderboard); });
    var ht = el("button", { class: "lbtn" }, "❓  How to Play"); ht.addEventListener("click", function () { openModal(renderHowTo); });
    var rs = el("button", { class: "lbtn danger" }, "↺  Reset progress"); rs.addEventListener("click", resetProgress);
    $panelHost.appendChild(lb); $panelHost.appendChild(ht); $panelHost.appendChild(rs);
  }

  function renderHowTo() {
    $panelHost.innerHTML = "";
    $panelHost.appendChild(header("How to Play", true));
    $panelHost.appendChild(el("div", { class: "howto" }, HOWTO));
  }

  var lbActive = null;
  function renderLeaderboard() {
    $panelHost.innerHTML = "";
    $panelHost.appendChild(header("Leaderboard", true));
    if (lbActive == null) lbActive = settings.difficulty;
    var tabs = el("div", { class: "lbtabs" });
    DIFFS.forEach(function (d) {
      var b = el("button", { "aria-pressed": String(d === lbActive) }, cap(d));
      b.addEventListener("click", function () { lbActive = d; renderLeaderboard(); });
      tabs.appendChild(b);
    });
    $panelHost.appendChild(tabs);
    var list = getBoard(lbActive);
    if (!list.length) { $panelHost.appendChild(el("div", { class: "empty" }, "No scores yet.\nPlay a game to set a record!")); return; }
    var ul = el("ul", { class: "lblist" });
    list.forEach(function (r, i) {
      var li = el("li");
      li.appendChild(el("span", null, (i + 1) + ". " + r.name));
      li.appendChild(el("span", null, String(r.score)));
      ul.appendChild(li);
    });
    $panelHost.appendChild(ul);
  }

  function toggleRow(lab, desc, val, onChange) {
    var r = el("div", { class: "row" });
    var l = el("div"); l.appendChild(el("div", { class: "lab" }, lab)); l.appendChild(el("div", { class: "desc" }, desc));
    var sw = el("button", { class: "sw", role: "switch", "aria-checked": String(!!val), "aria-label": lab });
    sw.addEventListener("click", function () { var nv = sw.getAttribute("aria-checked") !== "true"; sw.setAttribute("aria-checked", String(nv)); onChange(nv); });
    r.appendChild(l); r.appendChild(sw); return r;
  }
  function segment(labels, active, onPick) {
    var s = el("div", { class: "seg", role: "group" });
    labels.forEach(function (lab, i) {
      var b = el("button", { "aria-pressed": String(i === active) }, lab);
      b.addEventListener("click", function () {
        Array.prototype.forEach.call(s.children, function (c, j) { c.setAttribute("aria-pressed", String(j === i)); });
        onPick(i);
      });
      s.appendChild(b);
    });
    return s;
  }

  /* --------------------------- behaviours -------------------------------- */
  function setSound(v) { soundOn = settings.sound = !!v; persist(); applyAudio(); updateSoundBtn(); emit("sound", { on: soundOn }); }
  function setMusic(v) { musicOn = settings.music = !!v; persist(); applyAudio(); emit("music", { on: musicOn }); }

  function doHint() {
    var left = hintsLeft();
    if (left <= 0) {
      var ms = nextHintMs(); var h = Math.floor(ms / 3600000), m = Math.ceil((ms % 3600000) / 60000);
      toast("No hints left. Next in " + h + "h " + m + "m — or start a new game.");
      return;
    }
    if (!spendHint()) return;
    updateHintBadge();
    toast("💡 " + provideHintText());
    emit("hint", { left: hintsLeft() });
  }

  function resetProgress() {
    if (!confirm("Reset ALL saved progress and high scores for " + TITLE + "? This cannot be undone.")) return;
    try {
      var rm = [];
      for (var i = 0; i < localStorage.length; i++) { var key = localStorage.key(i); if (key && key.indexOf("gs:" + GID + ":") === 0) rm.push(key); }
      rm.forEach(function (key) { localStorage.removeItem(key); });
    } catch (e) {}
    emit("reset", {});
    toast("Progress reset. Reloading…");
    setTimeout(function () { location.reload(); }, 700);
  }

  var toastT;
  function toast(msg) {
    var t = root.querySelector(".toast");
    if (!t) { t = el("div", { class: "toast" }); root.appendChild(t); }
    t.textContent = msg; t.classList.add("show");
    clearTimeout(toastT); toastT = setTimeout(function () { t.classList.remove("show"); }, 3200);
  }

  function openSettings() { openModal(renderSettings); }

  /* ----------------------------- public API ------------------------------ */
  window.GameShell = {
    version: 1,
    config: function (o) { Object.assign(CFG, o || {}); if (o) { if (o.howToPlay) HOWTO = o.howToPlay; if (o.hints) TIPS = o.hints.slice(); } return this; },
    getDifficulty: function () { return settings.difficulty; },
    onDifficulty: function (fn) { return on("difficulty", function (d) { fn(d.difficulty); }); },
    setDifficulty: function (d) { if (DIFFS.indexOf(d) >= 0) { settings.difficulty = d; persist(); emit("difficulty", { difficulty: d }); } },
    isSoundOn: function () { return soundOn; },
    isMusicOn: function () { return musicOn; },
    isMuted: function () { return !soundOn; },
    submitScore: submitScore,
    getScores: getBoard,
    newGame: function (puzzleId) { refillHints(puzzleId); emit("newgame", { puzzleId: puzzleId }); },
    useHint: doHint,
    hintsLeft: hintsLeft,
    onHint: function (fn) { CFG.onHint = fn; return this; },
    openSettings: openSettings,
    openHowToPlay: function () { openModal(renderHowTo); },
    openLeaderboard: function () { openModal(renderLeaderboard); },
    on: on,
    routeMusic: function (node, ctx) { try { if (ctx && ctx.__gsMusic && node && node.connect) { node.connect(ctx.__gsMusic); return true; } } catch (e) {} return false; }
  };

  /* ------------------------------ boot ----------------------------------- */
  function boot() {
    // ensure a viewport meta exists for mobile
    if (!document.querySelector('meta[name="viewport"]')) {
      var m = el("meta", { name: "viewport", content: "width=device-width, initial-scale=1, viewport-fit=cover" });
      document.head.appendChild(m);
    }
    buildUI();
    applyTheme();
    applyAudio();
    emit("ready", { id: GID });
  }
  function cap(s) { return s ? s.charAt(0).toUpperCase() + s.slice(1) : s; }

  if (document.readyState === "loading") document.addEventListener("DOMContentLoaded", boot);
  else boot();
})();

</script>

<script>
(function(){
'use strict';

// ===================== ACCESSIBILITY =====================
const reducedMotion = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;

// ===================== CANVAS SETUP =====================
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const wrapper = document.getElementById('wrapper');
let W = 800, H = 600;
let scale = 1;

function resize() {
  const vw = window.innerWidth, vh = window.innerHeight;
  scale = Math.min(vw / W, vh / H);
  const cw = Math.floor(W * scale), ch = Math.floor(H * scale);
  canvas.width = W; canvas.height = H;
  canvas.style.width = cw + 'px';
  canvas.style.height = ch + 'px';
  wrapper.style.width = cw + 'px';
  wrapper.style.height = ch + 'px';
  const isMobile = ('ontouchstart' in window) || vw < 700;
  document.getElementById('controls').style.display = isMobile ? 'block' : 'none';
}
window.addEventListener('resize', resize);
resize();

// ===================== SAVE / PROFILE =====================
const SAVE_VERSION = 1;
const PROFILE_KEY = '16-asteroids_profile';
const HISCORE_KEY = 'voidbreaker_hiscore';
const SCORES_KEY  = 'vb_scores';
const MUTED_KEY   = 'vb_muted';
const SETTINGS_KEY= 'vb_settings';

function generateName() {
  const adj = ['Void','Neon','Cyber','Nova','Dark','Star','Iron','Flux','Hyper','Astro'];
  const noun= ['Pilot','Racer','Hawk','Wolf','Fox','Eagle','Ace','Hunter','Ghost','Blade'];
  return adj[Math.floor(Math.random()*adj.length)] + noun[Math.floor(Math.random()*noun.length)] + '_' + (100 + Math.floor(Math.random()*900));
}

function defaultProfile() {
  return {
    version: SAVE_VERSION,
    id: (typeof crypto !== 'undefined' && crypto.randomUUID) ? crypto.randomUUID() : (Date.now().toString(36)),
    name: generateName(),
    gamesPlayed: 0,
    bestScore: 0,
    highestWave: 0,
    totalAsteroids: 0,
    saucerKills: 0,
    hypUses: 0,
    achievements: {},
    firstPlay: true
  };
}

function migrateSave(raw) {
  if (!raw || typeof raw !== 'object') return defaultProfile();
  if (!raw.version || raw.version < SAVE_VERSION) {
    // future migrations here
    raw.version = SAVE_VERSION;
  }
  // ensure all fields exist
  const def = defaultProfile();
  for (const k of Object.keys(def)) {
    if (raw[k] === undefined) raw[k] = def[k];
  }
  return raw;
}

function loadProfile() {
  try {
    const raw = JSON.parse(localStorage.getItem(PROFILE_KEY) || 'null');
    return migrateSave(raw) || defaultProfile();
  } catch(e) { return defaultProfile(); }
}

function saveProfile() {
  try { localStorage.setItem(PROFILE_KEY, JSON.stringify(profile)); } catch(e) {}
}

let profile = loadProfile();

// Load / save settings
function loadSettings() {
  try {
    const s = JSON.parse(localStorage.getItem(SETTINGS_KEY) || 'null');
    return s || { sfxVol: 0.8, musicVol: 0.5 };
  } catch(e) { return { sfxVol: 0.8, musicVol: 0.5 }; }
}
function saveSettings() {
  try { localStorage.setItem(SETTINGS_KEY, JSON.stringify(settings)); } catch(e) {}
}
let settings = loadSettings();

// Scores table (top 10)
function loadScores() {
  try { return JSON.parse(localStorage.getItem(SCORES_KEY) || '[]'); } catch(e) { return []; }
}
function saveScore(score, wave) {
  let scores = loadScores();
  scores.push({ score, wave, date: new Date().toLocaleDateString(), name: profile.name });
  scores.sort((a,b) => b.score - a.score);
  scores = scores.slice(0, 10);
  try { localStorage.setItem(SCORES_KEY, JSON.stringify(scores)); } catch(e) {}
  return scores;
}

// ===================== AUDIO =====================
let audioCtx = null;
let muted = (localStorage.getItem(MUTED_KEY) === '1');

function getAudio() {
  if (!audioCtx) {
    try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch(e) {}
  }
  if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
  return audioCtx;
}

function vol() { return settings.sfxVol !== undefined ? settings.sfxVol : 0.8; }

function playSound(type) {
  if (muted) return;
  const ac = getAudio(); if (!ac) return;
  const v = vol();
  const now = ac.currentTime;
  const g = ac.createGain();
  g.connect(ac.destination);

  if (type === 'fire') {
    const o = ac.createOscillator();
    o.type = 'square';
    o.frequency.setValueAtTime(880, now);
    o.frequency.exponentialRampToValueAtTime(110, now + 0.08);
    g.gain.setValueAtTime(0.12 * v, now);
    g.gain.exponentialRampToValueAtTime(0.001, now + 0.08);
    o.connect(g); o.start(now); o.stop(now + 0.1);
  } else if (type === 'thrust') {
    const buf = ac.createBuffer(1, ac.sampleRate * 0.08, ac.sampleRate);
    const d = buf.getChannelData(0);
    for (let i = 0; i < d.length; i++) d[i] = (Math.random() * 2 - 1) * 0.3;
    const src = ac.createBufferSource(); src.buffer = buf;
    const filter = ac.createBiquadFilter();
    filter.type = 'bandpass'; filter.frequency.value = 120; filter.Q.value = 0.8;
    src.connect(filter); filter.connect(g);
    g.gain.setValueAtTime(0.15 * v, now);
    g.gain.exponentialRampToValueAtTime(0.001, now + 0.08);
    src.start(now); src.stop(now + 0.09);
  } else if (type === 'explode_large') {
    const buf = ac.createBuffer(1, ac.sampleRate * 0.4, ac.sampleRate);
    const d = buf.getChannelData(0);
    for (let i = 0; i < d.length; i++) d[i] = (Math.random() * 2 - 1) * Math.exp(-i/(ac.sampleRate*0.2));
    const src = ac.createBufferSource(); src.buffer = buf;
    const filter = ac.createBiquadFilter();
    filter.type = 'lowpass'; filter.frequency.value = 300;
    src.connect(filter); filter.connect(g);
    g.gain.setValueAtTime(0.4 * v, now); g.gain.exponentialRampToValueAtTime(0.001, now + 0.4);
    src.start(now); src.stop(now + 0.42);
  } else if (type === 'explode_med') {
    const buf = ac.createBuffer(1, ac.sampleRate * 0.25, ac.sampleRate);
    const d = buf.getChannelData(0);
    for (let i = 0; i < d.length; i++) d[i] = (Math.random() * 2 - 1) * Math.exp(-i/(ac.sampleRate*0.1));
    const src = ac.createBufferSource(); src.buffer = buf;
    const filter = ac.createBiquadFilter();
    filter.type = 'bandpass'; filter.frequency.value = 600; filter.Q.value = 1.5;
    src.connect(filter); filter.connect(g);
    g.gain.setValueAtTime(0.3 * v, now); g.gain.exponentialRampToValueAtTime(0.001, now + 0.25);
    src.start(now); src.stop(now + 0.27);
  } else if (type === 'explode_small') {
    const o = ac.createOscillator(); o.type = 'sawtooth';
    o.frequency.setValueAtTime(500, now);
    o.frequency.exponentialRampToValueAtTime(50, now + 0.12);
    g.gain.setValueAtTime(0.18 * v, now); g.gain.exponentialRampToValueAtTime(0.001, now + 0.12);
    o.connect(g); o.start(now); o.stop(now + 0.14);
  } else if (type === 'ship_die') {
    for (let i = 0; i < 4; i++) {
      const o = ac.createOscillator(); const gg = ac.createGain();
      gg.connect(ac.destination);
      o.type = 'sawtooth';
      const freq = 600 - i * 120;
      o.frequency.setValueAtTime(freq, now + i*0.07);
      o.frequency.exponentialRampToValueAtTime(40, now + i*0.07 + 0.18);
      gg.gain.setValueAtTime(0.2 * v, now + i*0.07);
      gg.gain.exponentialRampToValueAtTime(0.001, now + i*0.07 + 0.2);
      o.connect(gg); o.start(now + i*0.07); o.stop(now + i*0.07 + 0.22);
    }
  } else if (type === 'saucer') {
    const o = ac.createOscillator(); o.type = 'sine';
    o.frequency.setValueAtTime(300, now);
    o.frequency.setValueAtTime(450, now + 0.15);
    o.frequency.setValueAtTime(300, now + 0.3);
    o.frequency.setValueAtTime(450, now + 0.45);
    o.frequency.setValueAtTime(300, now + 0.6);
    g.gain.setValueAtTime(0.1 * v, now); g.gain.setValueAtTime(0.001, now + 0.65);
    o.connect(g); o.start(now); o.stop(now + 0.67);
  } else if (type === 'extralife') {
    const freqs = [523, 659, 784, 1047];
    freqs.forEach((f, i) => {
      const o = ac.createOscillator(); const gg = ac.createGain();
      gg.connect(ac.destination);
      o.type = 'sine'; o.frequency.value = f;
      gg.gain.setValueAtTime(0.18 * v, now + i*0.08);
      gg.gain.exponentialRampToValueAtTime(0.001, now + i*0.08 + 0.1);
      o.connect(gg); o.start(now + i*0.08); o.stop(now + i*0.08 + 0.12);
    });
  } else if (type === 'hyperspace') {
    const buf = ac.createBuffer(1, ac.sampleRate * 0.4, ac.sampleRate);
    const d = buf.getChannelData(0);
    for (let i = 0; i < d.length; i++) {
      const t = i / ac.sampleRate;
      d[i] = Math.sin(2 * Math.PI * (200 + 3000 * t) * t) * 0.3 * Math.exp(-t * 5);
    }
    const src = ac.createBufferSource(); src.buffer = buf;
    src.connect(g); g.gain.setValueAtTime(0.3 * v, now);
    src.start(now); src.stop(now + 0.42);
  } else if (type === 'waveclear') {
    const freqs2 = [784, 988, 1175, 1568];
    freqs2.forEach((f, i) => {
      const o = ac.createOscillator(); const gg = ac.createGain();
      gg.connect(ac.destination);
      o.type = 'sine'; o.frequency.value = f;
      gg.gain.setValueAtTime(0.22 * v, now + i*0.1);
      gg.gain.exponentialRampToValueAtTime(0.001, now + i*0.1 + 0.15);
      o.connect(gg); o.start(now + i*0.1); o.stop(now + i*0.1 + 0.17);
    });
  } else if (type === 'achievement') {
    const freqs3 = [880, 1108, 1320, 1760];
    freqs3.forEach((f, i) => {
      const o = ac.createOscillator(); const gg = ac.createGain();
      gg.connect(ac.destination);
      o.type = 'sine'; o.frequency.value = f;
      gg.gain.setValueAtTime(0.15 * v, now + i*0.07);
      gg.gain.exponentialRampToValueAtTime(0.001, now + i*0.07 + 0.12);
      o.connect(gg); o.start(now + i*0.07); o.stop(now + i*0.07 + 0.14);
    });
  }
}

// Heartbeat
let hbTimer = 0;
function playHeartbeat(asteroidCount, maxCount) {
  if (muted) return;
  const ac = getAudio(); if (!ac) return;
  const fraction = Math.max(0, 1 - asteroidCount / Math.max(maxCount, 1));
  const bpm = 60 + 140 * fraction;
  hbTimer -= (1000 / 60);
  if (hbTimer > 0) return;
  hbTimer = 60000 / bpm;
  const v = vol();
  const now = ac.currentTime;
  const o1 = ac.createOscillator(); const g1 = ac.createGain(); g1.connect(ac.destination);
  o1.type = 'sine'; o1.frequency.setValueAtTime(80, now); o1.frequency.setValueAtTime(55, now + 0.05);
  g1.gain.setValueAtTime(0.25 * v, now); g1.gain.exponentialRampToValueAtTime(0.001, now + 0.12);
  o1.connect(g1); o1.start(now); o1.stop(now + 0.14);
  const o2 = ac.createOscillator(); const g2 = ac.createGain(); g2.connect(ac.destination);
  o2.type = 'sine'; o2.frequency.setValueAtTime(65, now + 0.06); o2.frequency.setValueAtTime(45, now + 0.12);
  g2.gain.setValueAtTime(0.2 * v, now + 0.06); g2.gain.exponentialRampToValueAtTime(0.001, now + 0.2);
  o2.connect(g2); o2.start(now + 0.06); o2.stop(now + 0.22);
}

// ===================== ACHIEVEMENTS =====================
const ACHIEVEMENTS = [
  { id: 'first_asteroid',   label: 'First Blood',       desc: 'Destroy your first asteroid' },
  { id: 'saucer_hunter',    label: 'Saucer Hunter',     desc: 'Destroy the small saucer' },
  { id: 'hyp_survivor',     label: 'Dice with Death',   desc: 'Survive a hyperspace jump' },
  { id: 'wave_master',      label: 'Wave Master',       desc: 'Reach Wave 10' },
  { id: 'big_score',        label: 'Big Score',         desc: 'Score 50,000 points' },
  { id: 'graveyard',        label: 'Graveyard',         desc: 'Destroy 100 asteroids in lifetime' },
  { id: 'saucer_ace',       label: 'Saucer Ace',        desc: 'Destroy 10 saucers in lifetime' }
];

let achToastTimer = 0;

function unlockAchievement(id) {

  saveProfile();
  const def = ACHIEVEMENTS.find(a => a.id === id);

}

function showAchToast(label, desc) {

// Runtime achievement tracking
let achAsteroidsThisSession = 0;

function checkAchievements() {
  if (achAsteroidsThisSession >= 1) unlockAchievement('first_asteroid');
  if (profile.totalAsteroids >= 100) unlockAchievement('graveyard');
  if (profile.saucerKills >= 10) unlockAchievement('saucer_ace');
  if (profile.bestScore >= 50000) unlockAchievement('big_score');
  if (profile.highestWave >= 10) unlockAchievement('wave_master');
}

// ===================== STARS =====================
const stars = [];
for (let i = 0; i < 100; i++) {
  stars.push({ x: Math.random() * W, y: Math.random() * H, r: Math.random() < 0.2 ? 1.5 : 1, a: 0.2 + Math.random() * 0.5 });
}

// ===================== GAME STATE =====================
const STATES = { TITLE: 0, PLAYING: 1, DYING: 2, RESPAWNING: 3, WAVE_CLEAR: 4, GAME_OVER: 5, PAUSED: 6, SETTINGS: 7, PROFILE: 8, SCORES: 9, TUTORIAL: 10 };
let state = STATES.TITLE;
let prevState = STATES.TITLE; // for settings/profile return

let hiscore = parseInt(localStorage.getItem(HISCORE_KEY) || '0');
let lives = 3;
let wave = 0;
let stateTimer = 0;
let extraLifeThreshold = 10000;
let flashTimer = 0;
let scorePopups = [];

// ===================== GAMESHELL DIFFICULTY =====================
// Read once at the start of each game (see startGame). 'normal' === original
// behaviour (no count change, speed x1). Easy = fewer + slower asteroids;
// Hard = more + faster asteroids.
const GS_DIFF_PRESETS = {
  easy:   { countBonus: -1, astSpeed: 0.80 },
  normal: { countBonus:  0, astSpeed: 1.00 },
  hard:   { countBonus:  1, astSpeed: 1.25 }
};
let gsDiff = { countBonus: 0, astSpeed: 1 };
function applyGsDifficulty() {
  let d = 'normal';
  try { if (window.GameShell && window.GameShell.getDifficulty) d = window.GameShell.getDifficulty() || 'normal'; } catch (e) {}
  gsDiff = GS_DIFF_PRESETS[d] || GS_DIFF_PRESETS.normal;
}

// screen shake (juice)
let shakeX = 0, shakeY = 0, shakeMag = 0;
function triggerShake(mag) {
  if (reducedMotion) return;
  shakeMag = Math.max(shakeMag, mag);
}

// ===================== SHIP =====================
const SHIP_ROTATE = 0.065;
const SHIP_THRUST = 0.18;
const SHIP_DRAG = 0.988;
const SHIP_MAX_SPEED = 8;
const BULLET_SPEED = 11;
const BULLET_LIFE = 70;
const BULLET_MAX = 4;
const INVULN_FRAMES = 180;

let ship = {};
let bullets = [];
let particles = [];

function resetShip() {
  ship = {
    x: W / 2, y: H / 2,
    vx: 0, vy: 0,
    angle: -Math.PI / 2,
    thrusting: false,
    invuln: INVULN_FRAMES,
    dead: false,
    blinkOn: true
  };
}

// ===================== ASTEROIDS =====================
const ASTEROID_SIZES = {
  large:  { radius: 44, speed: [0.5, 1.8], points: 20, children: 'medium' },
  medium: { radius: 22, speed: [1.5, 3.2], points: 50, children: 'small' },
  small:  { radius: 11, speed: [3.0, 5.5], points: 100, children: null }
};
let asteroids = [];

function makeAsteroidShape(radius) {
  const verts = 7 + Math.floor(Math.random() * 5);
  const pts = [];
  for (let i = 0; i < verts; i++) {
    const angle = (i / verts) * Math.PI * 2;
    const r = radius * (0.72 + Math.random() * 0.38);
    pts.push({ x: Math.cos(angle) * r, y: Math.sin(angle) * r });
  }
  return pts;
}

function spawnAsteroid(sizeName, x, y) {
  const s = ASTEROID_SIZES[sizeName];
  const speed = (s.speed[0] + Math.random() * (s.speed[1] - s.speed[0])) * gsDiff.astSpeed;
  const angle = Math.random() * Math.PI * 2;
  return {
    x, y,
    vx: Math.cos(angle) * speed,
    vy: Math.sin(angle) * speed,
    angle: 0,
    spin: (Math.random() - 0.5) * 0.06,
    size: sizeName,
    radius: s.radius,
    points: s.points,
    children: s.children,
    shape: makeAsteroidShape(s.radius)
  };
}

function spawnWave(waveNum) {
  asteroids = [];
  const count = Math.max(1, Math.min(4 + (waveNum - 1) * 2, 11) + gsDiff.countBonus);
  totalAsteroidsInWave = count;
  for (let i = 0; i < count; i++) {
    let x, y;
    if (Math.random() < 0.5) {
      x = Math.random() < 0.5 ? 0 : W;
      y = Math.random() * H;
    } else {
      x = Math.random() * W;
      y = Math.random() < 0.5 ? 0 : H;
    }
    asteroids.push(spawnAsteroid('large', x, y));
  }
}

// ===================== SAUCER =====================
const SAUCER_TYPES = {
  large: { w: 34, h: 16, speed: 1.6, fireRate: 120, points: 200, aimsAt: false },
  small: { w: 18, h: 10, speed: 2.2, fireRate: 80,  points: 1000, aimsAt: true }
};
let saucer = null;
let saucerTimer = 0;
const SAUCER_SPAWN_MIN = 900;
const SAUCER_SPAWN_MAX = 1800;
let saucerFireTimer = 0;
let saucerJinkTimer = 0;
let saucerJinkDy = 0;

function spawnSaucer() {
  const type = (score >= 10000) ? (Math.random() < 0.6 ? 'small' : 'large') : 'large';
  const fromLeft = Math.random() < 0.5;
  const s = SAUCER_TYPES[type];
  saucer = {
    type, x: fromLeft ? -s.w : W + s.w, y: 80 + Math.random() * (H - 160),
    vx: fromLeft ? s.speed : -s.speed, vy: 0,
    fireRate: s.fireRate, points: s.points, aimsAt: s.aimsAt,
    w: s.w, h: s.h
  };
  saucerFireTimer = s.fireRate;
  saucerJinkTimer = 90 + Math.floor(Math.random() * 60);
  saucerJinkDy = 0;
  playSound('saucer');
}

// ===================== BULLETS =====================
function fireBullet(fromX, fromY, angle, isEnemy) {
  if (!isEnemy && bullets.filter(b => !b.enemy).length >= BULLET_MAX) return;
  bullets.push({
    x: fromX, y: fromY,
    vx: Math.cos(angle) * BULLET_SPEED,
    vy: Math.sin(angle) * BULLET_SPEED,
    life: BULLET_LIFE,
    enemy: !!isEnemy
  });
  if (!isEnemy) playSound('fire');
}

// ===================== PARTICLES =====================
function explodeAt(x, y, count, colorStart, speed) {
  const c = reducedMotion ? Math.ceil(count * 0.4) : count;
  for (let i = 0; i < c; i++) {
    const angle = (i / c) * Math.PI * 2 + (Math.random() - 0.5) * 0.5;
    const s = speed * (0.4 + Math.random() * 0.8);
    particles.push({
      x, y,
      vx: Math.cos(angle) * s,
      vy: Math.sin(angle) * s,
      life: 40 + Math.random() * 30,
      maxLife: 70,
      color: colorStart,
      len: 4 + Math.random() * 8
    });
  }
}

// ===================== SCORE POPUPS =====================
function addScorePopup(x, y, pts) {
  scorePopups.push({ x, y, pts, life: 50, vy: -0.8 });
}

// ===================== COLLISION =====================
function circlesCollide(ax, ay, ar, bx, by, br) {
  const dx = ax - bx, dy = ay - by;
  return dx*dx + dy*dy < (ar + br) * (ar + br);
}

function wrap(obj) {
  if (obj.x < 0) obj.x += W;
  else if (obj.x > W) obj.x -= W;
  if (obj.y < 0) obj.y += H;
  else if (obj.y > H) obj.y -= H;
}

// ===================== INPUT =====================
const keys = {};
window.addEventListener('keydown', e => {
  keys[e.code] = true;
  if (e.code === 'Space' || e.code === 'ArrowUp' || e.code === 'ArrowLeft' || e.code === 'ArrowRight') {
    e.preventDefault();
  }
  // Pause toggle
  if ((e.code === 'KeyP' || e.code === 'Escape') && state === STATES.PLAYING) {
    state = STATES.PAUSED;
  } else if ((e.code === 'KeyP' || e.code === 'Escape') && state === STATES.PAUSED) {
    state = STATES.PLAYING;
  } else if (e.code === 'Escape' && (state === STATES.SETTINGS || state === STATES.PROFILE || state === STATES.SCORES || state === STATES.TUTORIAL)) {
    state = prevState;
  }
  // Mute toggle
  if (e.code === 'KeyM') {
    muted = !muted;
    try { localStorage.setItem(MUTED_KEY, muted ? '1' : '0'); } catch(ex) {}
  }
  if ((e.code === 'Space' || e.code === 'Enter') && state === STATES.TITLE) startGame();
  if ((e.code === 'Space' || e.code === 'Enter') && state === STATES.GAME_OVER) startGame();
  if ((e.code === 'ShiftLeft' || e.code === 'ShiftRight' || e.code === 'KeyH') && state === STATES.PLAYING) {
    doHyperspace();
  }
});
window.addEventListener('keyup', e => { keys[e.code] = false; });

// Auto-pause on tab blur
document.addEventListener('visibilitychange', () => {
  if (document.hidden && state === STATES.PLAYING) {
    state = STATES.PAUSED;
  }
  autoSaveAll();
});
window.addEventListener('beforeunload', autoSaveAll);

function autoSaveAll() {
  try {
    saveProfile();
    saveSettings();
  } catch(e) {}
}

// Fire key tracking to avoid auto-fire
let firePrev = false;
let hypCooldown = 0;

function doHyperspace() {
  if (hypCooldown > 0 || ship.dead) return;
  playSound('hyperspace');
  hypCooldown = 180;
  profile.hypUses++;
  if (Math.random() < 0.07) {
    killShip();
  } else {
    ship.x = 20 + Math.random() * (W - 40);
    ship.y = 20 + Math.random() * (H - 40);
    ship.vx = 0; ship.vy = 0;
    ship.invuln = 60;
    unlockAchievement('hyp_survivor');
  }
}

// ===================== MOBILE BUTTONS =====================
const mobileKeys = { left: false, right: false, thrust: false, fire: false, hyp: false };

function setupMobileBtn(id, key) {
  const el = document.getElementById(id);
  if (!el) return;
  el.addEventListener('touchstart', e => { e.preventDefault(); mobileKeys[key] = true; el.classList.add('active'); getAudio(); }, { passive: false });
  el.addEventListener('touchend',   e => { e.preventDefault(); mobileKeys[key] = false; el.classList.remove('active'); }, { passive: false });
  el.addEventListener('touchcancel',e => { e.preventDefault(); mobileKeys[key] = false; el.classList.remove('active'); }, { passive: false });
  el.addEventListener('mousedown', () => { mobileKeys[key] = true; });
  el.addEventListener('mouseup',   () => { mobileKeys[key] = false; });
}
setupMobileBtn('btn-left', 'left');
setupMobileBtn('btn-right', 'right');
setupMobileBtn('btn-thrust', 'thrust');
setupMobileBtn('btn-fire', 'fire');
setupMobileBtn('btn-hyp', 'hyp');

document.getElementById('btn-hyp').addEventListener('touchstart', e => {
  e.preventDefault(); if (state === STATES.PLAYING) doHyperspace();
}, { passive: false });
document.getElementById('btn-hyp').addEventListener('mousedown', () => {
  if (state === STATES.PLAYING) doHyperspace();
});

// Start on tap
canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  getAudio();
  if (state === STATES.TITLE) {
    startGame();
  }
  if (state === STATES.GAME_OVER) startGame();
  if (state === STATES.TUTORIAL) { profile.firstPlay = false; saveProfile(); state = STATES.TITLE; }
}, { passive: false });

// Canvas click for title-screen buttons
canvas.addEventListener('click', e => {
  if (state === STATES.TITLE) handleTitleClick(e);
  else if (state === STATES.SETTINGS) handleSettingsClick(e);
  else if (state === STATES.PROFILE) handleProfileClick(e);
  else if (state === STATES.SCORES) { state = prevState; }
  else if (state === STATES.TUTORIAL) { profile.firstPlay = false; saveProfile(); state = STATES.TITLE; }
  else if (state === STATES.GAME_OVER) handleGameOverClick(e);
  else if (state === STATES.PAUSED) handlePauseClick(e);
});

// ===================== TITLE BUTTON RECTS =====================
let titleBtns = {};
let settingsBtns = {};
let profileBtns = {};
let gameoverBtns = {};
let pauseBtns = {};

function getCanvasXY(e) {
  const rect = canvas.getBoundingClientRect();
  const cx = (e.clientX - rect.left) / scale;
  const cy = (e.clientY - rect.top)  / scale;
  return { cx, cy };
}

function inRect(cx, cy, r) {
  return cx >= r.x && cx <= r.x + r.w && cy >= r.y && cy <= r.y + r.h;
}

function handleTitleClick(e) {
  const { cx, cy } = getCanvasXY(e);
  if (titleBtns.start  && inRect(cx, cy, titleBtns.start))  {
    startGame();
  }
  if (titleBtns.settings && inRect(cx, cy, titleBtns.settings)) { prevState = STATES.TITLE; state = STATES.SETTINGS; }
  if (titleBtns.profile  && inRect(cx, cy, titleBtns.profile))  { prevState = STATES.TITLE; state = STATES.PROFILE; }
  if (titleBtns.scores   && inRect(cx, cy, titleBtns.scores))   { prevState = STATES.TITLE; state = STATES.SCORES; }
  if (titleBtns.tutorial && inRect(cx, cy, titleBtns.tutorial)) { showTutorial(); }
}

function handleSettingsClick(e) {
  const { cx, cy } = getCanvasXY(e);
  if (settingsBtns.mute   && inRect(cx, cy, settingsBtns.mute))   {
    muted = !muted;
    try { localStorage.setItem(MUTED_KEY, muted ? '1' : '0'); } catch(ex) {}
  }
  if (settingsBtns.back   && inRect(cx, cy, settingsBtns.back))   { saveSettings(); state = prevState; }
  if (settingsBtns.sfxDn  && inRect(cx, cy, settingsBtns.sfxDn))  { settings.sfxVol = Math.max(0, settings.sfxVol - 0.1); saveSettings(); }
  if (settingsBtns.sfxUp  && inRect(cx, cy, settingsBtns.sfxUp))  { settings.sfxVol = Math.min(1, settings.sfxVol + 0.1); saveSettings(); }
  if (settingsBtns.reset  && inRect(cx, cy, settingsBtns.reset))  { confirmResetData(); }
}

function handleProfileClick(e) {
  const { cx, cy } = getCanvasXY(e);
  if (profileBtns.back   && inRect(cx, cy, profileBtns.back))   { saveProfile(); state = prevState; }
  if (profileBtns.rename && inRect(cx, cy, profileBtns.rename)) { doRename(); }
}

function handleGameOverClick(e) {
  const { cx, cy } = getCanvasXY(e);
  if (gameoverBtns.play   && inRect(cx, cy, gameoverBtns.play))   startGame();
  if (gameoverBtns.share  && inRect(cx, cy, gameoverBtns.share))  shareScore();
  if (gameoverBtns.scores && inRect(cx, cy, gameoverBtns.scores)) { prevState = STATES.GAME_OVER; state = STATES.SCORES; }
}

function handlePauseClick(e) {
  const { cx, cy } = getCanvasXY(e);
  if (pauseBtns.resume   && inRect(cx, cy, pauseBtns.resume))   state = STATES.PLAYING;
  if (pauseBtns.settings && inRect(cx, cy, pauseBtns.settings)) { prevState = STATES.PAUSED; state = STATES.SETTINGS; }
}

function doRename() {
  const n = window.prompt('Enter your pilot name (max 20 chars):', profile.name);
  if (n && n.trim().length > 0) {
    profile.name = n.trim().slice(0, 20);
    saveProfile();
  }
}

function confirmResetData() {
  if (window.confirm('Reset ALL save data? This cannot be undone.')) {
    try {
      localStorage.removeItem(PROFILE_KEY);
      localStorage.removeItem(HISCORE_KEY);
      localStorage.removeItem(SCORES_KEY);
      localStorage.removeItem(MUTED_KEY);
      localStorage.removeItem(SETTINGS_KEY);
    } catch(e) {}
    profile = defaultProfile();
    hiscore = 0;
    muted = false;
    settings = { sfxVol: 0.8, musicVol: 0.5 };
    saveProfile();
  }
}

function shareScore() {
  const text = `I reached Wave ${wave} with score ${score} in Void Breaker! #VoidBreaker`;
  if (navigator.share) {
    navigator.share({ title: 'Void Breaker', text }).catch(() => {});
  } else {
    try { navigator.clipboard.writeText(text); showAchToast('Copied!', text); } catch(e) {}
  }
}

function showTutorial() {
  prevState = STATES.TITLE;
  state = STATES.TUTORIAL;
}

// ===================== GAME FUNCTIONS =====================
function startGame() {
  // GameShell: read difficulty for this run + refill hints (optional, safe).
  applyGsDifficulty();
  try { if (window.GameShell && typeof window.GameShell.newGame === 'function') window.GameShell.newGame(); } catch (e) {}
  // Update profile for first play
  profile.firstPlay = false;
  profile.gamesPlayed++;
  saveProfile();

  achAsteroidsThisSession = 0;
  score = 0;
  lives = 3;
  wave = 0;
  bullets = [];
  particles = [];
  scorePopups = [];
  saucer = null;
  saucerTimer = SAUCER_SPAWN_MIN + Math.floor(Math.random() * (SAUCER_SPAWN_MAX - SAUCER_SPAWN_MIN));
  extraLifeThreshold = 10000;
  hbTimer = 0;
  firePrev = false;
  hypCooldown = 0;
  resetShip();
  wave = 1;
  spawnWave(wave);
  state = STATES.PLAYING;
}

function killShip() {
  if (ship.invuln > 0 || ship.dead) return;
  ship.dead = true;
  playSound('ship_die');
  explodeAt(ship.x, ship.y, 12, '#ff4400', 3.5);
  triggerShake(8);
  lives--;
  state = STATES.DYING;
  stateTimer = 80;
  if (!reducedMotion) flashTimer = 4;
}

function respawn() {
  bullets = bullets.filter(b => b.enemy);
  resetShip();
  ship.invuln = INVULN_FRAMES;
  state = STATES.RESPAWNING;
  stateTimer = INVULN_FRAMES;
}

function checkWaveClear() {
  if (asteroids.length === 0 && state === STATES.PLAYING) {
    playSound('waveclear');
    if (!reducedMotion) flashTimer = 8;
    state = STATES.WAVE_CLEAR;
    stateTimer = 120;
  }
}

// ===================== UPDATE =====================
function update() {
  // Update shake
  if (shakeMag > 0) {
    shakeX = (Math.random() - 0.5) * shakeMag;
    shakeY = (Math.random() - 0.5) * shakeMag;
    shakeMag *= 0.85;
    if (shakeMag < 0.5) shakeMag = 0;
  } else { shakeX = 0; shakeY = 0; }

  if (state === STATES.TITLE || state === STATES.GAME_OVER || state === STATES.PAUSED ||
      state === STATES.SETTINGS || state === STATES.PROFILE || state === STATES.SCORES || state === STATES.TUTORIAL) return;

  if (flashTimer > 0) flashTimer--;
  if (hypCooldown > 0) hypCooldown--;

  // State transitions
  if (state === STATES.DYING) {
    stateTimer--;
    if (stateTimer <= 0) {
      if (lives <= 0) {
        // Save high score + update profile
        if (score > hiscore) {
          hiscore = score;
          try { localStorage.setItem(HISCORE_KEY, hiscore); } catch(e) {}
        }
        if (score > profile.bestScore) profile.bestScore = score;
        if (wave > profile.highestWave) profile.highestWave = wave;
        saveScore(score, wave);
        checkAchievements();
        saveProfile();
        // Report final score to the GameShell overlay leaderboard (optional, safe).
        try { if (window.GameShell && typeof window.GameShell.submitScore === 'function') window.GameShell.submitScore(Math.round(score), { difficulty: (window.GameShell.getDifficulty && window.GameShell.getDifficulty()) || 'normal' }); } catch (e) {}
        state = STATES.GAME_OVER;
      } else {
        respawn();
      }
    }
  }

  if (state === STATES.RESPAWNING) {
    stateTimer--;
    if (stateTimer <= 0) state = STATES.PLAYING;
  }

  if (state === STATES.WAVE_CLEAR) {
    stateTimer--;
    if (stateTimer <= 0) {
      wave++;
      bullets = [];
      saucer = null;
      saucerTimer = SAUCER_SPAWN_MIN + Math.floor(Math.random() * (SAUCER_SPAWN_MAX - SAUCER_SPAWN_MIN));
      spawnWave(wave);
      state = STATES.PLAYING;
    }
  }

  if (state !== STATES.PLAYING && state !== STATES.RESPAWNING && state !== STATES.DYING) return;

  const isAlive = state === STATES.PLAYING || state === STATES.RESPAWNING;

  // --- Ship controls ---
  if (isAlive && !ship.dead) {
    const rotLeft  = keys['ArrowLeft']  || keys['KeyA'] || mobileKeys.left;
    const rotRight = keys['ArrowRight'] || keys['KeyD'] || mobileKeys.right;
    const thrust   = keys['ArrowUp']    || keys['KeyW'] || mobileKeys.thrust;
    const fireNow  = keys['Space']      || keys['KeyZ'] || mobileKeys.fire;

    if (rotLeft)  ship.angle -= SHIP_ROTATE;
    if (rotRight) ship.angle += SHIP_ROTATE;
    if (thrust) {
      ship.vx += Math.cos(ship.angle) * SHIP_THRUST;
      ship.vy += Math.sin(ship.angle) * SHIP_THRUST;
      ship.thrusting = true;
      if (Math.random() < 0.25) playSound('thrust');
    } else {
      ship.thrusting = false;
    }

    const spd = Math.sqrt(ship.vx*ship.vx + ship.vy*ship.vy);
    if (spd > SHIP_MAX_SPEED) {
      ship.vx = (ship.vx/spd) * SHIP_MAX_SPEED;
      ship.vy = (ship.vy/spd) * SHIP_MAX_SPEED;
    }

    ship.vx *= SHIP_DRAG; ship.vy *= SHIP_DRAG;
    ship.x += ship.vx; ship.y += ship.vy;
    wrap(ship);

    if (fireNow && !firePrev) {
      fireBullet(
        ship.x + Math.cos(ship.angle) * 14,
        ship.y + Math.sin(ship.angle) * 14,
        ship.angle, false
      );
    }
    firePrev = fireNow;

    if (ship.invuln > 0) {
      ship.invuln--;
      ship.blinkOn = Math.floor(ship.invuln / 6) % 2 === 0;
    } else {
      ship.blinkOn = true;
    }
  }

  // --- Bullets ---
  for (let i = bullets.length - 1; i >= 0; i--) {
    const b = bullets[i];
    b.x += b.vx; b.y += b.vy;
    wrap(b);
    b.life--;
    if (b.life <= 0) { bullets.splice(i, 1); continue; }

    let hit = false;
    for (let j = asteroids.length - 1; j >= 0; j--) {
      const a = asteroids[j];
      if (circlesCollide(b.x, b.y, 3, a.x, a.y, a.radius * 0.8)) {
        const pts = a.points;
        if (!b.enemy) {
          score += pts;
          addScorePopup(a.x, a.y - 10, pts);
          if (score >= extraLifeThreshold) {
            lives++;
            extraLifeThreshold += 10000;
            playSound('extralife');
          }
          // Track profile stats
          profile.totalAsteroids++;
          achAsteroidsThisSession++;
          if (wave > profile.highestWave) profile.highestWave = wave;
          if (score > profile.bestScore) profile.bestScore = score;
          checkAchievements();
        }
        const sndMap = { large: 'explode_large', medium: 'explode_med', small: 'explode_small' };
        playSound(sndMap[a.size]);
        const pCount = a.size === 'large' ? 10 : a.size === 'medium' ? 7 : 5;
        const pColor = a.size === 'large' ? '#888' : a.size === 'medium' ? '#aaa' : '#fff';
        const pSpeed = a.size === 'large' ? 2.5 : a.size === 'medium' ? 2.0 : 1.5;
        explodeAt(a.x, a.y, pCount, pColor, pSpeed);
        if (!b.enemy) triggerShake(a.size === 'large' ? 4 : a.size === 'medium' ? 2 : 1);

        if (a.children) {
          for (let k = 0; k < 2; k++) {
            const child = spawnAsteroid(a.children, a.x + (Math.random()-0.5)*20, a.y + (Math.random()-0.5)*20);
            asteroids.push(child);
          }
        }
        asteroids.splice(j, 1);
        bullets.splice(i, 1);
        hit = true;
        break;
      }
    }
    if (hit) continue;

    if (saucer && !b.enemy && circlesCollide(b.x, b.y, 3, saucer.x, saucer.y, saucer.w * 0.5)) {
      score += saucer.points;
      addScorePopup(saucer.x, saucer.y - 10, saucer.points);
      if (score >= extraLifeThreshold) {
        lives++;
        extraLifeThreshold += 10000;
        playSound('extralife');
      }
      if (saucer.type === 'small') {
        unlockAchievement('saucer_hunter');
      }
      profile.saucerKills++;
      if (score > profile.bestScore) profile.bestScore = score;
      checkAchievements();
      explodeAt(saucer.x, saucer.y, 12, '#cc44ff', 3);
      triggerShake(6);
      playSound('ship_die');
      saucer = null;
      saucerTimer = SAUCER_SPAWN_MIN + Math.floor(Math.random() * (SAUCER_SPAWN_MAX - SAUCER_SPAWN_MIN));
      bullets.splice(i, 1);
    }
  }

  // --- Asteroids ---
  for (let i = 0; i < asteroids.length; i++) {
    const a = asteroids[i];
    a.x += a.vx; a.y += a.vy;
    a.angle += a.spin;
    wrap(a);

    if (!ship.dead && ship.invuln <= 0 && state === STATES.PLAYING) {
      if (circlesCollide(ship.x, ship.y, 10, a.x, a.y, a.radius * 0.75)) {
        killShip();
        break;
      }
    }
  }

  // --- Saucer ---
  if (state === STATES.PLAYING || state === STATES.RESPAWNING) {
    saucerTimer--;
    if (saucerTimer <= 0 && !saucer) {
      spawnSaucer();
    }
  }

  if (saucer) {
    saucer.x += saucer.vx;
    saucer.y += saucerJinkDy;
    wrap(saucer);

    saucerJinkTimer--;
    if (saucerJinkTimer <= 0) {
      saucerJinkDy = (Math.random() - 0.5) * 2.5;
      saucerJinkTimer = 60 + Math.floor(Math.random() * 90);
    }

    if ((saucer.vx > 0 && saucer.x > W + saucer.w * 2) ||
        (saucer.vx < 0 && saucer.x < -saucer.w * 2)) {
      saucer = null;
      saucerTimer = SAUCER_SPAWN_MIN + Math.floor(Math.random() * (SAUCER_SPAWN_MAX - SAUCER_SPAWN_MIN));
    }

    if (saucer) {
      saucerFireTimer--;
      if (saucerFireTimer <= 0) {
        saucerFireTimer = saucer.fireRate;
        let fireAngle;
        if (saucer.aimsAt && !ship.dead) {
          const baseAngle = Math.atan2(ship.y - saucer.y, ship.x - saucer.x);
          const maxSpread = Math.max(0.15, 0.8 - (score - 10000) / 50000 * 0.65);
          fireAngle = baseAngle + (Math.random() - 0.5) * maxSpread;
        } else {
          fireAngle = Math.random() * Math.PI * 2;
        }
        fireBullet(saucer.x, saucer.y, fireAngle, true);
        playSound('saucer');
      }

      if (!ship.dead && ship.invuln <= 0 && state === STATES.PLAYING) {
        if (circlesCollide(ship.x, ship.y, 10, saucer.x, saucer.y, saucer.w * 0.5)) {
          killShip();
        }
      }

      for (let i = bullets.length - 1; i >= 0; i--) {
        const b = bullets[i];
        if (b.enemy && !ship.dead && ship.invuln <= 0 && state === STATES.PLAYING) {
          if (circlesCollide(b.x, b.y, 3, ship.x, ship.y, 10)) {
            killShip();
            bullets.splice(i, 1);
            break;
          }
        }
      }
    }
  }

  // --- Particles ---
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx; p.y += p.vy;
    p.life--;
    if (p.life <= 0) { particles.splice(i, 1); }
  }

  // --- Score popups ---
  for (let i = scorePopups.length - 1; i >= 0; i--) {
    const sp = scorePopups[i];
    sp.y += sp.vy;
    sp.life--;
    if (sp.life <= 0) scorePopups.splice(i, 1);
  }

  // --- Heartbeat ---
  if (state === STATES.PLAYING) {
    playHeartbeat(asteroids.length, totalAsteroidsInWave);
  }

  // --- Wave clear check ---
  if (state === STATES.PLAYING) checkWaveClear();
}

  ctx.shadowColor = highlight ? '#ffd700' : '#00ffff';

  ctx.beginPath();
  ctx.roundRect ? ctx.roundRect(x, y, w, h, 6) : ctx.rect(x, y, w, h);

  ctx.shadowBlur = 0;
  ctx.fillStyle = highlight ? '#ffd700' : '#00ffff';

function drawShip(x, y, angle, thrusting, alpha) {
  ctx.save();
  ctx.globalAlpha = alpha;
  ctx.translate(x, y);
  ctx.rotate(angle);
  ctx.strokeStyle = '#00ffff';
  ctx.lineWidth = 1.8;
  ctx.shadowBlur = 6;
  ctx.shadowColor = '#00ffff';
  ctx.beginPath();
  ctx.moveTo(16, 0);
  ctx.lineTo(-10, -9);
  ctx.lineTo(-5, 0);
  ctx.lineTo(-10, 9);
  ctx.closePath();
  ctx.stroke();
  if (thrusting) {
    ctx.strokeStyle = Math.random() < 0.5 ? '#ff6400' : '#ffff00';
    ctx.shadowColor = '#ff6400';
    ctx.shadowBlur = 8;
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.moveTo(-5, -3);
    ctx.lineTo(-13 - Math.random() * 6, 0);
    ctx.moveTo(-5, 3);
    ctx.lineTo(-13 - Math.random() * 6, 0);
    ctx.stroke();
  }
  ctx.restore();
}

function drawAsteroid(a) {
  ctx.save();
  ctx.translate(a.x, a.y);
  ctx.rotate(a.angle);
  ctx.strokeStyle = a.size === 'large' ? '#aaaaaa' : a.size === 'medium' ? '#cccccc' : '#ffffff';
  ctx.lineWidth = 1.5;
  ctx.shadowBlur = 4;
  ctx.shadowColor = '#ffffff44';
  ctx.beginPath();
  const s = a.shape;
  ctx.moveTo(s[0].x, s[0].y);
  for (let i = 1; i < s.length; i++) ctx.lineTo(s[i].x, s[i].y);
  ctx.closePath();
  ctx.stroke();
  ctx.restore();
}

function drawSaucer(s) {
  ctx.save();
  ctx.translate(s.x, s.y);
  const col = s.type === 'small' ? '#ff44cc' : '#cc44ff';
  ctx.strokeStyle = col;
  ctx.shadowBlur = 8; ctx.shadowColor = col;
  ctx.lineWidth = 1.6;
  ctx.beginPath();
  ctx.ellipse(0, 2, s.w * 0.5, s.h * 0.45, 0, 0, Math.PI * 2);
  ctx.stroke();
  ctx.beginPath();
  ctx.ellipse(0, -s.h * 0.2, s.w * 0.28, s.h * 0.35, 0, Math.PI, 2 * Math.PI);
  ctx.stroke();
  ctx.restore();
}

function drawBullet(b) {
  ctx.save();
  ctx.fillStyle = b.enemy ? '#ff4444' : '#ffff00';
  ctx.shadowBlur = 5; ctx.shadowColor = b.enemy ? '#ff0000' : '#ffff00';
  ctx.beginPath();
  ctx.arc(b.x, b.y, 2.5, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();
}

function drawParticle(p) {
  const a = p.life / p.maxLife;
  ctx.save();
  ctx.globalAlpha = a;
  ctx.strokeStyle = p.color;
  ctx.shadowBlur = 3; ctx.shadowColor = p.color;
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.moveTo(p.x, p.y);
  ctx.lineTo(p.x - p.vx * p.len * 0.3, p.y - p.vy * p.len * 0.3);
  ctx.stroke();
  ctx.restore();
}

// ===================== RENDER =====================
function render() {
  // Apply screen shake
  ctx.save();
  if (shakeMag > 0.5) ctx.translate(shakeX, shakeY);

  // Background
  if (!reducedMotion && flashTimer > 0) {
    const fa = flashTimer / 15 * 0.18;
    ctx.fillStyle = `rgba(255,255,255,${fa})`;
  } else {
    ctx.fillStyle = '#000000';
  }
  ctx.fillRect(0, 0, W, H);

  // Stars
  for (const s of stars) {
    ctx.globalAlpha = s.a;
    ctx.fillStyle = '#ffffff';
    ctx.fillRect(s.x, s.y, s.r, s.r);
  }
  ctx.globalAlpha = 1;

  if (state === STATES.TITLE) {
    ctx.restore();
    drawTitle();
    return;
  }
  if (state === STATES.SETTINGS) {
    ctx.restore();
    drawSettings();
    return;
  }
  if (state === STATES.PROFILE) {
    ctx.restore();
    drawProfile();
    return;
  }
  if (state === STATES.SCORES) {
    ctx.restore();
    drawScores();
    return;
  }
  if (state === STATES.TUTORIAL) {
    ctx.restore();
    drawTutorial();
    return;
  }
  if (state === STATES.GAME_OVER) {
    ctx.restore();
    drawGameOver();
    return;
  }

  // Game objects
  for (const a of asteroids) drawAsteroid(a);
  for (const b of bullets) drawBullet(b);
  for (const p of particles) drawParticle(p);
  if (saucer) drawSaucer(saucer);

  // Score popups
  for (const sp of scorePopups) {
    ctx.save();
    ctx.globalAlpha = sp.life / 50;
    ctx.fillStyle = '#ffff00';
    ctx.font = 'bold 14px "Courier New", monospace';
    ctx.textAlign = 'center';
    ctx.fillText('+' + sp.pts, sp.x, sp.y);
    ctx.restore();
  }

  // Ship
  if (!ship.dead && ship.blinkOn) {
    drawShip(ship.x, ship.y, ship.angle, ship.thrusting, 1.0);
  }

  drawHUD();

  if (state === STATES.WAVE_CLEAR) drawWaveClear();
  if (state === STATES.PAUSED) drawPause();

  ctx.restore();
}

// ===================== MAIN LOOP =====================
let lastTime = 0;
function loop(ts) {
  requestAnimationFrame(loop);
  const dt = ts - lastTime;
  if (dt < 14) return;
  lastTime = ts;
  update();
  render();
}

// Show tutorial on very first play
if (profile.firstPlay) {
  state = STATES.TUTORIAL;
}

requestAnimationFrame(loop);

})();
</script>
</body>
</html>
