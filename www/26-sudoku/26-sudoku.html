<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Sudoku</title>
<style>
  :root {
    --bg: #f4f4ef;
    --surface: #ffffff;
    --border-thin: #c8c8c0;
    --border-box: #2a2a3a;
    --given-color: #1a1a2e;
    --player-color: #2563eb;
    --error-color: #dc2626;
    --note-color: #6b7280;
    --selected-bg: #dbeafe;
    --peer-bg: #f0f4ff;
    --same-digit-bg: #bfdbfe;
    --conflict-bg: #fee2e2;
    --win-overlay: rgba(0,0,0,0.55);
    --pad-btn-bg: #ffffff;
    --pad-btn-hover: #e8edf8;
    --pad-btn-active: #c7d7f5;
    --pad-btn-border: #d0d5e0;
    --erase-btn-bg: #fef3c7;
    --notes-on-bg: #d1fae5;
    --hint-btn-bg: #fef9c3;
    --check-btn-bg: #dcfce7;
    --text-muted: #6b7280;
    --text-main: #1a1a2e;
    --hud-bg: #ffffff;
    --difficulty-easy: #16a34a;
    --difficulty-medium: #d97706;
    --difficulty-hard: #dc2626;
    --button-primary: #2563eb;
    --button-primary-text: #ffffff;
    --transition: 0.12s ease;
    --modal-bg: rgba(0,0,0,0.6);
  }
  [data-dark] {
    --bg: #12121e;
    --surface: #1e1e30;
    --border-thin: #3a3a5a;
    --border-box: #8888bb;
    --given-color: #e2e8f0;
    --player-color: #60a5fa;
    --error-color: #f87171;
    --note-color: #9ca3af;
    --selected-bg: #1e3a5f;
    --peer-bg: #1a1a2e;
    --same-digit-bg: #1e3a6e;
    --conflict-bg: #3f1212;
    --pad-btn-bg: #1e1e30;
    --pad-btn-hover: #2a2a42;
    --pad-btn-active: #363658;
    --pad-btn-border: #3a3a5a;
    --erase-btn-bg: #2a2214;
    --notes-on-bg: #0d2a1a;
    --hint-btn-bg: #2a2412;
    --check-btn-bg: #0d2a14;
    --text-muted: #9ca3af;
    --text-main: #e2e8f0;
    --hud-bg: #1e1e30;
    --button-primary: #3b82f6;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    background: var(--bg);
    color: var(--text-main);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
    padding: 8px 8px 16px;
    transition: background var(--transition), color var(--transition);
    overflow-x: hidden;
  }

  /* ── HEADER ─────────────────────────────────────────── */
  #header {
    width: 100%;
    max-width: 420px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 6px;
  }
  #header h1 {
    font-size: 1.5rem;
    font-weight: 800;
    letter-spacing: -0.5px;
    color: var(--text-main);
    cursor: pointer;
  }
  #header-btns { display: flex; gap: 6px; align-items: center; }
  .icon-btn {
    background: var(--surface);
    border: 1px solid var(--pad-btn-border);
    border-radius: 8px;
    width: 36px; height: 36px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; font-size: 1rem;
    transition: background var(--transition);
    -webkit-tap-highlight-color: transparent;
    user-select: none;
  }
  .icon-btn:hover { background: var(--pad-btn-hover); }
  .icon-btn:active { background: var(--pad-btn-active); transform: scale(0.93); }

  /* ── DIFFICULTY SELECTOR ─────────────────────────────── */
  #diff-row {
    display: flex; gap: 6px; margin-bottom: 8px;
    width: 100%; max-width: 420px;
  }
  .diff-btn {
    flex: 1; padding: 7px 4px; border: 2px solid var(--pad-btn-border);
    border-radius: 10px; background: var(--surface);
    font-size: 0.8rem; font-weight: 700; cursor: pointer;
    transition: all var(--transition);
    -webkit-tap-highlight-color: transparent;
    user-select: none;
    color: var(--text-main);
  }
  .diff-btn:hover { transform: translateY(-1px); border-color: var(--button-primary); }
  .diff-btn.active[data-diff="easy"]   { background: #dcfce7; border-color: var(--difficulty-easy); color: var(--difficulty-easy); }
  .diff-btn.active[data-diff="medium"] { background: #fef3c7; border-color: var(--difficulty-medium); color: var(--difficulty-medium); }
  .diff-btn.active[data-diff="hard"]   { background: #fee2e2; border-color: var(--difficulty-hard); color: var(--difficulty-hard); }
  [data-dark] .diff-btn.active[data-diff="easy"]   { background: #0d2a1a; }
  [data-dark] .diff-btn.active[data-diff="medium"] { background: #2a1f00; }
  [data-dark] .diff-btn.active[data-diff="hard"]   { background: #2a0a0a; }

  /* ── HUD ─────────────────────────────────────────────── */
  #hud {
    width: 100%; max-width: 420px;
    display: flex; justify-content: space-between; align-items: center;
    background: var(--hud-bg); border: 1px solid var(--pad-btn-border);
    border-radius: 12px; padding: 8px 14px; margin-bottom: 8px;
    transition: background var(--transition);
  }
  .hud-block { display: flex; flex-direction: column; align-items: center; }
  .hud-label { font-size: 0.68rem; text-transform: uppercase; letter-spacing: 0.06em; color: var(--text-muted); }
  .hud-value { font-size: 1.1rem; font-weight: 700; color: var(--text-main); font-variant-numeric: tabular-nums; }
  #mistake-val { color: var(--error-color); }

  /* ── GRID ────────────────────────────────────────────── */
  #grid-wrap {
    width: 100%; max-width: 420px; aspect-ratio: 1/1;
    margin-bottom: 10px; position: relative;
  }
  #grid {
    display: grid; grid-template-columns: repeat(9, 1fr);
    width: 100%; height: 100%;
    border: 3px solid var(--border-box);
    border-radius: 4px;
    overflow: hidden;
    background: var(--surface);
    transition: background var(--transition);
  }

  /* Pause overlay over grid */
  #pause-veil {
    display: none; position: absolute; inset: 0;
    background: var(--surface); z-index: 10;
    align-items: center; justify-content: center;
    flex-direction: column; gap: 10px;
    border-radius: 4px; border: 3px solid var(--border-box);
  }
  #pause-veil.show { display: flex; }
  #pause-veil .pause-text { font-size: 1.6rem; font-weight: 800; color: var(--text-main); }
  #pause-veil .pause-sub  { font-size: 0.85rem; color: var(--text-muted); }

  .cell {
    position: relative;
    display: flex; align-items: center; justify-content: center;
    border-right: 1px solid var(--border-thin);
    border-bottom: 1px solid var(--border-thin);
    cursor: pointer;
    font-size: clamp(0.9rem, 4.5vw, 1.55rem);
    font-weight: 700;
    color: var(--given-color);
    background: var(--surface);
    transition: background var(--transition);
    -webkit-tap-highlight-color: transparent;
    user-select: none;
    overflow: hidden;
  }
  .cell:nth-child(3n):not(:nth-child(9n)) { border-right: 2.5px solid var(--border-box); }
  .cell:nth-child(n+19):nth-child(-n+27) { border-bottom: 2.5px solid var(--border-box); }
  .cell:nth-child(n+46):nth-child(-n+54) { border-bottom: 2.5px solid var(--border-box); }
  .cell.row3 { border-bottom: 2.5px solid var(--border-box); }
  .cell.row6 { border-bottom: 2.5px solid var(--border-box); }
  .cell.col3 { border-right: 2.5px solid var(--border-box); }
  .cell.col6 { border-right: 2.5px solid var(--border-box); }
  .cell.row9 { border-bottom: none; }
  .cell.col9 { border-right: none; }

  .cell.is-given { color: var(--given-color); }
  .cell.is-player { color: var(--player-color); }
  .cell.is-error  { color: var(--error-color) !important; }

  .cell.hl-peer     { background: var(--peer-bg); }
  .cell.hl-same     { background: var(--same-digit-bg); }
  .cell.hl-selected { background: var(--selected-bg); }
  .cell.hl-conflict { background: var(--conflict-bg); }

  @keyframes pop   { 0%{transform:scale(1.2)} 100%{transform:scale(1)} }
  @keyframes shake { 0%,100%{transform:translateX(0)} 20%{transform:translateX(-5px)} 40%{transform:translateX(5px)} 60%{transform:translateX(-4px)} 80%{transform:translateX(4px)} }
  @media (prefers-reduced-motion: reduce) {
    .anim-pop, .anim-shake { animation: none !important; }
  }
  .anim-pop   { animation: pop 0.15s ease-out; }
  .anim-shake { animation: shake 0.25s ease-in-out; }

  .notes-grid {
    display: grid; grid-template-columns: repeat(3,1fr); grid-template-rows: repeat(3,1fr);
    width: 100%; height: 100%; padding: 1px;
  }
  .notes-grid span {
    display: flex; align-items: center; justify-content: center;
    font-size: clamp(0.45rem, 1.6vw, 0.62rem);
    font-weight: 600; color: var(--note-color); line-height: 1;
  }

  /* ── NUMBER PAD ──────────────────────────────────────── */
  #numpad-area {
    width: 100%; max-width: 420px; display: flex; flex-direction: column; gap: 6px;
  }
  #numpad {
    display: grid; grid-template-columns: repeat(9, 1fr); gap: 4px;
  }
  .num-btn {
    aspect-ratio: 1/1;
    border: 1.5px solid var(--pad-btn-border);
    border-radius: 10px; background: var(--pad-btn-bg);
    font-size: clamp(0.9rem, 3.2vw, 1.2rem);
    font-weight: 700; cursor: pointer; color: var(--text-main);
    display: flex; align-items: center; justify-content: center;
    transition: all var(--transition);
    -webkit-tap-highlight-color: transparent;
    user-select: none; position: relative; overflow: hidden;
  }
  .num-btn:hover  { background: var(--pad-btn-hover); border-color: var(--button-primary); }
  .num-btn:active { background: var(--pad-btn-active); transform: scale(0.88); }
  .num-btn.completed { opacity: 0.3; pointer-events: none; }

  /* ── ACTION BUTTONS ──────────────────────────────────── */
  #action-row {
    display: flex; gap: 6px; width: 100%; max-width: 420px;
  }
  .action-btn {
    flex: 1; padding: 9px 4px; border: 1.5px solid var(--pad-btn-border);
    border-radius: 10px; background: var(--pad-btn-bg);
    font-size: 0.75rem; font-weight: 700; cursor: pointer; color: var(--text-main);
    transition: all var(--transition);
    -webkit-tap-highlight-color: transparent;
    user-select: none; text-align: center; line-height: 1.3;
  }
  .action-btn:hover  { background: var(--pad-btn-hover); border-color: var(--button-primary); }
  .action-btn:active { transform: scale(0.93); }
  #btn-erase  { background: var(--erase-btn-bg); }
  #btn-notes  { background: var(--pad-btn-bg); }
  #btn-notes.active { background: var(--notes-on-bg); border-color: #16a34a; color: #16a34a; }
  #btn-hint   { background: var(--hint-btn-bg); }
  #btn-check  { background: var(--check-btn-bg); }
  #btn-new    { background: var(--button-primary); color: var(--button-primary-text); border-color: var(--button-primary); }

  /* ── WIN OVERLAY ─────────────────────────────────────── */
  #win-overlay {
    display: none; position: fixed; inset: 0;
    background: var(--win-overlay); z-index: 100;
    align-items: center; justify-content: center;
  }
  #win-overlay.show { display: flex; }
  #win-card {
    background: var(--surface); border-radius: 20px;
    padding: 32px 28px; text-align: center; max-width: 320px; width: 90%;
    box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    animation: pop 0.3s ease-out;
  }
  @media (prefers-reduced-motion: reduce) { #win-card { animation: none; } }
  #win-card h2 { font-size: 2rem; margin-bottom: 6px; }
  #win-card .win-diff { font-size: 0.9rem; color: var(--text-muted); margin-bottom: 16px; }
  #win-card .win-stats { display: flex; gap: 24px; justify-content: center; margin-bottom: 20px; }
  #win-card .win-stat { display: flex; flex-direction: column; align-items: center; }
  #win-card .win-stat-val { font-size: 1.5rem; font-weight: 800; color: var(--text-main); }
  #win-card .win-stat-lbl { font-size: 0.72rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.05em; }
  #win-card .win-best { font-size: 0.85rem; color: var(--difficulty-easy); font-weight: 700; margin-bottom: 10px; min-height: 1.1rem; }
  #win-achievements { font-size: 0.8rem; color: var(--button-primary); margin-bottom: 14px; min-height: 1rem; }
  #win-play-again {
    width: 100%; padding: 12px; background: var(--button-primary);
    color: #fff; border: none; border-radius: 12px;
    font-size: 1rem; font-weight: 700; cursor: pointer;
    transition: opacity var(--transition);
  }
  #win-play-again:hover { opacity: 0.88; }

  /* ── CONFETTI ─── */
  #confetti-canvas { position: fixed; inset: 0; pointer-events: none; z-index: 99; }

  /* ── TOAST ──────────────────────────────────────────── */
  #toast {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
    background: #1a1a2e; color: #fff;
    padding: 10px 20px; border-radius: 24px;
    font-size: 0.9rem; font-weight: 600;
    z-index: 200; pointer-events: none;
    opacity: 0; transition: opacity 0.3s ease;
    white-space: nowrap;
  }
  #toast.show { opacity: 1; }

  /* ── MODAL (Profile / Stats) ─────────────────────────── */
  .modal-overlay {
    display: none; position: fixed; inset: 0;
    background: var(--modal-bg); z-index: 150;
    align-items: center; justify-content: center;
    padding: 16px;
  }
  .modal-overlay.show { display: flex; }
  .modal-card {
    background: var(--surface); border-radius: 20px;
    padding: 24px 20px; max-width: 340px; width: 100%;
    max-height: 85vh; overflow-y: auto;
    box-shadow: 0 20px 60px rgba(0,0,0,0.4);
  }
  .modal-card h2 { font-size: 1.3rem; font-weight: 800; margin-bottom: 16px; }
  .modal-close {
    float: right; background: none; border: none;
    font-size: 1.3rem; cursor: pointer; color: var(--text-muted);
    line-height: 1; margin-top: -4px;
  }
  .modal-section { margin-bottom: 18px; }
  .modal-section h3 { font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.06em; color: var(--text-muted); margin-bottom: 8px; }
  .profile-name-row { display: flex; gap: 8px; align-items: center; }
  .profile-name-row input {
    flex: 1; padding: 8px 10px; border: 1.5px solid var(--pad-btn-border);
    border-radius: 8px; background: var(--bg); color: var(--text-main);
    font-size: 0.9rem; font-weight: 600;
  }
  .profile-name-row input:focus { outline: 2px solid var(--button-primary); border-color: transparent; }
  .profile-name-row button {
    padding: 8px 14px; background: var(--button-primary); color: #fff;
    border: none; border-radius: 8px; font-weight: 700; cursor: pointer; font-size: 0.85rem;
  }
  .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .stat-item { background: var(--bg); border-radius: 10px; padding: 10px 12px; }
  .stat-item-label { font-size: 0.68rem; text-transform: uppercase; letter-spacing: 0.05em; color: var(--text-muted); }
  .stat-item-value { font-size: 1.1rem; font-weight: 800; color: var(--text-main); }
  .diff-stats-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; margin-bottom: 8px; }
  .diff-stat-cell { background: var(--bg); border-radius: 8px; padding: 8px; text-align: center; }
  .diff-stat-cell .dsv { font-size: 1rem; font-weight: 800; color: var(--text-main); }
  .diff-stat-cell .dsl { font-size: 0.64rem; color: var(--text-muted); text-transform: uppercase; }
  .streak-row { display: flex; gap: 8px; justify-content: center; margin-bottom: 6px; }
  .streak-badge { flex: 1; background: var(--bg); border-radius: 8px; padding: 8px; text-align: center; }
  .streak-badge .sv { font-size: 1.2rem; font-weight: 800; color: var(--button-primary); }
  .streak-badge .sl { font-size: 0.65rem; color: var(--text-muted); text-transform: uppercase; }
  .achievement-list { list-style: none; padding: 0; display: flex; flex-direction: column; gap: 6px; }
  .achievement-list li {
    display: flex; align-items: center; gap: 10px;
    background: var(--bg); border-radius: 8px; padding: 8px 10px;
    font-size: 0.82rem;
  }
  .achievement-list li .ach-icon { font-size: 1.1rem; }
  .achievement-list li .ach-name { font-weight: 700; color: var(--text-main); }
  .achievement-list li .ach-desc { font-size: 0.72rem; color: var(--text-muted); }
  .achievement-list li.locked { opacity: 0.45; }

  /* ── RESPONSIVE ──────────────────────────────────────── */
  @media (min-height: 700px) and (min-width: 400px) {
    #grid-wrap { max-width: 390px; }
  }
  @media (max-width: 360px) {
    .action-btn { font-size: 0.68rem; padding: 8px 2px; }
    .num-btn { border-radius: 8px; }
  }
</style>

<script>
// ═══════════════════════════════════════════════════════
//  CONSTANTS & CONFIG
// ═══════════════════════════════════════════════════════
const SAVE_VERSION = 2;
const NS = '26-sudoku_';

const DIFF_CONFIG = {
  easy:   { givens: 46 },
  medium: { givens: 34 },
  hard:   { givens: 26 }
};

const ACHIEVEMENTS_DEF = [
  { id: 'first_solve',    icon: '🏅', name: 'First Solve',       desc: 'Complete your first puzzle' },
  { id: 'zero_mistakes',  icon: '✨', name: 'Perfect',            desc: 'Solve with zero mistakes' },
  { id: 'no_hints',       icon: '🧠', name: 'No Hints',           desc: 'Solve without using any hints' },
  { id: 'hard_solve',     icon: '🔥', name: 'Hard Mode',          desc: 'Solve a Hard puzzle' },
  { id: 'ten_puzzles',    icon: '🎯', name: 'Dedicated',          desc: 'Solve 10 puzzles' },
  { id: 'speed_easy',     icon: '⚡', name: 'Speed Solver',       desc: 'Solve Easy in under 3 minutes' },
  { id: 'streak3',        icon: '🔗', name: 'On a Roll',          desc: 'Win 3 puzzles in a row' },
];

// ── Seeded PRNG (mulberry32) ──
function mulberry32(seed) {
  return function() {
    seed |= 0; seed = seed + 0x6D2B79F5 | 0;
    let t = Math.imul(seed ^ seed >>> 15, 1 | seed);
    t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
    return ((t ^ t >>> 14) >>> 0) / 4294967296;
  };
}

let rng = Math.random;

function shuffle(arr, r) {
  r = r || Math.random;
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(r() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

const row = i => Math.floor(i / 9);
const col = i => i % 9;
const box = i => Math.floor(row(i) / 3) * 3 + Math.floor(col(i) / 3);

function isValid(board, idx, num) {
  const r = row(idx), c = col(idx), b = box(idx);
  for (let i = 0; i < 81; i++) {
    if (board[i] === num) {
      if (row(i) === r || col(i) === c || box(i) === b) return false;
    }
  }
  return true;
}

const PEERS = Array.from({length:81}, (_,idx) => {
  const peers = new Set();
  const r = row(idx), c = col(idx), b = box(idx);
  for (let i = 0; i < 81; i++) {
    if (i !== idx && (row(i) === r || col(i) === c || box(i) === b)) peers.add(i);
  }
  return [...peers];
});

function countSolutions(board, limit = 2) {
  const empty = [];
  for (let i = 0; i < 81; i++) if (board[i] === 0) empty.push(i);
  let count = 0;
  function solve(k) {
    if (count >= limit) return;
    if (k === empty.length) { count++; return; }
    const idx = empty[k];
    const used = new Set(PEERS[idx].map(p => board[p]));
    for (let n = 1; n <= 9; n++) {
      if (!used.has(n)) { board[idx] = n; solve(k + 1); board[idx] = 0; }
      if (count >= limit) return;
    }
  }
  solve(0);
  return count;
}

function generateSolution() {
  const board = new Array(81).fill(0);
  const digits = [1,2,3,4,5,6,7,8,9];
  function fill(idx) {
    if (idx === 81) return true;
    if (board[idx] !== 0) return fill(idx + 1);
    const nums = shuffle([...digits], rng);
    for (const n of nums) {
      if (isValid(board, idx, n)) { board[idx] = n; if (fill(idx + 1)) return true; board[idx] = 0; }
    }
    return false;
  }
  fill(0);
  return board;
}

function generatePuzzle(difficulty) {
  const solution = generateSolution();
  const puzzle = [...solution];
  const targetGivens = DIFF_CONFIG[difficulty].givens;
  const toRemove = 81 - targetGivens;
  const indices = shuffle([...Array(81).keys()], rng);
  let removed = 0;
  for (const idx of indices) {
    if (removed >= toRemove) break;
    const sym = 80 - idx;
    if (puzzle[idx] === 0) continue;
    const saved_idx = puzzle[idx];
    const saved_sym = puzzle[sym];
    puzzle[idx] = 0;
    if (idx !== sym) puzzle[sym] = 0;
    const test = [...puzzle];
    const sols = countSolutions(test, 2);
    if (sols === 1) { removed += (idx !== sym) ? 2 : 1; }
    else { puzzle[idx] = saved_idx; if (idx !== sym) puzzle[sym] = saved_sym; }
    if (removed >= toRemove) break;
  }
  return { puzzle, solution };
}

// ═══════════════════════════════════════════════════════
//  GAME STATE
// ═══════════════════════════════════════════════════════
let G = {
  puzzle:     new Array(81).fill(0),
  solution:   new Array(81).fill(0),
  board:      new Array(81).fill(0),
  notes:      Array.from({length:81}, () => new Set()),
  givens:     new Array(81).fill(false),
  selected:   -1,
  difficulty: 'easy',
  mistakes:   0,
  seconds:    0,
  timerID:    null,
  won:        false,
  notesMode:  false,
  muted:      false,
  dark:       false,
  started:    false,
  paused:     false,
  hintsUsed:  0,
  undoStack:  [],   // [{idx, prevBoard, prevNotes, prevMistakes}]
};

// ── Player Profile ──────────────────────────────────────
function loadProfile() {
  try {
    const raw = localStorage.getItem(NS + 'profile');
    if (raw) return JSON.parse(raw);
  } catch(e) {}
  // First-visit: create profile
  const id = (crypto.randomUUID ? crypto.randomUUID() : Math.random().toString(36).slice(2) + Date.now().toString(36));
  const adjectives = ['Happy','Quick','Clever','Bold','Sharp','Bright','Keen','Swift'];
  const nouns = ['Solver','Thinker','Player','Puzzler','Mind','Fox','Owl','Eagle'];
  const name = adjectives[Math.floor(Math.random()*adjectives.length)] + ' ' + nouns[Math.floor(Math.random()*nouns.length)];
  const profile = {
    id,
    name,
    created: Date.now(),
    totalSolved: 0,
    totalMistakes: 0,
    totalHints: 0,
    totalSeconds: 0,
    currentStreak: 0,
    bestStreak: 0,
    lastSolveDate: null,
    perDiff: {
      easy:   { solved: 0, totalSeconds: 0, totalMistakes: 0, bestSeconds: null },
      medium: { solved: 0, totalSeconds: 0, totalMistakes: 0, bestSeconds: null },
      hard:   { solved: 0, totalSeconds: 0, totalMistakes: 0, bestSeconds: null },
    },
    achievements: [],
  };
  saveProfile(profile);
  return profile;
}

function saveProfile(p) {
  try { localStorage.setItem(NS + 'profile', JSON.stringify(p)); } catch(e) {}
}

let profile = loadProfile();

// ═══════════════════════════════════════════════════════
//  AUDIO
// ═══════════════════════════════════════════════════════
let audioCtx = null;
function getAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') audioCtx.resume();
  return audioCtx;
}

function playTone(type) {
  if (G.muted) return;
  try {
    const ctx = getAudio();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);
    const now = ctx.currentTime;
    if (type === 'place') {
      osc.type = 'sine'; osc.frequency.setValueAtTime(820, now);
      gain.gain.setValueAtTime(0.18, now); gain.gain.exponentialRampToValueAtTime(0.001, now + 0.09);
      osc.start(now); osc.stop(now + 0.09);
    } else if (type === 'note') {
      osc.type = 'sine'; osc.frequency.setValueAtTime(620, now);
      gain.gain.setValueAtTime(0.12, now); gain.gain.exponentialRampToValueAtTime(0.001, now + 0.07);
      osc.start(now); osc.stop(now + 0.07);
    } else if (type === 'error') {
      osc.type = 'sawtooth'; osc.frequency.setValueAtTime(140, now);
      gain.gain.setValueAtTime(0.22, now); gain.gain.exponentialRampToValueAtTime(0.001, now + 0.22);
      osc.start(now); osc.stop(now + 0.22);
    } else if (type === 'erase') {
      osc.type = 'sine'; osc.frequency.setValueAtTime(400, now);
      osc.frequency.exponentialRampToValueAtTime(200, now + 0.08);
      gain.gain.setValueAtTime(0.1, now); gain.gain.exponentialRampToValueAtTime(0.001, now + 0.08);
      osc.start(now); osc.stop(now + 0.08);
    } else if (type === 'hint') {
      [700, 1050].forEach((f, i) => {
        const o2 = ctx.createOscillator(); const g2 = ctx.createGain();
        o2.connect(g2); g2.connect(ctx.destination);
        o2.type = 'sine'; o2.frequency.setValueAtTime(f, now + i*0.1);
        g2.gain.setValueAtTime(0.16, now + i*0.1); g2.gain.exponentialRampToValueAtTime(0.001, now + i*0.1 + 0.12);
        o2.start(now + i*0.1); o2.stop(now + i*0.1 + 0.12);
      });
    } else if (type === 'win') {
      [523, 659, 784, 1047].forEach((f, i) => {
        const o2 = ctx.createOscillator(); const g2 = ctx.createGain();
        o2.connect(g2); g2.connect(ctx.destination);
        o2.type = 'sine'; o2.frequency.setValueAtTime(f, now + i*0.12);
        g2.gain.setValueAtTime(0.22, now + i*0.12); g2.gain.exponentialRampToValueAtTime(0.001, now + i*0.12 + 0.2);
        o2.start(now + i*0.12); o2.stop(now + i*0.12 + 0.2);
      });
    } else if (type === 'undo') {
      osc.type = 'sine'; osc.frequency.setValueAtTime(500, now);
      osc.frequency.exponentialRampToValueAtTime(350, now + 0.1);
      gain.gain.setValueAtTime(0.12, now); gain.gain.exponentialRampToValueAtTime(0.001, now + 0.1);
      osc.start(now); osc.stop(now + 0.1);
    } else if (type === 'ach') {
      [880, 1100].forEach((f, i) => {
        const o2 = ctx.createOscillator(); const g2 = ctx.createGain();
        o2.connect(g2); g2.connect(ctx.destination);
        o2.type = 'sine'; o2.frequency.setValueAtTime(f, now + i*0.08);
        g2.gain.setValueAtTime(0.15, now + i*0.08); g2.gain.exponentialRampToValueAtTime(0.001, now + i*0.08 + 0.1);
        o2.start(now + i*0.08); o2.stop(now + i*0.08 + 0.1);
      });
    }
  } catch(e) {}
}

// ═══════════════════════════════════════════════════════
//  TIMER
// ═══════════════════════════════════════════════════════
function fmtTime(s) {
  const m = Math.floor(s / 60);
  const sec = s % 60;
  return String(m).padStart(2,'0') + ':' + String(sec).padStart(2,'0');
}

function startTimer() {
  stopTimer();
  G.timerID = setInterval(() => {
    if (!G.won && !G.paused) {
      G.seconds++;
      document.getElementById('timer-val').textContent = fmtTime(G.seconds);
      saveState();
    }
  }, 1000);
}

function stopTimer() {
  if (G.timerID) { clearInterval(G.timerID); G.timerID = null; }
}

// ── Tab-blur auto-pause ──────────────────────────────────
document.addEventListener('visibilitychange', () => {
  if (document.hidden && G.started && !G.won && !G.paused) {
    setPaused(true);
  }
});

function setPaused(p) {
  if (!G.started || G.won) return;
  G.paused = p;
  const veil = document.getElementById('pause-veil');
  const btn  = document.getElementById('btn-pause');
  if (p) {
    veil.classList.add('show');
    btn.textContent = '▶';
    btn.title = 'Resume (P)';
  } else {
    veil.classList.remove('show');
    btn.textContent = '⏸';
    btn.title = 'Pause (P)';
  }
  saveState();
}

// ═══════════════════════════════════════════════════════
//  UNDO
// ═══════════════════════════════════════════════════════
const UNDO_MAX = 30;

function pushUndo(idx) {
  const snap = {
    idx,
    board: [...G.board],
    notes: G.notes.map(s => new Set(s)),
    mistakes: G.mistakes,
  };
  G.undoStack.push(snap);
  if (G.undoStack.length > UNDO_MAX) G.undoStack.shift();
}

function undoMove() {
  if (G.undoStack.length === 0 || G.won) return;
  const snap = G.undoStack.pop();
  G.board    = snap.board;
  G.notes    = snap.notes;
  G.mistakes = snap.mistakes;
  document.getElementById('mistake-val').textContent = G.mistakes;
  renderAll();
  playTone('undo');
  saveState();
}

// ═══════════════════════════════════════════════════════
//  RENDER
// ═══════════════════════════════════════════════════════
function buildGrid() {
  const grid = document.getElementById('grid');
  grid.innerHTML = '';
  for (let i = 0; i < 81; i++) {
    const cell = document.createElement('div');
    cell.className = 'cell';
    cell.setAttribute('role', 'gridcell');
    cell.setAttribute('tabindex', '0');
    const r = row(i) + 1, c = col(i) + 1;
    cell.classList.add('row' + r, 'col' + c);
    cell.dataset.idx = i;
    cell.addEventListener('click',  () => selectCell(i));
    cell.addEventListener('keydown', e => onCellKey(e, i));
    grid.appendChild(cell);
  }
}

function renderCell(i) {
  const cell = document.querySelector(`.cell[data-idx="${i}"]`);
  if (!cell) return;
  cell.innerHTML = '';
  cell.classList.remove('is-given','is-player','is-error');
  if (G.givens[i]) {
    cell.classList.add('is-given');
    cell.textContent = G.puzzle[i];
  } else {
    const val = G.board[i];
    const hasNotes = G.notes[i].size > 0;
    if (val > 0) {
      const isErr = (val !== G.solution[i]);
      cell.classList.add(isErr ? 'is-error' : 'is-player');
      cell.textContent = val;
    } else if (hasNotes) {
      renderNotes(cell, G.notes[i]);
    }
  }
  const ariaVal = G.givens[i] ? G.puzzle[i] : (G.board[i] || '');
  cell.setAttribute('aria-label', `Row ${row(i)+1} Col ${col(i)+1}${ariaVal ? ', '+ariaVal : ', empty'}`);
}

function renderNotes(cell, notesSet) {
  const grid = document.createElement('div');
  grid.className = 'notes-grid';
  for (let n = 1; n <= 9; n++) {
    const span = document.createElement('span');
    span.textContent = notesSet.has(n) ? n : '';
    grid.appendChild(span);
  }
  cell.appendChild(grid);
}

function renderAll() {
  for (let i = 0; i < 81; i++) renderCell(i);
  applyHighlights();
  updateHUD();
  updateNumpadCompletion();
}

function applyHighlights() {
  const cells = document.querySelectorAll('.cell');
  cells.forEach(c => c.classList.remove('hl-selected','hl-peer','hl-same','hl-conflict'));
  const sel = G.selected;
  if (sel < 0) return;
  const selDigit = G.givens[sel] ? G.puzzle[sel] : G.board[sel];
  cells.forEach(c => {
    const i = +c.dataset.idx;
    if (i === sel) {
      c.classList.add('hl-selected');
    } else if (PEERS[sel].includes(i)) {
      c.classList.add('hl-peer');
      const iDigit = G.givens[i] ? G.puzzle[i] : G.board[i];
      if (selDigit && iDigit === selDigit) c.classList.add('hl-conflict');
    } else if (selDigit) {
      const iDigit = G.givens[i] ? G.puzzle[i] : G.board[i];
      if (iDigit === selDigit) c.classList.add('hl-same');
    }
  });
}

function updateHUD() {
  document.getElementById('mistake-val').textContent = G.mistakes;
  const bestKey = NS + 'best_' + G.difficulty;
  const best = localStorage.getItem(bestKey);
  document.getElementById('best-val').textContent = best ? fmtTime(+best) : '--:--';
  document.getElementById('timer-val').textContent = fmtTime(G.seconds);
}

function updateNumpadCompletion() {
  for (let n = 1; n <= 9; n++) {
    const btn = document.querySelector(`.num-btn[data-n="${n}"]`);
    if (!btn) continue;
    let count = 0;
    for (let i = 0; i < 81; i++) {
      const v = G.givens[i] ? G.puzzle[i] : G.board[i];
      if (v === n) count++;
    }
    btn.classList.toggle('completed', count >= 9);
  }
}

function updateDiffButtons() {
  document.querySelectorAll('.diff-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.diff === G.difficulty);
  });
}

// ═══════════════════════════════════════════════════════
//  TOAST
// ═══════════════════════════════════════════════════════
let toastTimer = null;
function showToast(msg, dur) {
  dur = dur || 2400;
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  if (toastTimer) clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), dur);
}

// ═══════════════════════════════════════════════════════
//  ACHIEVEMENTS
// ═══════════════════════════════════════════════════════
function checkAchievements(hintsThisGame, mistakesThisGame) {
  const unlocked = [];
  const prev = new Set(profile.achievements);

  const tryUnlock = id => {
    if (!prev.has(id)) { unlocked.push(id); profile.achievements.push(id); }
  };

  if (profile.totalSolved >= 1) tryUnlock('first_solve');
  if (mistakesThisGame === 0) tryUnlock('zero_mistakes');
  if (hintsThisGame === 0) tryUnlock('no_hints');
  if (G.difficulty === 'hard') tryUnlock('hard_solve');
  if (profile.totalSolved >= 10) tryUnlock('ten_puzzles');
  if (G.difficulty === 'easy' && G.seconds < 180) tryUnlock('speed_easy');
  if (profile.currentStreak >= 3) tryUnlock('streak3');

  if (unlocked.length > 0) {
    saveProfile(profile);
    unlocked.forEach((id, idx) => {
      const def = ACHIEVEMENTS_DEF.find(a => a.id === id);
      if (def) {
        setTimeout(() => {
          showToast(def.icon + ' Achievement: ' + def.name, 3000);
          playTone('ach');
        }, idx * 1200);
      }
    });
  }
  return unlocked;
}

// ═══════════════════════════════════════════════════════
//  GAME ACTIONS
// ═══════════════════════════════════════════════════════
function selectCell(i) {
  if (G.paused) { setPaused(false); return; }
  G.selected = i;
  applyHighlights();
}

function enterDigit(n) {
  if (G.paused) { setPaused(false); return; }
  const i = G.selected;
  if (i < 0 || G.givens[i] || G.won) return;
  if (!G.started) { G.started = true; startTimer(); }

  if (G.notesMode) {
    pushUndo(i);
    G.board[i] = 0;
    if (G.notes[i].has(n)) G.notes[i].delete(n);
    else G.notes[i].add(n);
    playTone('note');
    renderCell(i);
    applyHighlights();
    saveState();
    return;
  }

  G.notes[i].clear();
  if (G.board[i] === n) return;

  pushUndo(i);
  G.board[i] = n;

  if (n !== G.solution[i]) {
    G.mistakes++;
    document.getElementById('mistake-val').textContent = G.mistakes;
    renderCell(i);
    const cell = document.querySelector(`.cell[data-idx="${i}"]`);
    playTone('error');
    cell.classList.add('anim-shake');
    cell.addEventListener('animationend', () => cell.classList.remove('anim-shake'), {once:true});
  } else {
    PEERS[i].forEach(p => { if (G.notes[p].has(n)) { G.notes[p].delete(n); renderCell(p); } });
    renderCell(i);
    playTone('place');
    const cell = document.querySelector(`.cell[data-idx="${i}"]`);
    cell.classList.add('anim-pop');
    cell.addEventListener('animationend', () => cell.classList.remove('anim-pop'), {once:true});
  }

  applyHighlights();
  updateNumpadCompletion();
  saveState();
  checkWin();
}

function eraseCell() {
  if (G.paused) return;
  const i = G.selected;
  if (i < 0 || G.givens[i] || G.won) return;
  if (G.board[i] === 0 && G.notes[i].size === 0) return;
  pushUndo(i);
  G.board[i] = 0;
  G.notes[i].clear();
  playTone('erase');
  renderCell(i);
  applyHighlights();
  updateNumpadCompletion();
  saveState();
}

function giveHint() {
  if (G.paused || G.won) return;
  const candidates = [];
  for (let i = 0; i < 81; i++) {
    if (!G.givens[i] && G.board[i] !== G.solution[i]) candidates.push(i);
  }
  if (candidates.length === 0) return;
  if (!G.started) { G.started = true; startTimer(); }
  const i = candidates[Math.floor(Math.random() * candidates.length)];
  pushUndo(i);
  G.board[i] = G.solution[i];
  G.notes[i].clear();
  G.hintsUsed++;
  PEERS[i].forEach(p => { if (G.notes[p].has(G.solution[i])) { G.notes[p].delete(G.solution[i]); renderCell(p); } });
  playTone('hint');
  const cell = document.querySelector(`.cell[data-idx="${i}"]`);
  cell.classList.add('anim-pop');
  cell.addEventListener('animationend', () => cell.classList.remove('anim-pop'), {once:true});
  renderCell(i);
  applyHighlights();
  updateNumpadCompletion();
  saveState();
  checkWin();
}

function checkPuzzle() {
  if (G.paused) return;
  let hasError = false;
  for (let i = 0; i < 81; i++) {
    if (!G.givens[i] && G.board[i] > 0 && G.board[i] !== G.solution[i]) {
      renderCell(i);
      hasError = true;
    }
  }
  if (hasError) playTone('error');
  applyHighlights();
}

function checkWin() {
  for (let i = 0; i < 81; i++) {
    const v = G.givens[i] ? G.puzzle[i] : G.board[i];
    if (v !== G.solution[i]) return;
  }
  G.won = true;
  stopTimer();
  playTone('win');

  // Update profile stats
  const diff = G.difficulty;
  const mistakesThisGame = G.mistakes;
  const hintsThisGame = G.hintsUsed;
  profile.totalSolved++;
  profile.totalMistakes += mistakesThisGame;
  profile.totalHints += hintsThisGame;
  profile.totalSeconds += G.seconds;

  const pd = profile.perDiff[diff];
  pd.solved++;
  pd.totalSeconds += G.seconds;
  pd.totalMistakes += mistakesThisGame;
  if (pd.bestSeconds === null || G.seconds < pd.bestSeconds) pd.bestSeconds = G.seconds;

  // Streak
  const today = new Date().toDateString();
  if (profile.lastSolveDate !== today) {
    profile.currentStreak++;
    profile.lastSolveDate = today;
    if (profile.currentStreak > profile.bestStreak) profile.bestStreak = profile.currentStreak;
  }

  saveProfile(profile);

  // GameShell: submit a higher-is-better score for this solve (per shell difficulty).
  // Base 5000; lose 2 per second and 100 per mistake. Faster + cleaner => higher score.
  if (window.GameShell && typeof GameShell.submitScore === 'function') {
    try {
      const gsScore = Math.max(0, 5000 - G.seconds * 2 - mistakesThisGame * 100);
      GameShell.submitScore(gsScore, { difficulty: gsDiffToShell(diff) });
    } catch(e) {}
  }

  // Best time (namespaced key)
  const bestKey = NS + 'best_' + diff;
  const prev = localStorage.getItem(bestKey);
  if (!prev || G.seconds < +prev) {
    localStorage.setItem(bestKey, G.seconds);
    document.getElementById('win-best-msg').textContent = '⭐ New best time!';
  } else {
    document.getElementById('win-best-msg').textContent = 'Best: ' + fmtTime(+prev);
  }

  // Achievements
  const newAch = checkAchievements(hintsThisGame, mistakesThisGame);
  if (newAch.length > 0) {
    const defs = newAch.map(id => ACHIEVEMENTS_DEF.find(a => a.id === id)).filter(Boolean);
    document.getElementById('win-achievements').textContent = defs.map(d => d.icon + ' ' + d.name).join('  ');
  } else {
    document.getElementById('win-achievements').textContent = '';
  }

  showWinOverlay();
  launchConfetti();
  saveState();
}

function showWinOverlay() {
  document.getElementById('win-time').textContent = fmtTime(G.seconds);
  document.getElementById('win-mistakes').textContent = G.mistakes;
  document.getElementById('win-diff-label').textContent = G.difficulty.charAt(0).toUpperCase() + G.difficulty.slice(1) + ' Puzzle';
  document.getElementById('win-overlay').classList.add('show');
}

// ═══════════════════════════════════════════════════════
//  NEW GAME
// ═══════════════════════════════════════════════════════
function newGame(diff) {
  stopTimer();
  G.difficulty = diff || G.difficulty;
  G.selected   = -1;
  G.mistakes   = 0;
  G.seconds    = 0;
  G.won        = false;
  G.notesMode  = false;
  G.started    = false;
  G.paused     = false;
  G.hintsUsed  = 0;
  G.board      = new Array(81).fill(0);
  G.notes      = Array.from({length:81}, () => new Set());
  G.undoStack  = [];

  rng = mulberry32(Date.now() ^ Math.floor(Math.random() * 0x7fffffff));

  const {puzzle, solution} = generatePuzzle(G.difficulty);
  G.puzzle    = puzzle;
  G.solution  = solution;
  G.givens    = puzzle.map(v => v > 0);

  document.getElementById('btn-notes').classList.remove('active');
  document.getElementById('win-overlay').classList.remove('show');
  document.getElementById('pause-veil').classList.remove('show');
  document.getElementById('btn-pause').textContent = '⏸';
  updateDiffButtons();
  renderAll();
  saveState();

  // GameShell: fresh puzzle -> refill hints. puzzleId = the given clues (stable per board).
  if (window.GameShell && typeof GameShell.newGame === 'function') {
    try { GameShell.newGame(G.difficulty + ':' + G.puzzle.join('')); } catch(e) {}
  }
}

// ═══════════════════════════════════════════════════════
//  PERSISTENCE (versioned, namespaced)
// ═══════════════════════════════════════════════════════
function saveState() {
  try {
    const state = {
      version:    SAVE_VERSION,
      puzzle:     G.puzzle,
      solution:   G.solution,
      board:      G.board,
      notes:      G.notes.map(s => [...s]),
      givens:     G.givens,
      difficulty: G.difficulty,
      mistakes:   G.mistakes,
      seconds:    G.seconds,
      won:        G.won,
      notesMode:  G.notesMode,
      started:    G.started,
      paused:     G.paused,
      hintsUsed:  G.hintsUsed,
    };
    localStorage.setItem(NS + 'state', JSON.stringify(state));
  } catch(e) {}
}

function loadState() {
  try {
    // Check legacy key too
    let raw = localStorage.getItem(NS + 'state');
    if (!raw) raw = localStorage.getItem('sudoku_state'); // migrate from old key
    if (!raw) return false;
    const s = JSON.parse(raw);

    // Version migration
    const ver = s.version || 1;
    if (ver < SAVE_VERSION) {
      // v1 -> v2: add hintsUsed, paused
      s.hintsUsed = 0;
      s.paused    = false;
    }

    G.puzzle     = s.puzzle;
    G.solution   = s.solution;
    G.board      = s.board;
    G.notes      = s.notes.map(arr => new Set(arr));
    G.givens     = s.givens;
    G.difficulty = s.difficulty || 'easy';
    G.mistakes   = s.mistakes  || 0;
    G.seconds    = s.seconds   || 0;
    G.won        = s.won       || false;
    G.notesMode  = s.notesMode || false;
    G.started    = s.started   || false;
    G.paused     = s.paused    || false;
    G.hintsUsed  = s.hintsUsed || 0;
    G.undoStack  = [];
    return true;
  } catch(e) { return false; }
}

// ═══════════════════════════════════════════════════════
//  KEYBOARD HANDLING
// ═══════════════════════════════════════════════════════
document.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT') return;
  if (e.target.id === 'win-play-again') return;
  const key = e.key;

  // Ctrl+Z undo
  if ((e.ctrlKey || e.metaKey) && key === 'z') { e.preventDefault(); undoMove(); return; }

  if (key >= '1' && key <= '9') { e.preventDefault(); enterDigit(+key); }
  else if (key === 'Delete' || key === 'Backspace' || key === '0') { e.preventDefault(); eraseCell(); }
  else if (key === 'n' || key === 'N') { e.preventDefault(); toggleNotes(); }
  else if (key === 'p' || key === 'P' || key === 'Escape') { e.preventDefault(); if (G.started && !G.won) setPaused(!G.paused); }
  else if (key === 'u' || key === 'U') { e.preventDefault(); undoMove(); }
  else if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(key)) { e.preventDefault(); moveSelection(key); }
});

function onCellKey(e, i) {
  if (e.key === ' ' || e.key === 'Enter') { e.preventDefault(); selectCell(i); }
}

function moveSelection(dir) {
  if (G.paused) return;
  let i = G.selected < 0 ? 0 : G.selected;
  const r = row(i), c = col(i);
  if (dir === 'ArrowUp')    i = r > 0 ? i - 9 : i;
  if (dir === 'ArrowDown')  i = r < 8 ? i + 9 : i;
  if (dir === 'ArrowLeft')  i = c > 0 ? i - 1 : i;
  if (dir === 'ArrowRight') i = c < 8 ? i + 1 : i;
  selectCell(i);
}

function toggleNotes() {
  if (G.paused) return;
  G.notesMode = !G.notesMode;
  document.getElementById('btn-notes').classList.toggle('active', G.notesMode);
}

// ═══════════════════════════════════════════════════════
//  CONFETTI (prefers-reduced-motion aware)
// ═══════════════════════════════════════════════════════
function launchConfetti() {
  if (window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches) return;
  const canvas = document.getElementById('confetti-canvas');
  const ctx = canvas.getContext('2d');
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  const pieces = [];
  const colors = ['#ef4444','#3b82f6','#22c55e','#f59e0b','#a855f7','#ec4899','#06b6d4'];
  for (let i = 0; i < 80; i++) {
    pieces.push({
      x: Math.random() * canvas.width, y: Math.random() * canvas.height - canvas.height,
      w: Math.random() * 10 + 5, h: Math.random() * 6 + 3,
      color: colors[Math.floor(Math.random() * colors.length)],
      vx: (Math.random() - 0.5) * 4, vy: Math.random() * 3 + 2,
      rot: Math.random() * 360, vrot: (Math.random() - 0.5) * 8,
      alpha: 1
    });
  }
  let frame = 0;
  function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    pieces.forEach(p => {
      p.x += p.vx; p.y += p.vy; p.rot += p.vrot;
      if (frame > 90) p.alpha -= 0.015;
      ctx.save();
      ctx.globalAlpha = Math.max(0, p.alpha);
      ctx.translate(p.x + p.w/2, p.y + p.h/2);
      ctx.rotate(p.rot * Math.PI/180);
      ctx.fillStyle = p.color;
      ctx.fillRect(-p.w/2, -p.h/2, p.w, p.h);
      ctx.restore();
    });
    frame++;
    if (frame < 160) requestAnimationFrame(draw);
    else ctx.clearRect(0, 0, canvas.width, canvas.height);
  }
  draw();
}

// ═══════════════════════════════════════════════════════
//  PROFILE MODAL
// ═══════════════════════════════════════════════════════
function openProfile() {
  refreshProfileModal();
  document.getElementById('profile-modal').classList.add('show');
}
function closeProfile() {
  document.getElementById('profile-modal').classList.remove('show');
}

function refreshProfileModal() {
  document.getElementById('profile-name-input').value = profile.name;
  document.getElementById('streak-current').textContent = profile.currentStreak;
  document.getElementById('streak-best').textContent    = profile.bestStreak;
  document.getElementById('stat-total-solved').textContent   = profile.totalSolved;
  document.getElementById('stat-total-hints').textContent    = profile.totalHints;
  document.getElementById('stat-total-mistakes').textContent = profile.totalMistakes;
  const hrs = (profile.totalSeconds / 3600).toFixed(1);
  document.getElementById('stat-total-time').textContent = hrs + 'h';

  // Per-difficulty
  const wrap = document.getElementById('diff-stats-wrap');
  wrap.innerHTML = '';
  ['easy','medium','hard'].forEach(d => {
    const pd = profile.perDiff[d];
    const avg = pd.solved > 0 ? fmtTime(Math.round(pd.totalSeconds / pd.solved)) : '--:--';
    const best = pd.bestSeconds !== null ? fmtTime(pd.bestSeconds) : '--:--';
    const label = d.charAt(0).toUpperCase() + d.slice(1);
    wrap.innerHTML += `<div class="diff-stats-row">
      <div class="diff-stat-cell"><div class="dsv">${pd.solved}</div><div class="dsl">${label} Solved</div></div>
      <div class="diff-stat-cell"><div class="dsv">${best}</div><div class="dsl">Best</div></div>
      <div class="diff-stat-cell"><div class="dsv">${avg}</div><div class="dsl">Avg</div></div>
    </div>`;
  });

  // Achievements
  const list = document.getElementById('ach-list');
  list.innerHTML = '';
  ACHIEVEMENTS_DEF.forEach(def => {
    const unlocked = profile.achievements.includes(def.id);
    const li = document.createElement('li');
    if (!unlocked) li.classList.add('locked');
    li.innerHTML = `<span class="ach-icon">${def.icon}</span><div><div class="ach-name">${def.name}</div><div class="ach-desc">${def.desc}</div></div>`;
    list.appendChild(li);
  });
}

// ═══════════════════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════════════════
function buildNumpad() {
  const pad = document.getElementById('numpad');
  for (let n = 1; n <= 9; n++) {
    const btn = document.createElement('button');
    btn.className = 'num-btn';
    btn.textContent = n;
    btn.dataset.n = n;
    btn.setAttribute('aria-label', 'Enter ' + n);
    btn.addEventListener('click', () => enterDigit(n));
    pad.appendChild(btn);
  }
}

function init() {
  buildGrid();
  buildNumpad();

  // Dark mode
  G.dark = localStorage.getItem(NS + 'dark') === '1' || localStorage.getItem('sudoku_dark') === '1';
  if (G.dark) document.documentElement.setAttribute('data-dark','');
  document.getElementById('btn-dark').textContent = G.dark ? '☀️' : '🌙';

  // Mute
  G.muted = localStorage.getItem(NS + 'muted') === '1' || localStorage.getItem('sudoku_muted') === '1';
  document.getElementById('btn-mute').textContent = G.muted ? '🔇' : '🔊';

  // Load or start
  const restored = loadState();
  if (restored) {
    updateDiffButtons();
    renderAll();
    if (G.started && !G.won) {
      startTimer();
      if (G.paused) document.getElementById('pause-veil').classList.add('show');
    }
    // keep the shell's stored difficulty in sync with the restored game
    gsPushDifficulty(G.difficulty);
  } else {
    // No saved game: start at the GameShell difficulty if present (default 'normal'
    // -> medium). Without GameShell, fall back to the original 'easy' default.
    var bootDiff = 'easy';
    if (window.GameShell && typeof GameShell.getDifficulty === 'function') {
      bootDiff = gsShellToDiff(GameShell.getDifficulty());
    }
    newGame(bootDiff);
  }

  // Difficulty buttons
  document.querySelectorAll('.diff-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      if (btn.dataset.diff !== G.difficulty || G.won) {
        gsPushDifficulty(btn.dataset.diff);   // bridge game -> GameShell difficulty
        newGame(btn.dataset.diff);
      }
    });
  });

  // Action buttons
  document.getElementById('btn-erase').addEventListener('click', eraseCell);
  document.getElementById('btn-notes').addEventListener('click', toggleNotes);
  document.getElementById('btn-hint').addEventListener('click', giveHint);
  document.getElementById('btn-check').addEventListener('click', checkPuzzle);
  document.getElementById('btn-new').addEventListener('click', () => {
    if (!G.won && G.started) {
      if (!confirm('Start a new game? Current progress will be lost.')) return;
    }
    newGame();
  });

  document.getElementById('btn-undo').addEventListener('click', undoMove);

  document.getElementById('btn-pause').addEventListener('click', () => {
    if (G.started && !G.won) setPaused(!G.paused);
  });
  document.getElementById('btn-resume').addEventListener('click', () => setPaused(false));

  document.getElementById('win-play-again').addEventListener('click', () => {
    document.getElementById('win-overlay').classList.remove('show');
    newGame();
  });

  document.getElementById('btn-mute').addEventListener('click', () => {
    G.muted = !G.muted;
    localStorage.setItem(NS + 'muted', G.muted ? '1' : '0');
    document.getElementById('btn-mute').textContent = G.muted ? '🔇' : '🔊';
  });

  document.getElementById('btn-dark').addEventListener('click', () => {
    G.dark = !G.dark;
    localStorage.setItem(NS + 'dark', G.dark ? '1' : '0');
    if (G.dark) document.documentElement.setAttribute('data-dark','');
    else document.documentElement.removeAttribute('data-dark');
    document.getElementById('btn-dark').textContent = G.dark ? '☀️' : '🌙';
  });

  document.getElementById('win-overlay').addEventListener('click', e => {
    if (e.target === document.getElementById('win-overlay')) {
      document.getElementById('win-overlay').classList.remove('show');
    }
  });

  // Profile
  document.getElementById('title-btn').addEventListener('click', openProfile);
  document.getElementById('profile-close').addEventListener('click', closeProfile);
  document.getElementById('profile-modal').addEventListener('click', e => {
    if (e.target === document.getElementById('profile-modal')) closeProfile();
  });
  document.getElementById('profile-name-save').addEventListener('click', () => {
    const val = document.getElementById('profile-name-input').value.trim();
    if (val) { profile.name = val; saveProfile(profile); showToast('Name saved!'); }
  });
  document.getElementById('profile-name-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') document.getElementById('profile-name-save').click();
  });
}

// ═══════════════════════════════════════════════════════
//  GAMESHELL DEEP INTEGRATION
//  - Difficulty bridge: shell easy<->easy, normal<->medium (current default),
//    hard<->hard. Mapping is bidirectional with a re-entrancy guard.
//  - Score: higher-is-better proxy submitted on solve (see checkWin).
//  - Real hint: reveal the CORRECT value of the most-constrained empty cell,
//    read straight from the stored solution (G.solution).
//  - newGame(): called on every fresh puzzle to refill hints (see newGame).
//  All calls guarded; standalone behaviour (no GameShell) is unchanged.
// ═══════════════════════════════════════════════════════
const GS_DIFF_MAP   = { easy: 'easy', normal: 'medium', hard: 'hard' }; // shell -> internal
const GS_DIFF_UNMAP = { easy: 'easy', medium: 'normal', hard: 'hard' }; // internal -> shell
let gsSyncing = false;  // prevents the bidirectional bridge from looping

function gsShellToDiff(shell) { return GS_DIFF_MAP[shell] || 'medium'; }
function gsDiffToShell(diff)  { return GS_DIFF_UNMAP[diff] || 'normal'; }

// Push the game's internal difficulty up to GameShell (e.g. user tapped Easy/Medium/Hard).
function gsPushDifficulty(internalDiff) {
  if (gsSyncing) return;
  if (!window.GameShell || typeof GameShell.setDifficulty !== 'function') return;
  const shell = gsDiffToShell(internalDiff);
  if (typeof GameShell.getDifficulty === 'function' && GameShell.getDifficulty() === shell) return;
  gsSyncing = true;
  try { GameShell.setDifficulty(shell); } catch (e) {}
  gsSyncing = false;
}

// Apply a shell difficulty down to the game (Settings difficulty segment changed).
function gsApplyShellDifficulty(shell) {
  if (gsSyncing) return;                 // change originated from our own push
  const internal = gsShellToDiff(shell);
  if (internal === G.difficulty) return; // already there
  newGame(internal);                     // start a fresh puzzle at the new difficulty
}

// REAL HINT: find the empty cell with the fewest legal candidates and reveal its
// correct digit from the solution. Falls back to any empty / wrong cell.
function gsCandidates(i) {
  const used = new Set();
  PEERS[i].forEach(p => {
    const v = G.givens[p] ? G.puzzle[p] : G.board[p];
    if (v) used.add(v);
  });
  let c = 0;
  for (let n = 1; n <= 9; n++) if (!used.has(n)) c++;
  return c;
}
function gsHintText() {
  if (G.won) return 'Puzzle already solved — start a new one!';
  let target = -1, fewest = 99;
  // prefer truly empty cells, ranked by how few digits can legally go there
  for (let i = 0; i < 81; i++) {
    if (G.givens[i] || G.board[i] !== 0) continue;
    const cand = gsCandidates(i);
    if (cand < fewest) { fewest = cand; target = i; if (cand <= 1) break; }
  }
  // if the grid is fully filled but wrong somewhere, point at a wrong cell instead
  if (target < 0) {
    for (let i = 0; i < 81; i++) {
      if (!G.givens[i] && G.board[i] !== G.solution[i]) { target = i; break; }
    }
  }
  if (target < 0) return 'Every cell is filled correctly — tap Check to confirm!';
  const r = row(target) + 1, c = col(target) + 1, val = G.solution[target];
  const wrong = (G.board[target] !== 0 && G.board[target] !== val);
  return 'Cell R' + r + 'C' + c + ' is a ' + val + '.' +
         (wrong ? ' (Currently ' + G.board[target] + ' — fix it.)' : '');
}

// Wire up GameShell once it's available.
if (window.GameShell) {
  if (typeof GameShell.onHint === 'function')        GameShell.onHint(function () { return gsHintText(); });
  if (typeof GameShell.onDifficulty === 'function')  GameShell.onDifficulty(function (shell) { gsApplyShellDifficulty(shell); });
}

if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', init);
else init();
