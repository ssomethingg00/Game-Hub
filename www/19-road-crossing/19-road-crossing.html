<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Street Hopper</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #1a1a2e;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: 'Courier New', monospace;
    overflow: hidden;
    touch-action: none;
    user-select: none;
  }
  #gameCanvas {
    display: block;
    image-rendering: pixelated;
    cursor: default;
  }
  #dpad {
    display: none;
    position: fixed;
    bottom: 10px;
    left: 50%;
    transform: translateX(-50%);
    width: 180px;
    height: 180px;
    z-index: 100;
  }
  .dpad-btn {
    position: absolute;
    width: 54px;
    height: 54px;
    background: rgba(255,255,255,0.18);
    border: 2px solid rgba(255,255,255,0.35);
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 22px;
    color: #fff;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    transition: background 0.1s;
  }
  .dpad-btn:active { background: rgba(255,255,255,0.38); }
  #btn-up    { top: 0;    left: 63px; }
  #btn-down  { bottom: 0; left: 63px; }
  #btn-left  { top: 63px; left: 0;   }
  #btn-right { top: 63px; right: 0;  }
  #btn-center { top: 63px; left: 63px; background: rgba(255,255,255,0.08); border-color: transparent; border-radius: 12px; }

  /* Toast notifications */
  #toast-container {
    position: fixed;
    top: 60px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 200;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    pointer-events: none;
  }
  .toast {
    background: rgba(15,15,30,0.92);
    border: 2px solid #f1c40f;
    border-radius: 10px;
    padding: 8px 18px;
    color: #f1c40f;
    font-family: 'Courier New', monospace;
    font-size: 13px;
    font-weight: bold;
    text-align: center;
    opacity: 1;
    transition: opacity 0.4s;
    white-space: nowrap;
  }
  .toast.achievement {
    border-color: #2ecc71;
    color: #2ecc71;
    font-size: 12px;
  }
  .toast.life-loss {
    border-color: #e74c3c;
    color: #e74c3c;
  }

  /* Profile modal */
  #profile-modal {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.82);
    z-index: 300;
    align-items: center;
    justify-content: center;
  }
  #profile-modal.open { display: flex; }
  #profile-box {
    background: #0d0d1a;
    border: 2px solid #f1c40f;
    border-radius: 14px;
    padding: 24px 28px;
    min-width: 280px;
    max-width: 360px;
    width: 90vw;
    color: #fff;
    font-family: 'Courier New', monospace;
  }
  #profile-box h2 { color: #f1c40f; font-size: 18px; margin-bottom: 14px; text-align: center; }
  #profile-name-input {
    width: 100%;
    background: #1a1a2e;
    border: 1px solid #555;
    border-radius: 6px;
    color: #fff;
    font-family: 'Courier New', monospace;
    font-size: 15px;
    padding: 6px 10px;
    margin-bottom: 14px;
    outline: none;
  }
  #profile-name-input:focus { border-color: #f1c40f; }
  .stat-row { display: flex; justify-content: space-between; font-size: 12px; padding: 3px 0; border-bottom: 1px solid #222; }
  .stat-row span:first-child { color: #aaa; }
  .stat-row span:last-child  { color: #2ecc71; font-weight: bold; }
  .profile-btn-row { display: flex; gap: 10px; margin-top: 16px; }
  .profile-btn {
    flex: 1;
    background: #1a1a2e;
    border: 1px solid #555;
    border-radius: 8px;
    color: #fff;
    font-family: 'Courier New', monospace;
    font-size: 12px;
    padding: 8px;
    cursor: pointer;
    transition: background 0.15s;
  }
  .profile-btn:hover { background: #2a2a4e; }
  .profile-btn.primary { border-color: #f1c40f; color: #f1c40f; }
  .profile-btn.danger { border-color: #e74c3c; color: #e74c3c; }
  #achievements-section { margin-top: 14px; }
  #achievements-section h3 { color: #9b59b6; font-size: 13px; margin-bottom: 8px; }
  .ach-badge {
    display: inline-block;
    background: rgba(46,204,113,0.15);
    border: 1px solid #2ecc71;
    border-radius: 20px;
    padding: 3px 10px;
    font-size: 11px;
    color: #2ecc71;
    margin: 2px;
  }
  .ach-badge.locked {
    background: rgba(100,100,100,0.1);
    border-color: #444;
    color: #555;
  }

  /* Settings modal */
  #settings-modal {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.82);
    z-index: 300;
    align-items: center;
    justify-content: center;
  }
  #settings-modal.open { display: flex; }
  #settings-box {
    background: #0d0d1a;
    border: 2px solid #3498db;
    border-radius: 14px;
    padding: 22px 26px;
    min-width: 280px;
    max-width: 360px;
    width: 90vw;
    max-height: 90vh;
    overflow-y: auto;
    color: #fff;
    font-family: 'Courier New', monospace;
  }
  #settings-box h2 { color: #3498db; font-size: 18px; margin-bottom: 6px; text-align: center; }
  .settings-label { color: #9b59b6; font-size: 12px; margin: 14px 0 8px; letter-spacing: 1px; }
  .diff-row { display: flex; gap: 8px; }
  .diff-btn {
    flex: 1;
    background: #1a1a2e;
    border: 1px solid #555;
    border-radius: 8px;
    color: #fff;
    font-family: 'Courier New', monospace;
    font-size: 13px;
    font-weight: bold;
    padding: 10px 4px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .diff-btn:hover { background: #2a2a4e; }
  .diff-btn.active { border-color: #2ecc71; color: #2ecc71; background: rgba(46,204,113,0.14); }
  .diff-desc { color: #aaa; font-size: 11px; margin-top: 8px; min-height: 14px; text-align: center; }
  #settings-lb .stat-row span:last-child { color: #3498db; }
</style>

<script>
/* ===========================================================================
 * GameShell v1 — universal drop-in options overlay for single-file web games.
 * Adds: Settings (Sound, Music, Difficulty, Theme, Leaderboard, How to Play,
 * Reset) + an in-play control bar (Hint, Sound, Settings) with a rate-limited
 * Hint (2 / 24h, refills on new game). Game-agnostic, namespaced, Shadow-DOM
 * isolated, persisted per game. Safe to inject into any HTML game once.
 * ======================================================================== */
(function () {
  "use strict";
  if (window.__gsInstalled) return;
  window.__gsInstalled = true;

  /* ---------- per-game config (injected just above this script) ---------- */
  var CFG = window.GS_CONFIG || {};
  var GID = CFG.id || (location.pathname.split("/").filter(Boolean).pop() || "game").replace(/\.html?$/i, "");
  var TITLE = CFG.title || document.title || "Game";
  var DIFFS = (CFG.difficulties && CFG.difficulties.length) ? CFG.difficulties : ["easy", "normal", "hard"];
  var HOWTO = CFG.howToPlay || "<p>Use the on-screen controls (or your keyboard) to play. Your progress is saved automatically on this device.</p>";
  var TIPS = (CFG.hints && CFG.hints.length) ? CFG.hints.slice() : [
    "Take your time — there's no rush.",
    "Plan one move ahead before you commit.",
    "Stuck? Try a new game from Settings to reset and get fresh hints."
  ];
  var HINT_MAX = CFG.hintMax || 2;
  var WINDOW_MS = 24 * 60 * 60 * 1000;

  /* ----------------------------- storage --------------------------------- */
  function k(name) { return "gs:" + GID + ":" + name; }
  function load(name, def) {
    try { var v = JSON.parse(localStorage.getItem(k(name))); return v == null ? def : v; }
    catch (e) { return def; }
  }
  function save(name, val) { try { localStorage.setItem(k(name), JSON.stringify(val)); } catch (e) {} }

  var SDEF = { v: 1, sound: true, music: true, difficulty: (DIFFS.indexOf("normal") >= 0 ? "normal" : DIFFS[0]), theme: "system" };
  var settings = Object.assign({}, SDEF, load("settings", {}));
  if (DIFFS.indexOf(settings.difficulty) < 0) settings.difficulty = SDEF.difficulty;
  function persist() { save("settings", settings); }

  /* ------------------------- tiny event emitter -------------------------- */
  var subs = {};
  function on(ev, fn) { (subs[ev] = subs[ev] || []).push(fn); return function () { subs[ev] = (subs[ev] || []).filter(function (f) { return f !== fn; }); }; }

    (subs[ev] || []).forEach(function (fn) { try { fn(data); } catch (e) {} });
    try { window.dispatchEvent(new CustomEvent("gs:" + ev, { detail: data })); } catch (e) {}
  }

  /* ============================== AUDIO ================================== */

  var acRegistry = [];

  (function patchWebAudio() {
    var Orig = window.AudioContext || window.webkitAudioContext;
    if (!Orig || Orig.__gsPatched) return;
    function Patched() {
      var ctx = arguments.length ? new Orig(arguments[0]) : new Orig();
      try {
        var realDest = ctx.destination;
        var sfx = ctx.createGain(); sfx.connect(realDest);
        var music = ctx.createGain(); music.connect(realDest);

        music.gain.value = (soundOn && musicOn) ? 1 : 0;
        Object.defineProperty(ctx, "destination", { get: function () { return sfx; }, configurable: true });
        ctx.__gsSfx = sfx; ctx.__gsMusic = music; ctx.__gsRealDest = realDest;
        acRegistry.push(ctx);
      } catch (e) {}
      return ctx;
    }
    try { Patched.prototype = Orig.prototype; } catch (e) {}

    try { window.AudioContext = Patched; } catch (e) {}
    try { window.webkitAudioContext = Patched; } catch (e) {}

    var proto = HTMLMediaElement.prototype;

        configurable: true,
        get: function () { return (!soundOn) || (this.loop && !musicOn) || d.get.call(this); },
        set: function (v) { try { d.set.call(this, v); } catch (e) {} }
      });
    }
    var op = proto.play;
    proto.play = function () {

      try { this.volume = this.volume; } catch (e) {}
      return op.apply(this, arguments);
    };
    HTMLMediaElement.__gsPatched = true;
  })();

  function applyAudio() {
    acRegistry.forEach(function (ctx) {

        if (ctx.__gsMusic) ctx.__gsMusic.gain.setValueAtTime((soundOn && musicOn) ? 1 : 0, ctx.currentTime);

    mediaEls.forEach(function (el) { try { el.muted = el.muted; } catch (e) {} });
  }

  /* ============================== THEME ================================== */
  function applyTheme() {
    var t = settings.theme;
    var root = document.documentElement;
    root.classList.remove("gs-theme-light", "gs-theme-dark", "gs-theme-system");

    var eff = t;
    if (t === "system") {
      eff = (window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches) ? "dark" : "light";
    }
    try { root.style.colorScheme = (t === "system") ? "light dark" : t; } catch (e) {}

    if (host) host.setAttribute("data-theme", eff);
    emit("theme", { theme: t, effective: eff });
  }
  if (window.matchMedia) {
    try { window.matchMedia("(prefers-color-scheme: dark)").addEventListener("change", function () { if (settings.theme === "system") applyTheme(); }); }
    catch (e) {}
  }

  /* ============================== HINTS ================================== */
  function hintState() {
    var s = load("hint", { v: 1, spentAt: [], puzzleId: "", lastSeen: Date.now() });
    var now = Date.now();
    // anti-tamper: clamp future stamps; ignore large backward clock jumps
    if (s.lastSeen && now < s.lastSeen - 60000) { s.spentAt = (s.spentAt || []).map(function () { return now; }); }
    s.spentAt = (s.spentAt || []).map(function (t) { return t > now ? now : t; }).filter(function (t) { return now - t < WINDOW_MS; });
    s.lastSeen = now;
    return s;
  }
  function hintsLeft() { var s = hintState(); save("hint", s); return Math.max(0, HINT_MAX - s.spentAt.length); }
  function nextHintMs() {
    var s = hintState();
    if (s.spentAt.length < HINT_MAX) return 0;
    var oldest = Math.min.apply(null, s.spentAt);
    return Math.max(0, WINDOW_MS - (Date.now() - oldest));
  }
  function spendHint() {
    var s = hintState();
    if (HINT_MAX - s.spentAt.length <= 0) return false;
    s.spentAt.push(Date.now()); save("hint", s); return true;
  }
  function refillHints(puzzleId) {
    var s = hintState();
    if (puzzleId != null && String(puzzleId) === String(s.puzzleId)) { save("hint", s); return; } // same board: no mint
    s.spentAt = []; s.puzzleId = (puzzleId == null ? "" : String(puzzleId)); save("hint", s);
    updateHintBadge();
  }
  var tipIdx = 0;
  function provideHintText() {
    if (typeof CFG.onHint === "function") { try { var r = CFG.onHint(); if (r) return String(r); } catch (e) {} }
    var t = TIPS[tipIdx % TIPS.length]; tipIdx++; return t;
  }

  /* ============================ LEADERBOARD ============================= */
  function getBoard(diff) { var b = load("scores", { v: 1, boards: {} }); return (b.boards && b.boards[diff]) || []; }
  function submitScore(score, opts) {
    score = Number(score); if (!isFinite(score)) return;
    opts = opts || {};
    var diff = opts.difficulty || settings.difficulty;
    var name = (opts.name || "You").toString().slice(0, 12);
    var b = load("scores", { v: 1, boards: {} }); b.boards = b.boards || {};
    var list = b.boards[diff] || [];
    list.push({ name: name, score: score, ts: Date.now() });
    list.sort(function (a, c) { return c.score - a.score; });
    b.boards[diff] = list.slice(0, 10);
    save("scores", b);
    emit("score", { score: score, difficulty: diff });
    return b.boards[diff];
  }

  /* ============================== UI SHELL ============================== */
  var host, root, $bar, $hintBtn, $soundBtn, $modal, $panelHost;
  var lastFocus = null;

  var CSS = ''
    + ':host{all:initial}'
    + '*{box-sizing:border-box;font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif}'

    + '.btn{all:unset;cursor:pointer;display:flex;align-items:center;justify-content:center;'
    + 'min-width:44px;min-height:44px;width:44px;height:44px;border-radius:12px;font-size:20px;line-height:1;'
    + 'background:var(--c-btn);color:var(--c-tx);box-shadow:0 2px 8px rgba(0,0,0,.25);'
    + 'touch-action:manipulation;-webkit-tap-highlight-color:transparent;position:relative;transition:transform .08s,background .15s}'
    + '.btn:hover{background:var(--c-btnH)}.btn:active{transform:scale(.92)}'
    + '.btn:focus-visible{outline:3px solid var(--c-acc);outline-offset:2px}'

    + 'background:var(--c-acc);color:#fff;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center}'
    + '.btn.off{opacity:.45}'
    + '.scrim{position:fixed;inset:0;background:rgba(0,0,0,.55);display:none;align-items:center;justify-content:center;z-index:10;'
    + 'padding:16px;padding-top:max(16px,env(safe-area-inset-top));padding-bottom:max(16px,env(safe-area-inset-bottom))}'
    + '.scrim.open{display:flex}'
    + '.modal{width:min(420px,100%);max-height:88vh;overflow:auto;background:var(--c-bg);color:var(--c-tx);'

    + 'background:var(--c-bg);color:var(--c-tx);border:1px solid var(--c-line);padding:12px 16px;border-radius:12px;'
    + 'max-width:86vw;font-size:14px;box-shadow:0 8px 30px rgba(0,0,0,.4);z-index:20;opacity:0;transition:opacity .2s,transform .2s;pointer-events:none}'
    + '.toast.show{opacity:1;transform:translateX(-50%) translateY(-4px)}'
    + ':host([data-theme=dark]){--c-bg:#171a21;--c-tx:#f2f4f8;--c-mut:#9aa3b2;--c-line:#2c313c;--c-btn:#222732;--c-btnH:#2c333f;--c-acc:#4f8cff}'
    + ':host([data-theme=light]){--c-bg:#ffffff;--c-tx:#15181f;--c-mut:#646b7a;--c-line:#e6e8ee;--c-btn:#eef1f6;--c-btnH:#e3e7ef;--c-acc:#2f6bff}'
    + '@media (prefers-reduced-motion: reduce){*{transition:none!important}}';

  function el(tag, attrs, html) {
    var n = document.createElement(tag);
    if (attrs) for (var a in attrs) n.setAttribute(a, attrs[a]);
    if (html != null) n.innerHTML = html;
    return n;
  }

  function buildUI() {

    var bd = el("div", { id: "gs-backdrop" });
    bd.style.cssText = "position:fixed;inset:0;z-index:-1;pointer-events:none";
    document.body.appendChild(bd);

    host = el("div", { id: "gs-host" });
    host.style.cssText = "position:fixed;top:0;left:0;width:0;height:0;z-index:2147483647;isolation:isolate";
    document.body.appendChild(host);
    root = host.attachShadow ? host.attachShadow({ mode: "open" }) : host;
    var style = el("style"); style.textContent = CSS; root.appendChild(style);

    // ---- in-play control bar: Hint · Sound · Settings ----
    $bar = el("div", { class: "bar" });
    $hintBtn = el("button", { class: "btn", "aria-label": "Hint", title: "Hint" }, "💡");

    $soundBtn.addEventListener("click", function () { setSound(!soundOn); });

    root.addEventListener("keydown", function (e) { if (e.key === "Escape" && $modal.classList.contains("open")) closeModal(); trapFocus(e); });

  }

  function updateSoundBtn() { if ($soundBtn) { $soundBtn.textContent = soundOn ? "🔊" : "🔇"; $soundBtn.classList.toggle("off", !soundOn); } }
  function updateHintBadge() {
    if (!$hintBtn) return;

    var b = $hintBtn.querySelector(".badge");

  }

  /* ----------------------------- panels --------------------------------- */
  function openModal(render) {

    var f = $panelHost.querySelector("button,[tabindex],input"); if (f) f.focus();
  }
  function closeModal() {
    $modal.classList.remove("open");
    if (lastFocus && lastFocus.focus) { try { lastFocus.focus(); } catch (e) {} }
  }
  function trapFocus(e) {
    if (e.key !== "Tab" || !$modal.classList.contains("open")) return;
    var f = $panelHost.querySelectorAll('button,[href],input,[tabindex]:not([tabindex="-1"])');
    if (!f.length) return;
    var first = f[0], last = f[f.length - 1];

    else if (!e.shiftKey && root.activeElement === last) { e.preventDefault(); first.focus(); }

  function header(title, withBack) {
    var h = el("div", { class: "mhead" });
    var left = el("div");
    if (withBack) { var b = el("button", { class: "back", "aria-label": "Back to settings" }, "‹ Back"); b.addEventListener("click", openSettings); left.appendChild(b); }
    left.appendChild(el("div", { class: "mtitle" }, title));
    var x = el("button", { class: "x", "aria-label": "Close" }, "✕"); x.addEventListener("click", closeModal);

  function renderSettings() {

    // Music
    $panelHost.appendChild(toggleRow("Music", "Background music only", musicOn, function (v) { setMusic(v); }));

    // Difficulty
    var dr = el("div", { class: "row" });
    var dl = el("div"); dl.appendChild(el("div", { class: "lab" }, "Difficulty"));
    dl.appendChild(el("div", { class: "desc" }, "Applies on your next new game"));
    dr.appendChild(dl);
    dr.appendChild(segment(DIFFS.map(cap), DIFFS.indexOf(settings.difficulty), function (i) {

    }));
    $panelHost.appendChild(dr);

    // Theme
    var tr = el("div", { class: "row" });
    var tl = el("div"); tl.appendChild(el("div", { class: "lab" }, "Theme"));
    tl.appendChild(el("div", { class: "desc" }, "System · Light · Dark"));
    tr.appendChild(tl);
    var TH = ["system", "light", "dark"];
    tr.appendChild(segment(["System", "Light", "Dark"], TH.indexOf(settings.theme), function (i) {
      settings.theme = TH[i]; persist(); applyTheme();
    }));
    $panelHost.appendChild(tr);

    // Leaderboard / How to Play / Reset
    var lb = el("button", { class: "lbtn" }, "🏆  Leaderboard"); lb.addEventListener("click", function () { openModal(renderLeaderboard); });
    var ht = el("button", { class: "lbtn" }, "❓  How to Play"); ht.addEventListener("click", function () { openModal(renderHowTo); });
    var rs = el("button", { class: "lbtn danger" }, "↺  Reset progress"); rs.addEventListener("click", resetProgress);
    $panelHost.appendChild(lb); $panelHost.appendChild(ht); $panelHost.appendChild(rs);
  }

  function renderHowTo() {
    $panelHost.innerHTML = "";
    $panelHost.appendChild(header("How to Play", true));
    $panelHost.appendChild(el("div", { class: "howto" }, HOWTO));
  }

  var lbActive = null;
  function renderLeaderboard() {
    $panelHost.innerHTML = "";
    $panelHost.appendChild(header("Leaderboard", true));
    if (lbActive == null) lbActive = settings.difficulty;
    var tabs = el("div", { class: "lbtabs" });
    DIFFS.forEach(function (d) {

    if (!list.length) { $panelHost.appendChild(el("div", { class: "empty" }, "No scores yet.\nPlay a game to set a record!")); return; }
    var ul = el("ul", { class: "lblist" });
    list.forEach(function (r, i) {
      var li = el("li");
      li.appendChild(el("span", null, (i + 1) + ". " + r.name));

      ul.appendChild(li);

    $panelHost.appendChild(ul);
  }

  function toggleRow(lab, desc, val, onChange) {
    var r = el("div", { class: "row" });
    var l = el("div"); l.appendChild(el("div", { class: "lab" }, lab)); l.appendChild(el("div", { class: "desc" }, desc));
    var sw = el("button", { class: "sw", role: "switch", "aria-checked": String(!!val), "aria-label": lab });
    sw.addEventListener("click", function () { var nv = sw.getAttribute("aria-checked") !== "true"; sw.setAttribute("aria-checked", String(nv)); onChange(nv); });

  }
  function segment(labels, active, onPick) {
    var s = el("div", { class: "seg", role: "group" });
    labels.forEach(function (lab, i) {
      var b = el("button", { "aria-pressed": String(i === active) }, lab);
      b.addEventListener("click", function () {
        Array.prototype.forEach.call(s.children, function (c, j) { c.setAttribute("aria-pressed", String(j === i)); });

  function setSound(v) { soundOn = settings.sound = !!v; persist(); applyAudio(); updateSoundBtn(); emit("sound", { on: soundOn }); }
  function setMusic(v) { musicOn = settings.music = !!v; persist(); applyAudio(); emit("music", { on: musicOn }); }

  function doHint() {
    var left = hintsLeft();
    if (left <= 0) {
      var ms = nextHintMs(); var h = Math.floor(ms / 3600000), m = Math.ceil((ms % 3600000) / 60000);
      toast("No hints left. Next in " + h + "h " + m + "m — or start a new game.");
      return;
    }
    if (!spendHint()) return;
    updateHintBadge();
    toast("💡 " + provideHintText());
    emit("hint", { left: hintsLeft() });
  }

  function resetProgress() {
    if (!confirm("Reset ALL saved progress and high scores for " + TITLE + "? This cannot be undone.")) return;
    try {
      var rm = [];
      for (var i = 0; i < localStorage.length; i++) { var key = localStorage.key(i); if (key && key.indexOf("gs:" + GID + ":") === 0) rm.push(key); }

  var toastT;
  function toast(msg) {

    config: function (o) { Object.assign(CFG, o || {}); if (o) { if (o.howToPlay) HOWTO = o.howToPlay; if (o.hints) TIPS = o.hints.slice(); } return this; },
    getDifficulty: function () { return settings.difficulty; },

    isSoundOn: function () { return soundOn; },

    newGame: function (puzzleId) { refillHints(puzzleId); emit("newgame", { puzzleId: puzzleId }); },
    useHint: doHint,
    hintsLeft: hintsLeft,
    onHint: function (fn) { CFG.onHint = fn; return this; },
    openSettings: openSettings,
    openHowToPlay: function () { openModal(renderHowTo); },
    openLeaderboard: function () { openModal(renderLeaderboard); },
    on: on,
    routeMusic: function (node, ctx) { try { if (ctx && ctx.__gsMusic && node && node.connect) { node.connect(ctx.__gsMusic); return true; } } catch (e) {} return false; }
  };

  /* ------------------------------ boot ----------------------------------- */
  function boot() {
    // ensure a viewport meta exists for mobile
    if (!document.querySelector('meta[name="viewport"]')) {
      var m = el("meta", { name: "viewport", content: "width=device-width, initial-scale=1, viewport-fit=cover" });

    applyTheme();
    applyAudio();
    emit("ready", { id: GID });

  if (document.readyState === "loading") document.addEventListener("DOMContentLoaded", boot);
  else boot();
})();

</script>

<script>
// ─── CONSTANTS ───────────────────────────────────────────────────────────────
const COLS = 13;
const ROWS = 13;
const GOAL_ROW    = 0;
const RIVER_START = 1;
const RIVER_END   = 5;
const MEDIAN_ROW  = 6;
const ROAD_START  = 7;
const ROAD_END    = 11;
const START_ROW   = 12;
const NUM_GOALS   = 5;
const GOAL_COLS   = [1, 3, 6, 9, 11];
const TOTAL_LIVES = 3;
const BASE_TIMER  = 30;
const HOP_DURATION = 80;
const SAVE_KEY    = '19-road-crossing_profile';
const SAVE_VERSION = 3;

// ─── DIFFICULTY ──────────────────────────────────────────────────────────────
// speedMul scales all traffic/river speeds; timeMul scales the level timer.
// Normal is intentionally slower than the old default (which was too fast).
const DIFFICULTIES = {
  easy:   { label: 'EASY',   speedMul: 0.55, timeMul: 1.35, desc: 'Slow traffic, extra time. Relaxed.' },
  normal: { label: 'NORMAL', speedMul: 0.75, timeMul: 1.00, desc: 'Balanced speed and timing.' },
  hard:   { label: 'HARD',   speedMul: 1.00, timeMul: 0.85, desc: 'Fast traffic, tight timer. Classic.' },
};
let difficulty = 'normal';

// ─── REDUCED MOTION ──────────────────────────────────────────────────────────
const prefersReducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

// ─── PROFILE / SAVE ──────────────────────────────────────────────────────────
let profile = null;

const ACHIEVEMENT_DEFS = [
  { id: 'safe_crosser',    label: 'Safe Crosser',    desc: 'Complete level 1' },
  { id: 'speed_demon',     label: 'Speed Demon',     desc: 'Clear a level with 20+ seconds left' },
  { id: 'water_dancer',    label: 'Water Dancer',    desc: 'Cross full river without falling' },
  { id: 'perfect_round',   label: 'Perfect Round',   desc: 'Fill all 5 goals in under 20 seconds' },
  { id: 'level5_survivor', label: 'Level 5 Survivor',desc: 'Reach level 5' },
  { id: 'turtle_surfer',   label: 'Turtle Surfer',   desc: 'Ride a turtle 3 times in one level' },
  { id: 'first_game',      label: 'First Hop',       desc: 'Play your first game' },
];

function defaultProfile() {
  const id = (typeof crypto !== 'undefined' && crypto.randomUUID) ? crypto.randomUUID() : ('id_' + Math.random().toString(36).slice(2));
  const adj = ['Swift','Brave','Sneaky','Lucky','Bold','Quick','Wise'];
  const noun = ['Hopper','Froggo','Jumper','Leaper','Dasher'];
  const name = adj[Math.floor(Math.random()*adj.length)] + '_' + noun[Math.floor(Math.random()*noun.length)];
  return {
    version: SAVE_VERSION,
    id,
    name,
    bestScore: 0,
    highScores: [],
    achievements: [],
    stats: {
      gamesPlayed: 0,
      highestLevel: 1,
      totalGoals: 0,
      totalCrossings: 0,
      waterDeaths: 0,
      carDeaths: 0,
      turtleRidesCurLevel: 0,
    },
    muted: false,
    seenTutorial: false,
    difficulty: 'normal',
  };
}

function loadProfile() {
  try {
    const raw = localStorage.getItem(SAVE_KEY);
    if (raw) {
      const data = JSON.parse(raw);
      // Migration from v1 or bare bestScore
      if (!data.version || data.version < 2) {
        const migrated = defaultProfile();
        migrated.bestScore = data.bestScore || parseInt(localStorage.getItem('streetHopperBest') || '0');
        migrated.muted = data.muted || (localStorage.getItem('sh_muted') === '1');
        migrated.seenTutorial = data.seenTutorial || false;
        if (data.name) migrated.name = data.name;
        if (data.id) migrated.id = data.id;
        if (data.stats) Object.assign(migrated.stats, data.stats);
        if (data.achievements) migrated.achievements = data.achievements;
        if (data.highScores) migrated.highScores = data.highScores;
        profile = migrated;
        saveProfile();
        return;
      }
      profile = data;
    } else {
      // Check for old bare key
      const oldBest = parseInt(localStorage.getItem('streetHopperBest') || '0');
      const oldMuted = localStorage.getItem('sh_muted') === '1';
      profile = defaultProfile();
      profile.bestScore = oldBest;
      profile.muted = oldMuted;
      saveProfile();
    }
  } catch(e) {
    profile = defaultProfile();
  }
}

function saveProfile() {
  try {
    if (profile) {
      profile.version = SAVE_VERSION;
      localStorage.setItem(SAVE_KEY, JSON.stringify(profile));
    }
  } catch(e) {}
}

function addHighScore(sc, lvl) {
  if (!profile) return;
  profile.highScores.push({ score: sc, level: lvl, date: new Date().toLocaleDateString() });
  profile.highScores.sort((a, b) => b.score - a.score);
  profile.highScores = profile.highScores.slice(0, 5);
  if (sc > profile.bestScore) profile.bestScore = sc;
  saveProfile();
}

// ─── ACHIEVEMENTS ─────────────────────────────────────────────────────────────
function unlockAchievement(id) {
  if (!profile) return;
  if (profile.achievements.includes(id)) return;
  profile.achievements.push(id);
  saveProfile();
  const def = ACHIEVEMENT_DEFS.find(a => a.id === id);
  if (def) showToast('ACHIEVEMENT: ' + def.label, 'achievement');
}

function checkAchievements() {
  if (!profile) return;
  if (level >= 1 && goalsFilled.every(g => g)) unlockAchievement('safe_crosser');
  if (level >= 5) unlockAchievement('level5_survivor');
  if (profile.stats.gamesPlayed >= 1) unlockAchievement('first_game');
}

// ─── TOAST SYSTEM ─────────────────────────────────────────────────────────────
let toastQueue = [];
function showToast(msg, type = '') {
  const container = document.getElementById('toast-container');
  const el = document.createElement('div');
  el.className = 'toast' + (type ? ' ' + type : '');
  el.textContent = msg;
  container.appendChild(el);
  setTimeout(() => { el.style.opacity = '0'; setTimeout(() => el.remove(), 400); }, 2400);
}

// ─── GAME STATE ──────────────────────────────────────────────────────────────
let STATE = 'START';
let score = 0, bestScore = 0, lives = TOTAL_LIVES, level = 1;
let timer = BASE_TIMER, timerElapsed = 0;
let goalsFilled = [false, false, false, false, false];
let muted = false;
let lastTime = 0;
let inputBuffer = null;
let flashAlpha = 0;
let particles = [];
let deathAnim = null;
let screenShakeT = 0, screenShakeAmt = 0;
let showTutorial = false;
let tutorialPage = 0;
let waterCrossedSafe = false; // for water_dancer achievement
let turtleRidesThisLevel = 0;
let levelStartTime = 0; // for speed_demon
let levelGoalsFillTime = 0; // for perfect_round
let uiButtons = [];     // clickable on-screen menu buttons (rebuilt each frame)
let settingsPrevState = null;

// ─── PLAYER ──────────────────────────────────────────────────────────────────
let player = {
  col: 6, row: START_ROW,
  x: 0, y: 0,
  targetX: 0, targetY: 0,
  hopping: false,
  hopT: 0,
  hopFromX: 0, hopFromY: 0,
  onPlatform: null,
  alive: true
};

// ─── CANVAS SETUP ─────────────────────────────────────────────────────────────
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
let CELL, HUD_H, CANVAS_W, CANVAS_H;

function resize() {
  const W = window.innerWidth;
  const H = window.innerHeight;
  const dpad = document.getElementById('dpad');
  const isMobile = ('ontouchstart' in window) || W < 600;
  let dpadH = isMobile ? 200 : 0;
  CELL = Math.floor(Math.min(W / COLS, (H - dpadH - 50) / ROWS));
  CELL = Math.max(CELL, 24);
  HUD_H = Math.max(36, Math.floor(CELL * 0.6));
  CANVAS_W = CELL * COLS;
  CANVAS_H = CELL * ROWS + HUD_H;
  canvas.width = CANVAS_W;
  canvas.height = CANVAS_H;
  canvas.style.width = CANVAS_W + 'px';
  canvas.style.height = CANVAS_H + 'px';
  if (isMobile) dpad.style.display = 'block';
  syncPlayerPixels();
  vehicles.forEach(v => { v.x = v.col * CELL; v.y = rowY(v.row); });
  platforms.forEach(p => { p.x = p.col * CELL; p.y = rowY(p.row); });
}

function rowY(row) { return HUD_H + row * CELL; }
function colX(col) { return col * CELL; }
function syncPlayerPixels() {
  player.x = player.targetX = colX(player.col);
  player.y = player.targetY = rowY(player.row);
}

// ─── AUDIO ────────────────────────────────────────────────────────────────────
let audioCtx = null;
let bgmNode = null, bgmGain = null;

function getAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}

function resumeAudio() {
  try { if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume(); } catch(e) {}
}

function playTone(freq, type, duration, vol, attack, decay) {
  if (muted) return;
  try {
    const ac = getAudio();
    const osc = ac.createOscillator();
    const gain = ac.createGain();
    osc.connect(gain); gain.connect(ac.destination);
    osc.type = type || 'sine';
    osc.frequency.setValueAtTime(freq, ac.currentTime);
    gain.gain.setValueAtTime(0, ac.currentTime);
    gain.gain.linearRampToValueAtTime(vol || 0.3, ac.currentTime + (attack || 0.01));
    gain.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + (decay || duration));
    osc.start(ac.currentTime);
    osc.stop(ac.currentTime + duration);
  } catch(e) {}
}

function sfxHop() { playTone(440, 'sine', 0.07, 0.25, 0.005, 0.06); }

function sfxDeath(type) {
  if (muted) return;
  try {
    const ac = getAudio();
    const buf = ac.createBuffer(1, ac.sampleRate * 0.4, ac.sampleRate);
    const d = buf.getChannelData(0);
    for (let i = 0; i < d.length; i++) d[i] = (Math.random() * 2 - 1) * Math.exp(-i / (ac.sampleRate * 0.1));
    const src = ac.createBufferSource();
    const gain = ac.createGain();
    src.buffer = buf;
    src.connect(gain); gain.connect(ac.destination);
    gain.gain.setValueAtTime(type === 'water' ? 0.3 : 0.5, ac.currentTime);
    if (type === 'water') {
      const filt = ac.createBiquadFilter();
      filt.type = 'lowpass'; filt.frequency.value = 600;
      src.connect(filt); filt.connect(gain);
    }
    src.start();
  } catch(e) {}
}

function sfxGoal() {
  [523, 659, 784].forEach((f, i) => {
    setTimeout(() => playTone(f, 'triangle', 0.15, 0.3, 0.01, 0.12), i * 80);
  });
}

// Looping BGM
function startBGM() {
  if (muted) return;
  try {
    const ac = getAudio();
    if (bgmNode) { try { bgmNode.stop(); } catch(e) {} bgmNode = null; }
    const notes = [262, 294, 330, 349, 392, 349, 330, 294];
    const noteDur = 0.22;
    const totalDur = notes.length * noteDur;
    const buf = ac.createBuffer(1, Math.ceil(ac.sampleRate * totalDur), ac.sampleRate);
    const data = buf.getChannelData(0);
    notes.forEach((freq, ni) => {
      const start = Math.floor(ni * noteDur * ac.sampleRate);
      const end = Math.floor((ni * noteDur + noteDur * 0.75) * ac.sampleRate);
      for (let i = start; i < end && i < data.length; i++) {
        const t = (i - start) / ac.sampleRate;
        const env = Math.min(1, t / 0.01) * Math.exp(-t * 6);
        data[i] = Math.sin(2 * Math.PI * freq * t) * env * 0.18;
      }
    });
    const src = ac.createBufferSource();
    bgmGain = ac.createGain();
    bgmGain.gain.value = muted ? 0 : 0.35;
    src.buffer = buf;
    src.loop = true;
    src.connect(bgmGain);
    bgmGain.connect(ac.destination);
    src.start();
    bgmNode = src;
  } catch(e) {}
}

function stopBGM() {
  if (bgmNode) { try { bgmNode.stop(); } catch(e) {} bgmNode = null; }
}

function updateBGMVolume() {
  if (bgmGain) bgmGain.gain.value = muted ? 0 : 0.35;
}

// ─── LEVEL DATA ───────────────────────────────────────────────────────────────
let vehicles = [];
let platforms = [];
let timeWarnBeepT = 0;

function getLevelTimer() {
  const tm = (DIFFICULTIES[difficulty] || DIFFICULTIES.normal).timeMul;
  return Math.max(15, BASE_TIMER - (level - 1) * 1.5) * tm;
}

function getLaneDefs(lvl) {
  const dm = (DIFFICULTIES[difficulty] || DIFFICULTIES.normal).speedMul;
  const sp = (base) => base * (1 + 0.12 * (lvl - 1)) * dm;
  return {
    road: [
      { row: 11, dir: -1, speed: sp(3.5), vehicleW: 1, gap: 4.5, type: 'car',   color: '#e74c3c' },
      { row: 10, dir:  1, speed: sp(4.0), vehicleW: 1, gap: 4.5, type: 'sports', color: '#f39c12' },
      { row:  9, dir: -1, speed: sp(2.5), vehicleW: 2, gap: 5.5, type: 'truck',  color: '#3498db' },
      { row:  8, dir:  1, speed: sp(4.5), vehicleW: 1, gap: 4.5, type: 'sports', color: '#9b59b6' },
      { row:  7, dir: -1, speed: sp(3.0), vehicleW: 2, gap: 5.0, type: 'truck',  color: '#1abc9c' },
    ],
    river: [
      { row: 1, dir:  1, speed: sp(1.8), platformW: 3, gap: 3.0, type: 'log' },
      { row: 2, dir: -1, speed: sp(2.5), platformW: 2, gap: 2.5, type: 'turtle' },
      { row: 3, dir:  1, speed: sp(2.0), platformW: 4, gap: 2.2, type: 'log' },
      { row: 4, dir: -1, speed: sp(1.5), platformW: 3, gap: 3.5, type: 'log' },
      { row: 5, dir:  1, speed: sp(3.2), platformW: 2, gap: 2.0, type: 'turtle' },
    ]
  };
}

const LANE_ITEM_COUNT = 6;

function spawnLane(def, isRiver) {
  const items = [];
  const itemW = def.vehicleW || def.platformW;
  const spacing = itemW + def.gap;
  // The lane is one repeating pattern of LANE_ITEM_COUNT items spaced `spacing`
  // cells apart. `period` is the full pattern length; wrapping by exactly one
  // period keeps every item evenly spaced forever (no clumping into walls).
  const period = spacing * LANE_ITEM_COUNT;
  let startCol = def.dir === 1 ? -itemW - 2 : COLS + 2;
  for (let i = 0; i < LANE_ITEM_COUNT; i++) {
    const col = startCol + (def.dir === 1 ? i * spacing : -i * spacing);
    if (isRiver) {
      items.push({
        row: def.row, col, x: col * CELL, y: rowY(def.row),
        dir: def.dir, speed: def.speed, period,
        w: def.platformW, type: def.type,
        submergeT: 0, submerged: false,
        submergeInterval: 3.5 + Math.random() * 2,
        submergeDuration: 1.5 + Math.random() * 0.8,
        flickering: false,
        prevFlickering: false,
        id: Math.random()
      });
    } else {
      items.push({
        row: def.row, col, x: col * CELL, y: rowY(def.row),
        dir: def.dir, speed: def.speed, period,
        w: def.vehicleW, type: def.type, color: def.color,
        id: Math.random()
      });
    }
  }
  return items;
}

function initLevel() {
  const defs = getLaneDefs(level);
  vehicles = [];
  platforms = [];
  defs.road.forEach(def => { vehicles.push(...spawnLane(def, false)); });
  defs.river.forEach(def => { platforms.push(...spawnLane(def, true)); });
  waterCrossedSafe = true;
  turtleRidesThisLevel = 0;
  levelStartTime = performance.now() / 1000;
  levelGoalsFillTime = 0;
}

// ─── PARTICLES ───────────────────────────────────────────────────────────────
function spawnParticles(cx, cy, colors, count) {
  if (prefersReducedMotion) return;
  const n = count || 12;
  const cols = colors || ['#f1c40f','#e74c3c','#2ecc71','#3498db'];
  for (let i = 0; i < n; i++) {
    const angle = (i / n) * Math.PI * 2;
    const speed = 1.5 + Math.random() * 2;
    particles.push({
      x: cx, y: cy,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      life: 1.0, decay: 0.025 + Math.random() * 0.02,
      r: 4 + Math.random() * 4,
      color: cols[i % cols.length]
    });
  }
}

// ─── SCREEN SHAKE ─────────────────────────────────────────────────────────────
function triggerShake(amount, duration) {
  if (prefersReducedMotion) return;
  screenShakeAmt = amount;
  screenShakeT = duration;
}

// ─── GAME INIT ────────────────────────────────────────────────────────────────
function initGame() {
  resumeAudio();
  // GameShell: refill hints on each new game, and read the chosen difficulty so
  // the in-overlay Easy/Normal/Hard maps onto this game's own difficulty system.
  // 'normal' maps to the existing internal 'normal' (unchanged default behaviour).
  if (window.GameShell) {
    window.GameShell.newGame();
    if (window.GameShell.getDifficulty) {
      const gd = window.GameShell.getDifficulty();
      if (DIFFICULTIES[gd]) difficulty = gd;
    }
  }
  score = 0;
  lives = TOTAL_LIVES;
  level = 1;
  timer = BASE_TIMER;
  timerElapsed = 0;
  goalsFilled = [false, false, false, false, false];
  particles = [];
  deathAnim = null;
  flashAlpha = 0;
  screenShakeT = 0;
  player.col = 6; player.row = START_ROW;
  player.hopping = false; player.onPlatform = null; player.alive = true;
  syncPlayerPixels();
  initLevel();
  if (profile) {
    bestScore = profile.bestScore;
    profile.stats.gamesPlayed++;
    checkAchievements();
    saveProfile();
  } else {
    bestScore = parseInt(localStorage.getItem('streetHopperBest') || '0');
  }
  STATE = 'PLAYING';
  startBGM();
}

function respawnPlayer() {
  player.col = 6; player.row = START_ROW;
  player.hopping = false; player.onPlatform = null; player.alive = true;
  syncPlayerPixels();
  timer = getLevelTimer();
  timerElapsed = 0;
  inputBuffer = null;
  waterCrossedSafe = true;
  STATE = 'PLAYING';
}

// ─── INPUT ───────────────────────────────────────────────────────────────────
function tryHop(dx, dy) {
  if (STATE !== 'PLAYING') return;
  if (player.hopping) { inputBuffer = {dx, dy}; return; }
  doHop(dx, dy);
}

function doHop(dx, dy) {
  const newCol = player.col + dx;
  const newRow = player.row + dy;
  if (newCol < 0 || newCol >= COLS) return;
  if (newRow < GOAL_ROW || newRow > START_ROW) return;

  if (newRow === GOAL_ROW) {
    const goalIdx = GOAL_COLS.indexOf(newCol);
    if (goalIdx === -1) { killPlayer('wall'); return; }
    if (goalsFilled[goalIdx]) { killPlayer('wall'); return; }
  }

  player.hopFromX = player.x;
  player.hopFromY = player.y;
  player.col = newCol;
  player.row = newRow;
  player.targetX = colX(player.col);
  player.targetY = rowY(player.row);
  player.hopping = true;
  player.hopT = 0;
  player.onPlatform = null;
  sfxHop();

  if (dy < 0) {
    score += 10;
    if (profile) profile.stats.totalCrossings++;
  }
}

function killPlayer(type) {
  if (!player.alive) return;
  player.alive = false;
  lives--;
  if (!prefersReducedMotion) flashAlpha = 1.0;
  deathAnim = { x: player.x + CELL/2, y: player.y + CELL/2, t: 0, type };
  sfxDeath(type === 'water' ? 'water' : 'crash');
  triggerShake(type === 'car' ? 6 : 3, 0.3);
  STATE = 'DYING';

  if (type === 'water' && profile) profile.stats.waterDeaths++;
  if ((type === 'car' || type === 'wall') && profile) profile.stats.carDeaths++;
  if (type === 'water') waterCrossedSafe = false;

  const remaining = lives;
  if (remaining > 0) {
    setTimeout(() => showToast(`${remaining} ${remaining === 1 ? 'life' : 'lives'} left`, 'life-loss'), 800);
  }
}

// ─── UPDATE LOOP ──────────────────────────────────────────────────────────────
function update(dt) {
  // Screen shake
  if (screenShakeT > 0) screenShakeT = Math.max(0, screenShakeT - dt);

  if (STATE === 'DYING') {
    if (!prefersReducedMotion) flashAlpha = Math.max(0, flashAlpha - dt * 3);
    else flashAlpha = 0;
    if (deathAnim) deathAnim.t += dt;
    if (deathAnim && deathAnim.t > 0.7) {
      deathAnim = null;
      if (lives <= 0) {
        if (profile) {
          addHighScore(score, level);
          if (level > profile.stats.highestLevel) profile.stats.highestLevel = level;
          saveProfile();
        } else {
          if (score > bestScore) { bestScore = score; localStorage.setItem('streetHopperBest', bestScore); }
        }
        // GameShell: record the run on the per-difficulty leaderboard.
        if (window.GameShell) window.GameShell.submitScore(Math.round(score), { difficulty: (window.GameShell.getDifficulty && window.GameShell.getDifficulty()) || 'normal' });
        sfxGameOver();
        stopBGM();
        STATE = 'GAMEOVER';
      } else {
        respawnPlayer();
      }
    }
    updateParticles(dt);
    return;
  }
  if (STATE !== 'PLAYING') return;

  timerElapsed += dt;
  const curTimer = getLevelTimer();
  const remaining = curTimer - timerElapsed;

  if (remaining > 0 && remaining <= 8) {
    timeWarnBeepT += dt;
    if (timeWarnBeepT > 1.0) { sfxTimeWarn(); timeWarnBeepT = 0; }
  } else {
    timeWarnBeepT = 0;
  }

  if (remaining <= 0) { killPlayer('timeout'); return; }

  vehicles.forEach(v => {
    v.x += v.dir * v.speed * dt * CELL;
    const periodPx = v.period * CELL;
    // Wrap by exactly one pattern period so spacing stays even (no clumping).
    while (v.dir === 1 && v.x > CANVAS_W + 2 * CELL) v.x -= periodPx;
    while (v.dir === -1 && v.x < -v.w * CELL - 2 * CELL) v.x += periodPx;
    v.col = v.x / CELL;
  });

  platforms.forEach(p => {
    p.x += p.dir * p.speed * dt * CELL;
    const periodPx = p.period * CELL;
    while (p.dir === 1 && p.x > CANVAS_W + p.w * CELL + CELL) p.x -= periodPx;
    while (p.dir === -1 && p.x < -(p.w * CELL) - CELL) p.x += periodPx;
    p.col = p.x / CELL;

    if (p.type === 'turtle') {
      p.prevFlickering = p.flickering;
      p.submergeT += dt;
      if (!p.submerged && !p.flickering && p.submergeT >= p.submergeInterval) {
        p.flickering = true;
        p.flickerT = 0;
      }
      if (p.flickering) {
        p.flickerT = (p.flickerT || 0) + dt;
        if (!p.prevFlickering && p.flickering) sfxTurtleSubmerge();
        if (p.flickerT >= 0.6) { p.flickering = false; p.submerged = true; p.submergeT = 0; }
      }
      if (p.submerged && p.submergeT >= p.submergeDuration) {
        p.submerged = false; p.submergeT = 0; p.submergeInterval = 3.5 + Math.random() * 2;
      }
    }
  });

  if (player.hopping) {
    player.hopT += dt * 1000;
    const t = Math.min(player.hopT / HOP_DURATION, 1);
    const ease = t < 0.5 ? 2*t*t : -1+(4-2*t)*t;
    player.x = player.hopFromX + (player.targetX - player.hopFromX) * ease;
    player.y = player.hopFromY + (player.targetY - player.hopFromY) * ease;
    if (t >= 1) {
      player.x = player.targetX;
      player.y = player.targetY;
      player.hopping = false;
      onHopLanded();
      if (inputBuffer) {
        const buf = inputBuffer; inputBuffer = null;
        doHop(buf.dx, buf.dy);
      }
    }
  } else {
    if (player.row >= RIVER_START && player.row <= RIVER_END) {
      const plat = getPlatformAt(player.col, player.row);
      if (plat) {
        // Track turtle rides
        if (plat.type === 'turtle' && player.onPlatform !== plat) {
          turtleRidesThisLevel++;
          if (turtleRidesThisLevel >= 3) unlockAchievement('turtle_surfer');
        }
        player.onPlatform = plat;
        player.x += plat.dir * plat.speed * dt * CELL;
        player.col = player.x / CELL;
        player.targetX = player.x;
        if (player.x < -CELL || player.x > CANVAS_W) { killPlayer('water'); return; }
        player.col = Math.round(player.x / CELL);
      } else {
        killPlayer('water'); return;
      }
    }
  }

  if (player.row >= ROAD_START && player.row <= ROAD_END) {
    if (checkVehicleCollision()) { killPlayer('car'); return; }
  }

  updateParticles(dt);
}

function onHopLanded() {
  const row = player.row;
  const col = player.col;

  if (row === GOAL_ROW) {
    const goalIdx = GOAL_COLS.indexOf(col);
    if (goalIdx >= 0 && !goalsFilled[goalIdx]) {
      goalsFilled[goalIdx] = true;
      score += 50;
      const curTimer = getLevelTimer();
      const remaining = curTimer - timerElapsed;
      score += Math.floor(remaining * 10 / 0.5) * 1;
      sfxGoal();
      spawnParticles(colX(col) + CELL/2, rowY(row) + CELL/2);
      if (profile) profile.stats.totalGoals++;

      if (goalsFilled.every(g => g)) {
        const clearTime = performance.now() / 1000 - levelStartTime;
        score += 1000;
        sfxLevelClear();

        // Speed demon: level clear with 20+ seconds remaining
        if (remaining >= 20) unlockAchievement('speed_demon');
        // Perfect round: all 5 goals in under 20 seconds
        if (clearTime < 20) unlockAchievement('perfect_round');
        // Water dancer: crossed full river safely
        if (waterCrossedSafe) unlockAchievement('water_dancer');

        level++;
        if (profile && level > profile.stats.highestLevel) profile.stats.highestLevel = level;
        goalsFilled = [false, false, false, false, false];
        player.col = 6; player.row = START_ROW;
        player.hopping = false; player.onPlatform = null;
        syncPlayerPixels();
        timer = getLevelTimer();
        timerElapsed = 0;
        initLevel();
        checkAchievements();
        showToast(`LEVEL ${level}! +1000 BONUS`, '');
      } else {
        player.col = 6; player.row = START_ROW;
        player.hopping = false; player.onPlatform = null;
        syncPlayerPixels();
        timer = getLevelTimer();
        timerElapsed = 0;
        waterCrossedSafe = true;
      }
      return;
    }
  }

  if (row >= RIVER_START && row <= RIVER_END) {
    const plat = getPlatformAt(col, row);
    if (!plat || plat.submerged) { killPlayer('water'); return; }
    if (plat.type === 'turtle') {
      turtleRidesThisLevel++;
      if (turtleRidesThisLevel >= 3) unlockAchievement('turtle_surfer');
    }
    player.onPlatform = plat;
  }

  if (row >= ROAD_START && row <= ROAD_END) {
    if (checkVehicleCollision()) { killPlayer('car'); return; }
  }
}

function getPlatformAt(col, row) {
  for (const p of platforms) {
    if (p.row !== row) continue;
    if (p.submerged) continue;
    const pCol = p.x / CELL;
    if (col >= pCol && col < pCol + p.w) return p;
  }
  return null;
}

function checkVehicleCollision() {
  // Forgiving, directional hit test: only the FRONT half of a vehicle is lethal.
  // If the player overlaps only the rear (tail) of a vehicle, it's a safe pass —
  // you can hop onto the back of a car without dying; only its front can hit you.
  const pcx = player.x + CELL * 0.5;          // player centre (x)
  const px  = player.x + CELL * 0.2;          // forgiving player hitbox
  const pw  = CELL * 0.6;
  for (const v of vehicles) {
    if (v.row !== player.row) continue;
    const vx = v.x + CELL * 0.05;
    const vw = v.w * CELL - CELL * 0.1;
    // 1) must physically overlap at all
    if (!(px < vx + vw && px + pw > vx)) continue;
    // 2) lethal only if the player is on the vehicle's front side (the side it
    //    moves toward). dir = +1 front is the right edge, dir = -1 front is left.
    const vcx = v.x + v.w * CELL * 0.5;        // vehicle centre (x)
    if ((pcx - vcx) * v.dir > 0) return true;  // hit by the front → death
    // else: player is on the rear half → safe
  }
  return false;
}

function updateParticles(dt) {
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx;
    p.y += p.vy;
    p.life -= p.decay;
    if (p.life <= 0) particles.splice(i, 1);
  }
}

// ─── DRAW ─────────────────────────────────────────────────────────────────────
function draw() {
  ctx.clearRect(0, 0, CANVAS_W, CANVAS_H);
  uiButtons = [];

  // Screen shake transform
  let shakeX = 0, shakeY = 0;
  if (screenShakeT > 0 && !prefersReducedMotion) {
    shakeX = (Math.random() - 0.5) * screenShakeAmt * 2;
    shakeY = (Math.random() - 0.5) * screenShakeAmt * 2;
    ctx.save();
    ctx.translate(shakeX, shakeY);
  }

  drawHUD();
  drawBoard();
  drawPlatforms();
  drawVehicles();
  drawGoals();
  drawPlayer();
  drawParticles();
  if (flashAlpha > 0) {
    ctx.save();
    ctx.fillStyle = `rgba(255,255,255,${flashAlpha * 0.6})`;
    ctx.fillRect(0, HUD_H, CANVAS_W, CANVAS_H - HUD_H);
    ctx.restore();
  }
  drawDeathAnim();

  if (screenShakeT > 0 && !prefersReducedMotion) ctx.restore();

  if (showTutorial) { drawTutorialScreen(); return; }
  if (STATE === 'START') drawStartScreen();
  if (STATE === 'PAUSED') drawPauseScreen();
  if (STATE === 'GAMEOVER') drawGameOverScreen();
}

function drawHUD() {
  ctx.fillStyle = '#0d0d1a';
  ctx.fillRect(0, 0, CANVAS_W, HUD_H);

  const fs = Math.max(10, Math.floor(HUD_H * 0.52));
  ctx.font = `bold ${fs}px Courier New`;
  ctx.fillStyle = '#f1c40f';
  ctx.textAlign = 'left';
  ctx.fillText(`SCORE: ${score}`, 6, HUD_H * 0.72);

  ctx.fillStyle = '#aaa';
  ctx.textAlign = 'center';
  ctx.fillText(`BEST: ${bestScore}`, CANVAS_W / 2, HUD_H * 0.72);

  ctx.fillStyle = '#2ecc71';
  ctx.textAlign = 'right';
  ctx.fillText(`LVL ${level}`, CANVAS_W - 6, HUD_H * 0.72);

  const lifeY = HUD_H - 4;
  for (let i = 0; i < TOTAL_LIVES; i++) {
    ctx.fillStyle = i < lives ? '#e74c3c' : '#333';
    const lx = 6 + i * (fs * 0.9 + 2);
    drawHeart(lx, lifeY - fs * 0.55, fs * 0.5);
  }

  const muteSize = Math.max(14, fs * 0.8);
  ctx.font = `${muteSize}px Arial`;
  ctx.textAlign = 'right';
  ctx.fillStyle = muted ? '#555' : '#fff';
  ctx.fillText(muted ? '🔇' : '🔊', CANVAS_W - 4, HUD_H - 4);
}

function drawHeart(x, y, size) {
  ctx.save();
  ctx.translate(x + size, y + size * 0.9);
  ctx.scale(size, size);
  ctx.beginPath();
  ctx.moveTo(0, 0);
  ctx.bezierCurveTo(-0.5, -0.5, -1, 0.1, 0, 0.7);
  ctx.bezierCurveTo(1, 0.1, 0.5, -0.5, 0, 0);
  ctx.fill();
  ctx.restore();
}

const COLORS = {
  road:    '#4a4a4a',
  roadAlt: '#3d3d3d',
  water:   '#1a6fa8',
  waterAlt:'#1a5f93',
  grass:   '#27ae60',
  grassAlt:'#229954',
  median:  '#2d9e5e',
  laneStripe: 'rgba(255,255,220,0.12)',
};

function drawBoard() {
  for (let row = 0; row < ROWS; row++) {
    const y = rowY(row);
    let color;
    if (row === GOAL_ROW)         color = COLORS.grass;
    else if (row <= RIVER_END)    color = row % 2 === 0 ? COLORS.waterAlt : COLORS.water;
    else if (row === MEDIAN_ROW)  color = COLORS.median;
    else if (row <= ROAD_END)     color = row % 2 === 0 ? COLORS.road : COLORS.roadAlt;
    else                          color = COLORS.grass;

    ctx.fillStyle = color;
    ctx.fillRect(0, y, CANVAS_W, CELL);

    if (row >= ROAD_START && row <= ROAD_END) {
      ctx.fillStyle = COLORS.laneStripe;
      ctx.fillRect(0, y + CELL - 2, CANVAS_W, 2);
    }
  }

  const curTimer = getLevelTimer();
  const remaining = curTimer - timerElapsed;
  const frac = Math.max(0, remaining / curTimer);
  const barW = CANVAS_W * frac;
  const barColor = frac > 0.5 ? '#2ecc71' : frac > 0.25 ? '#f39c12' : '#e74c3c';
  ctx.fillStyle = '#111';
  ctx.fillRect(0, HUD_H - 4, CANVAS_W, 4);
  ctx.fillStyle = barColor;
  ctx.fillRect(0, HUD_H - 4, barW, 4);
}

function drawGoals() {
  for (let i = 0; i < NUM_GOALS; i++) {
    const col = GOAL_COLS[i];
    const x = colX(col);
    const y = rowY(GOAL_ROW);
    ctx.fillStyle = goalsFilled[i] ? '#16a085' : '#0e6b52';
    ctx.fillRect(x + 2, y + 2, CELL - 4, CELL - 4);
    ctx.fillStyle = goalsFilled[i] ? '#1abc9c' : '#1a7a5c';
    ctx.beginPath();
    ctx.arc(x + CELL/2, y + CELL/2, CELL * 0.38, 0, Math.PI * 2);
    ctx.fill();
    if (goalsFilled[i]) {
      ctx.fillStyle = '#2ecc71';
      ctx.beginPath();
      ctx.arc(x + CELL/2, y + CELL/2, CELL * 0.22, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#27ae60';
      ctx.beginPath();
      ctx.arc(x + CELL/2, y + CELL/2, CELL * 0.12, 0, Math.PI * 2);
      ctx.fill();
    }
  }
  for (let col = 0; col < COLS; col++) {
    if (GOAL_COLS.includes(col)) continue;
    const x = colX(col);
    const y = rowY(GOAL_ROW);
    ctx.fillStyle = '#1e8449';
    ctx.fillRect(x, y, CELL, CELL);
    ctx.fillStyle = '#196f3d';
    for (let bi = 0; bi < 3; bi++) {
      ctx.beginPath();
      ctx.arc(x + CELL * (0.2 + bi * 0.3), y + CELL * 0.55, CELL * 0.25, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.fillStyle = '#239b56';
    for (let bi = 0; bi < 2; bi++) {
      ctx.beginPath();
      ctx.arc(x + CELL * (0.35 + bi * 0.35), y + CELL * 0.4, CELL * 0.2, 0, Math.PI * 2);
      ctx.fill();
    }
  }
}

function drawPlatforms() {
  platforms.forEach(p => {
    const px = p.x;
    const py = p.y;
    const pw = p.w * CELL;
    if (p.type === 'log') {
      ctx.fillStyle = '#8B5E3C';
      roundRect(ctx, px + 2, py + 4, pw - 4, CELL - 8, 6);
      ctx.fill();
      ctx.fillStyle = '#A0522D';
      roundRect(ctx, px + 2, py + 5, pw - 4, (CELL - 10) * 0.45, 4);
      ctx.fill();
      ctx.strokeStyle = '#6B3F1F';
      ctx.lineWidth = 1;
      for (let gi = 1; gi < p.w; gi++) {
        ctx.beginPath();
        ctx.moveTo(px + gi * CELL, py + 6);
        ctx.lineTo(px + gi * CELL, py + CELL - 6);
        ctx.stroke();
      }
    } else {
      const alpha = p.flickering ? (0.5 + 0.5 * Math.sin(Date.now() / 80)) : (p.submerged ? 0.25 : 1.0);
      ctx.globalAlpha = alpha;
      for (let ti = 0; ti < p.w; ti++) {
        const tx = px + ti * CELL;
        ctx.fillStyle = '#2d7d3a';
        ctx.beginPath();
        ctx.ellipse(tx + CELL/2, py + CELL/2, CELL*0.42, CELL*0.36, 0, 0, Math.PI*2);
        ctx.fill();
        ctx.fillStyle = p.submerged ? '#1a4f22' : '#3d9e4a';
        ctx.beginPath();
        ctx.ellipse(tx + CELL/2, py + CELL/2, CELL*0.32, CELL*0.27, 0, 0, Math.PI*2);
        ctx.fill();
        ctx.strokeStyle = '#2a7032';
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(tx + CELL/2 - CELL*0.28, py + CELL/2);
        ctx.lineTo(tx + CELL/2 + CELL*0.28, py + CELL/2);
        ctx.moveTo(tx + CELL/2, py + CELL/2 - CELL*0.24);
        ctx.lineTo(tx + CELL/2, py + CELL/2 + CELL*0.24);
        ctx.stroke();
        ctx.fillStyle = '#fff';
        [-1,1].forEach(side => {
          ctx.beginPath();
          ctx.arc(tx + CELL/2 + side * CELL*0.15, py + CELL*0.3, CELL*0.065, 0, Math.PI*2);
          ctx.fill();
          ctx.fillStyle = '#111';
          ctx.beginPath();
          ctx.arc(tx + CELL/2 + side * CELL*0.15, py + CELL*0.3, CELL*0.035, 0, Math.PI*2);
          ctx.fill();
          ctx.fillStyle = '#fff';
        });
      }
      ctx.globalAlpha = 1;
    }
  });
}

function drawVehicles() {
  vehicles.forEach(v => {
    const vx = v.x;
    const vy = v.y;
    const vw = v.w * CELL;

    ctx.fillStyle = v.color;
    roundRect(ctx, vx + 2, vy + CELL*0.2, vw - 4, CELL*0.6, 5);
    ctx.fill();

    ctx.fillStyle = 'rgba(180,230,255,0.7)';
    if (v.w === 1) {
      ctx.fillRect(vx + CELL*0.25, vy + CELL*0.25, CELL*0.5, CELL*0.28);
    } else {
      ctx.fillRect(vx + CELL*0.15, vy + CELL*0.25, vw * 0.25, CELL*0.28);
      ctx.fillRect(vx + vw - vw*0.15 - vw*0.25, vy + CELL*0.25, vw * 0.25, CELL*0.28);
    }

    ctx.fillStyle = '#222';
    [[0.18, 0.18], [0.18, 0.72], [vw/CELL - 0.18, 0.18], [vw/CELL - 0.18, 0.72]].forEach(([cx, cy]) => {
      ctx.beginPath();
      ctx.arc(vx + cx * CELL, vy + cy * CELL, CELL * 0.12, 0, Math.PI*2);
      ctx.fill();
    });

    ctx.fillStyle = '#ffee88';
    const hlx = v.dir === 1 ? vx + vw - 6 : vx + 2;
    ctx.fillRect(hlx, vy + CELL*0.3, 4, CELL*0.15);
    ctx.fillRect(hlx, vy + CELL*0.55, 4, CELL*0.15);
  });
}

function drawPlayer() {
  if (!player.alive && STATE !== 'PLAYING') return;
  if (STATE === 'DYING' && !player.alive) return;

  const px = player.x;
  const py = player.y;
  const hf = player.hopping ? (1 - Math.abs(player.hopT / HOP_DURATION - 0.5) * 2 * 0.25 + 0.05) : 1.0;
  const scaleY = player.hopping ? (1 - (1 - hf) * 0.3) : 1.0;
  const scaleX = player.hopping ? (1 + (1 - hf) * 0.15) : 1.0;

  ctx.save();
  ctx.translate(px + CELL/2, py + CELL/2);
  ctx.scale(scaleX, scaleY);

  const r = CELL * 0.38;
  ctx.fillStyle = '#2ecc71';
  ctx.beginPath();
  ctx.ellipse(0, 2, r, r * 0.85, 0, 0, Math.PI * 2);
  ctx.fill();

  ctx.fillStyle = '#58d68d';
  ctx.beginPath();
  ctx.ellipse(-r*0.1, -r*0.2, r*0.55, r*0.4, 0, 0, Math.PI*2);
  ctx.fill();

  [-1, 1].forEach(side => {
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.arc(side * r * 0.45, -r * 0.3, r * 0.22, 0, Math.PI*2);
    ctx.fill();
    ctx.fillStyle = '#1a1a1a';
    ctx.beginPath();
    ctx.arc(side * r * 0.45, -r * 0.3, r * 0.13, 0, Math.PI*2);
    ctx.fill();
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.arc(side * r * 0.45 + r*0.05, -r*0.35, r*0.05, 0, Math.PI*2);
    ctx.fill();
  });

  ctx.strokeStyle = '#27ae60';
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.arc(0, r*0.1, r*0.25, 0.2, Math.PI - 0.2);
  ctx.stroke();

  ctx.fillStyle = '#27ae60';
  [-0.35, 0.35].forEach(side => {
    ctx.beginPath();
    ctx.ellipse(side * r, r * 0.8, r * 0.18, r * 0.12, 0, 0, Math.PI * 2);
    ctx.fill();
  });

  ctx.restore();
}

function drawParticles() {
  particles.forEach(p => {
    ctx.globalAlpha = p.life;
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r * p.life, 0, Math.PI * 2);
    ctx.fill();
  });
  ctx.globalAlpha = 1;
}

function drawDeathAnim() {
  if (!deathAnim) return;
  if (prefersReducedMotion) return;
  const t = deathAnim.t;
  if (deathAnim.type === 'water') {
    ctx.strokeStyle = `rgba(100,180,255,${Math.max(0, 0.8 - t * 1.5)})`;
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(deathAnim.x, deathAnim.y, t * CELL * 1.5, 0, Math.PI*2);
    ctx.stroke();
    ctx.beginPath();
    ctx.arc(deathAnim.x, deathAnim.y, t * CELL * 0.8, 0, Math.PI*2);
    ctx.stroke();
  } else {
    const n = 8;
    for (let i = 0; i < n; i++) {
      const angle = (i / n) * Math.PI * 2 + t * 3;
      const len = t * CELL * 1.2;
      ctx.strokeStyle = `rgba(255,200,0,${Math.max(0, 1 - t * 2)})`;
      ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.moveTo(deathAnim.x, deathAnim.y);
      ctx.lineTo(deathAnim.x + Math.cos(angle) * len, deathAnim.y + Math.sin(angle) * len);
      ctx.stroke();
    }
  }
}

function roundRect(ctx, x, y, w, h, r) {
  r = Math.min(r, w/2, h/2);
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
}

}

// ─── PROFILE MODAL ───────────────────────────────────────────────────────────
function openProfileModal() {
  if (!profile) return;
  const modal = document.getElementById('profile-modal');
  document.getElementById('profile-name-input').value = profile.name;

  const statsDiv = document.getElementById('profile-stats');
  statsDiv.innerHTML = `
    <div class="stat-row"><span>Games Played</span><span>${profile.stats.gamesPlayed}</span></div>
    <div class="stat-row"><span>Best Score</span><span>${profile.bestScore}</span></div>
    <div class="stat-row"><span>Highest Level</span><span>${profile.stats.highestLevel}</span></div>
    <div class="stat-row"><span>Total Goals</span><span>${profile.stats.totalGoals}</span></div>
    <div class="stat-row"><span>Water Deaths</span><span>${profile.stats.waterDeaths}</span></div>
    <div class="stat-row"><span>Car Deaths</span><span>${profile.stats.carDeaths}</span></div>
  `;

  const achList = document.getElementById('ach-list');
  achList.innerHTML = ACHIEVEMENT_DEFS.map(a => {
    const unlocked = profile.achievements.includes(a.id);
    return `<span class="ach-badge${unlocked ? '' : ' locked'}" title="${a.desc}">${a.label}</span>`;
  }).join('');

  const lbList = document.getElementById('lb-list');
  if (profile.highScores.length === 0) {
    lbList.innerHTML = '<div style="color:#555;font-size:11px;font-family:Courier New">No scores yet</div>';
  } else {
    lbList.innerHTML = profile.highScores.map((hs, i) =>
      `<div class="stat-row"><span>${i+1}. ${hs.date}</span><span>${hs.score} Lv${hs.level}</span></div>`
    ).join('');
  }

  modal.classList.add('open');
  document.getElementById('profile-name-input').focus();
}

function closeProfileModal() {
  document.getElementById('profile-modal').classList.remove('open');
}

document.getElementById('profile-save-btn').addEventListener('click', () => {
  const name = document.getElementById('profile-name-input').value.trim();
  if (name && profile) {
    profile.name = name.slice(0, 20);
    saveProfile();
    showToast('Profile saved!', '');
  }
  closeProfileModal();
});

document.getElementById('profile-reset-btn').addEventListener('click', () => {
  if (confirm('Reset ALL data (scores, achievements, stats)?')) {
    try { localStorage.removeItem(SAVE_KEY); localStorage.removeItem('streetHopperBest'); localStorage.removeItem('sh_muted'); } catch(e) {}
    loadProfile();
    bestScore = 0;
    closeProfileModal();
    showToast('Data reset.', 'life-loss');
  }
});

document.getElementById('profile-close-btn').addEventListener('click', closeProfileModal);

document.getElementById('profile-modal').addEventListener('click', e => {
  if (e.target === document.getElementById('profile-modal')) closeProfileModal();
});

// ─── MUTE / QUIT HELPERS ───────────────────────────────────────────────────────
function toggleMute() {
  muted = !muted;
  if (profile) { profile.muted = muted; saveProfile(); }
  updateBGMVolume();
}

function quitToMenu() {
  // Abandon current run and return to the main menu (web "quit").
  stopBGM();
  deathAnim = null;
  flashAlpha = 0;
  particles = [];
  inputBuffer = null;
  STATE = 'START';
}

// ─── DIFFICULTY ────────────────────────────────────────────────────────────────
let gsSyncingDifficulty = false; // re-entrancy guard between this game & GameShell
function setDifficulty(d) {
  if (!DIFFICULTIES[d]) return;
  const oldMul = (DIFFICULTIES[difficulty] || DIFFICULTIES.normal).speedMul;
  const newMul = DIFFICULTIES[d].speedMul;
  difficulty = d;
  if (profile) { profile.difficulty = d; saveProfile(); }
  // Keep the GameShell overlay's difficulty (and leaderboard target) in sync when
  // the player changes it from this game's own settings modal.
  if (!gsSyncingDifficulty && window.GameShell && window.GameShell.setDifficulty
      && window.GameShell.getDifficulty && window.GameShell.getDifficulty() !== d) {
    gsSyncingDifficulty = true;
    try { window.GameShell.setDifficulty(d); } catch (e) {}
    gsSyncingDifficulty = false;
  }
  // Apply live to anything already moving so a mid-game change is felt instantly.
  const ratio = newMul / oldMul;
  vehicles.forEach(v => v.speed *= ratio);
  platforms.forEach(p => p.speed *= ratio);
  renderSettings();
}

// ─── SETTINGS MODAL ──────────────────────────────────────────────────────────
function openSettings() {
  settingsPrevState = STATE;
  if (STATE === 'PLAYING') STATE = 'PAUSED';
  renderSettings();
  document.getElementById('settings-modal').classList.add('open');
}

function closeSettings() {
  document.getElementById('settings-modal').classList.remove('open');
  if (settingsPrevState === 'PLAYING' && STATE === 'PAUSED') STATE = 'PLAYING';
  settingsPrevState = null;
}

function renderSettings() {
  document.querySelectorAll('.diff-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.diff === difficulty);
  });
  document.getElementById('diff-desc').textContent = (DIFFICULTIES[difficulty] || DIFFICULTIES.normal).desc;
  document.getElementById('settings-sound-btn').textContent = 'SOUND: ' + (muted ? 'OFF' : 'ON');
  const lb = document.getElementById('settings-lb');
  if (!profile || profile.highScores.length === 0) {
    lb.innerHTML = '<div style="color:#555;font-size:11px;">No scores yet — play a game!</div>';
  } else {
    lb.innerHTML = profile.highScores.map((hs, i) =>
      `<div class="stat-row"><span>${i+1}. ${hs.date}</span><span>${hs.score} · Lv${hs.level}</span></div>`
    ).join('');
  }
}

document.querySelectorAll('.diff-btn').forEach(b => {
  b.addEventListener('click', () => setDifficulty(b.dataset.diff));
});
document.getElementById('settings-sound-btn').addEventListener('click', () => { toggleMute(); renderSettings(); });
document.getElementById('settings-close-btn').addEventListener('click', closeSettings);
document.getElementById('settings-quit-btn').addEventListener('click', () => { closeSettings(); quitToMenu(); });
document.getElementById('settings-modal').addEventListener('click', e => {
  if (e.target === document.getElementById('settings-modal')) closeSettings();
});

// ─── ON-SCREEN MENU BUTTONS ────────────────────────────────────────────────────
function drawUIButton(id, label, x, y, w, h, opts) {
  opts = opts || {};
  uiButtons.push({ id, x, y, w, h });
  ctx.save();
  ctx.fillStyle = opts.bg || 'rgba(20,20,40,0.92)';
  roundRect(ctx, x, y, w, h, 9); ctx.fill();
  ctx.lineWidth = 2;
  ctx.strokeStyle = opts.border || '#f1c40f';
  roundRect(ctx, x, y, w, h, 9); ctx.stroke();
  ctx.fillStyle = opts.color || '#fff';
  const fs = opts.fs || Math.max(13, Math.floor(h * 0.4));
  ctx.font = `bold ${fs}px Courier New`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(label, x + w / 2, y + h / 2 + 1);
  ctx.textBaseline = 'alphabetic';
  ctx.restore();
}

function hitTestUI(cx, cy) {
  for (let i = uiButtons.length - 1; i >= 0; i--) {
    const b = uiButtons[i];
    if (cx >= b.x && cx <= b.x + b.w && cy >= b.y && cy <= b.y + b.h) return b.id;
  }
  return null;
}

function handleUIButton(id) {
  switch (id) {
    case 'play':
    case 'play-again':
    case 'restart': initGame(); break;
    case 'settings': openSettings(); break;
    case 'profile': openProfileModal(); break;
    case 'resume': STATE = 'PLAYING'; break;
    case 'quit':
    case 'menu': quitToMenu(); break;
  }
}

// ─── GAME LOOP ────────────────────────────────────────────────────────────────
function loop(ts) {
  const dt = Math.min((ts - lastTime) / 1000, 0.05);
  lastTime = ts;
  update(dt);
  draw();
  requestAnimationFrame(loop);
}

// ─── AUTOSAVE ────────────────────────────────────────────────────────────────
document.addEventListener('visibilitychange', () => {
  if (document.hidden) {
    if (STATE === 'PLAYING') STATE = 'PAUSED';
    saveProfile();
  }
});
window.addEventListener('beforeunload', () => { saveProfile(); });

// ─── EVENT HANDLERS ───────────────────────────────────────────────────────────
window.addEventListener('keydown', e => {
  const key = e.key;

  // Profile modal open
  if (document.getElementById('profile-modal').classList.contains('open')) {
    if (key === 'Escape') { closeProfileModal(); e.preventDefault(); }
    return;
  }

  // Settings modal open
  if (document.getElementById('settings-modal').classList.contains('open')) {
    if (key === 'Escape' || key === 'o' || key === 'O') { closeSettings(); e.preventDefault(); }
    return;
  }

  // Tutorial advance
  if (showTutorial) {
    if (!['F1','F2','F3','F4','F5','F6','F7','F8','F9','F10','F11','F12','Tab'].includes(key)) {
      nextTutorialPage();
      e.preventDefault();
    }
    return;
  }

  if (STATE === 'START' || STATE === 'GAMEOVER') {
    if (key === 'i' || key === 'I') { openProfileModal(); return; }
    if (key === 'o' || key === 'O') { openSettings(); return; }
    if (key === 's' || key === 'S') { if (STATE === 'GAMEOVER') shareScore(); return; }
    if (!['F1','F2','F3','F4','F5','F6','F7','F8','F9','F10','F11','F12','Tab'].includes(key)) {
      initGame();
      return;
    }
  }
  if (STATE === 'DYING') return;

  if (key === 'i' || key === 'I') { openProfileModal(); return; }
  if (key === 'o' || key === 'O') { openSettings(); return; }
  if (key === 'q' || key === 'Q') { if (STATE === 'PLAYING' || STATE === 'PAUSED') quitToMenu(); return; }

  if (key === 'p' || key === 'P' || key === 'Escape') {
    if (STATE === 'PLAYING') STATE = 'PAUSED';
    else if (STATE === 'PAUSED') STATE = 'PLAYING';
    return;
  }
  if (key === 'r' || key === 'R') { initGame(); return; }
  if (key === 'm' || key === 'M') { toggleMute(); return; }

  if (STATE !== 'PLAYING') return;
  e.preventDefault();

  if (key === 'ArrowUp'    || key === 'w' || key === 'W') tryHop(0, -1);
  if (key === 'ArrowDown'  || key === 's' || key === 'S') tryHop(0, 1);
  if (key === 'ArrowLeft'  || key === 'a' || key === 'A') tryHop(-1, 0);
  if (key === 'ArrowRight' || key === 'd' || key === 'D') tryHop(1, 0);
});

// D-pad buttons
['up','down','left','right'].forEach(dir => {
  const btn = document.getElementById(`btn-${dir}`);
  if (!btn) return;
  const map = { up:[0,-1], down:[0,1], left:[-1,0], right:[1,0] };
  btn.addEventListener('touchstart', e => {
    e.preventDefault();
    resumeAudio();
    if (showTutorial) { nextTutorialPage(); return; }
    if (STATE === 'START' || STATE === 'GAMEOVER') { initGame(); return; }
    if (STATE === 'DYING') return;
    if (STATE !== 'PLAYING') return;
    const [dx, dy] = map[dir];
    tryHop(dx, dy);
  }, { passive: false });
  btn.addEventListener('mousedown', e => {
    e.preventDefault();
    resumeAudio();
    if (showTutorial) { nextTutorialPage(); return; }
    if (STATE === 'START' || STATE === 'GAMEOVER') { initGame(); return; }
    if (STATE === 'DYING') return;
    if (STATE !== 'PLAYING') return;
    const [dx, dy] = map[dir];
    tryHop(dx, dy);
  });
});

// Pointer / touch handling (taps hit on-screen menu buttons; swipes move)
function clientToCanvas(clientX, clientY) {
  const rect = canvas.getBoundingClientRect();
  return {
    x: (clientX - rect.left) * (CANVAS_W / rect.width),
    y: (clientY - rect.top) * (CANVAS_H / rect.height)
  };
}

let lastTouchTapTime = 0;

function onPointerTap(cx, cy) {
  resumeAudio();
  if (showTutorial) { nextTutorialPage(); return; }
  // Mute toggle via HUD speaker icon (top-right)
  if ((STATE === 'PLAYING' || STATE === 'PAUSED') && cy <= HUD_H && cx >= CANVAS_W - CELL) {
    toggleMute();
    return;
  }
  // On-screen menu buttons take priority
  const hit = hitTestUI(cx, cy);
  if (hit) { handleUIButton(hit); return; }
}

let touchStartX = 0, touchStartY = 0;
canvas.addEventListener('touchstart', e => {
  resumeAudio();
  if (e.touches.length > 0) {
    touchStartX = e.touches[0].clientX;
    touchStartY = e.touches[0].clientY;
  }
  e.preventDefault();
}, { passive: false });

canvas.addEventListener('touchend', e => {
  if (e.changedTouches.length === 0) return;
  e.preventDefault();
  lastTouchTapTime = Date.now();
  const dx = e.changedTouches[0].clientX - touchStartX;
  const dy = e.changedTouches[0].clientY - touchStartY;
  const minSwipe = 20;
  if (Math.abs(dx) < minSwipe && Math.abs(dy) < minSwipe) {
    // Tap
    const p = clientToCanvas(e.changedTouches[0].clientX, e.changedTouches[0].clientY);
    onPointerTap(p.x, p.y);
  } else if (STATE === 'PLAYING') {
    // Swipe to hop
    if (Math.abs(dx) > Math.abs(dy)) tryHop(dx > 0 ? 1 : -1, 0);
    else tryHop(0, dy > 0 ? 1 : -1);
  }
}, { passive: false });

canvas.addEventListener('click', e => {
  if (Date.now() - lastTouchTapTime < 500) return; // ignore synthetic click after touch
  const p = clientToCanvas(e.clientX, e.clientY);
  onPointerTap(p.x, p.y);
});

window.addEventListener('resize', () => { resize(); });

// ─── SHARE ────────────────────────────────────────────────────────────────────
function shareScore() {
  if (!navigator.share) return;
  const name = profile ? profile.name : 'I';
  navigator.share({
    title: 'Street Hopper',
    text: `${name} scored ${score} points and reached Level ${level} in Street Hopper! Can you beat that?`,
    url: window.location.href
  }).catch(() => {});
}

// ─── INIT ─────────────────────────────────────────────────────────────────────
loadProfile();
if (profile) {
  muted = !!profile.muted;
  bestScore = profile.bestScore;
  if (profile.difficulty && DIFFICULTIES[profile.difficulty]) difficulty = profile.difficulty;
}

// GameShell: let the overlay's difficulty be the source of truth on startup, and
// react to overlay changes by updating the difficulty used for the NEXT new game
// (no live mid-game change — that matches "applies on your next new game").
if (window.GameShell) {
  if (window.GameShell.getDifficulty) {
    const gd = window.GameShell.getDifficulty();
    if (DIFFICULTIES[gd]) {
      difficulty = gd;
      if (profile) { profile.difficulty = gd; saveProfile(); }
    }
  }
  if (window.GameShell.onDifficulty) {
    window.GameShell.onDifficulty(function (d) {
      if (gsSyncingDifficulty || !DIFFICULTIES[d]) return;
      difficulty = d;
      if (profile) { profile.difficulty = d; saveProfile(); }
      renderSettings(); // refresh the in-game settings modal highlight if open
    });
  }
}

resize();
initLevel();
player.col = 6; player.row = START_ROW;
syncPlayerPixels();
lastTime = performance.now();

// Show tutorial on first play
if (profile && !profile.seenTutorial) {
  showTutorial = true;
}

requestAnimationFrame(loop);
</script>
</body>
</html>
